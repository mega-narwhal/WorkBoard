  menu.style.left = Math.max(8, px) + 'px';
  menu.style.top = Math.max(8, py) + 'px';
  _cardMenuEl = menu;
  // Defer the away-listener a tick so the opening click doesn't self-close it.
  setTimeout(() => {
    if (!_cardMenuEl) return;
    document.addEventListener('mousedown', _cardMenuAway, true);
    document.addEventListener('keydown', _cardMenuKey, true);
  }, 0);
}

// #550 — tactile discard/delete sounds, SYNTHESIZED via Web Audio (Apple's trash
// sound is a proprietary system asset we can't ship). Discard = a soft downward
// whoosh; permanent delete = a paper-crumple + low thunk. On by default; mute via
// localStorage wbSound='0'. AudioContext is lazily created on the triggering
// gesture (satisfies the browser autoplay policy).
let _audioCtx = null;
let _soundOn = (localStorage.getItem('wbSound') !== '0');
function _ac() {
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === 'suspended') _audioCtx.resume().catch(() => {});
    return _audioCtx;
  } catch (_) { return null; }
}
function _noiseBuf(ctx, dur) {
  const n = Math.max(1, Math.floor(ctx.sampleRate * dur));
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}
function playDiscardSound() {
  if (!_soundOn) return; const ctx = _ac(); if (!ctx) return;
  const t = ctx.currentTime;
  const src = ctx.createBufferSource(); src.buffer = _noiseBuf(ctx, 0.24);
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(1900, t); lp.frequency.exponentialRampToValueAtTime(180, t + 0.2);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.16, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  src.connect(lp); lp.connect(g); g.connect(ctx.destination);
  src.start(t); src.stop(t + 0.25);
}
function playDeleteSound() {
  if (!_soundOn) return; const ctx = _ac(); if (!ctx) return;
  const t0 = ctx.currentTime;
  for (let i = 0; i < 5; i++) {                         // crumple = quick noise grains
    const t = t0 + i * 0.035 + Math.random() * 0.012;
    const src = ctx.createBufferSource(); src.buffer = _noiseBuf(ctx, 0.05);
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
    bp.frequency.value = 1200 + Math.random() * 2200; bp.Q.value = 0.8;
    const g = ctx.createGain(); const amp = 0.09 + Math.random() * 0.06;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(amp, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
    src.connect(bp); bp.connect(g); g.connect(ctx.destination);
    src.start(t); src.stop(t + 0.06);
  }
  const osc = ctx.createOscillator(); osc.type = 'sine';  // low thunk
  osc.frequency.setValueAtTime(140, t0 + 0.16); osc.frequency.exponentialRampToValueAtTime(60, t0 + 0.3);
  const og = ctx.createGain();
  og.gain.setValueAtTime(0.0001, t0 + 0.16);
  og.gain.exponentialRampToValueAtTime(0.11, t0 + 0.18);
  og.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.32);
  osc.connect(og); og.connect(ctx.destination); osc.start(t0 + 0.16); osc.stop(t0 + 0.34);
}

function deleteCard(id) {
  if (!state) return;
  playDeleteSound();   // #550 — permanent delete = crumple
  pushUndo();
  // #522 — log BEFORE removing (the SSE echo's handleCardRemoved can't log our
  // own delete: the card is already gone from local state by the time it fires).
  const _doomed = state.cards.find(c => c.id === id);
  if (_doomed) logEvent('remove', `#${_doomed.num} "${_doomed.title || ''}"`, _doomed);
  state.cards = state.cards.filter(c => c.id !== id);
  const el = findCardEl(id);
  if (el) {
    const colId = el.dataset.col;
    el.classList.add('removing');
    el.addEventListener('animationend', () => {
      el.remove();
      refreshColumnCount(colId);
    }, { once: true });
  }
  if (_openCardId === id) closeModal();
  scheduleSave();
}

// #358 — Resolve (lazily create) the Discarded column. Matched by id
// 'discarded' OR a case-insensitive "Discarded" name so it works on any board
// (live boards may carry a generated id); created if absent so soft-delete
// always has a home.
function discardColumn() {
  if (!state) return null;
  let col = (state.columns || []).find(
    c => c.id === 'discarded' || /^discarded$/i.test(c.name || ''));
  if (!col) {
    col = { id: 'discarded', name: 'Discarded', kind: 'custom', stackUnder: null };
    state.columns.push(col);
    if (typeof handleColumnAdded === 'function') { /* state already mutated */ }
  }
  return col;
}

// #358 — Soft-delete. "Delete" no longer destroys a card: it flies it to the
// Discarded column (reversible, history-recorded, undoable) via the normal move
// path. A card ALREADY in Discarded is purged for real (confirmed, since that
// IS irreversible) — so the column can still be emptied.
async function discardCard(id) {
  if (!state) return;
  const card = state.cards.find(c => c.id === id);
  if (!card) return;
  const disc = discardColumn();
  if (!disc) return;
  if (card.column === disc.id) {
    if (await miniConfirm('Delete permanently?',
        { sub: `"${card.title}" — this can't be undone` })) deleteCard(id);
    return;
  }
  if (_openCardId === id) closeModal();
  playDiscardSound();   // #550 — discard / drop-in-trash = whoosh
  moveCardToColumn(card, disc.id);
}

// #539 — purge the entire Discarded pile at once (undoable via Cmd-Z, same as a
// single Delete permanently) so the user doesn't have to delete one at a time.
async function emptyDiscarded() {
  if (!state) return;
  const disc = discardColumn();
  if (!disc) return;
  const n = state.cards.filter(c => c.column === disc.id).length;
  if (!n) { toast('Discarded is already empty'); return; }
  if (!(await miniConfirm('Empty Discarded?', { sub: `Permanently delete ${n} discarded card(s)` }))) return;
  playDeleteSound();   // #550 — bulk permanent delete = crumple
  pushUndo();
  state.cards = state.cards.filter(c => c.column !== disc.id);
  scheduleSave();
  render();
  toast(`Emptied Discarded · ${n} deleted`);
}

// True when a card is sitting in the Discarded column (so UI can label its
// remove action "Delete permanently" instead of "Discard").
function isDiscarded(card) {
  const d = (state && state.columns || []).find(
    c => c.id === 'discarded' || /^discarded$/i.test(c.name || ''));
  return !!d && card && card.column === d.id;
}

function handleColumnAdded({ column, index }) {
  if (!state) return;
  if (!state.columns.find(c => c.id === column.id)) {
    state.columns.splice(typeof index === 'number' ? index : state.columns.length, 0, column);
  }
  if (_view !== 'board') return;
  if (isDragInProgress()) { _pendingResync = true; return; }   // #494 — defer DOM until drag ends
  if (findColumnEl(column.id)) return;

  const boardEl = $('#board');
  const addBtn = boardEl.querySelector('.col-add-btn');
  const newCol = renderColumn(column, []);
  newCol.classList.add('sliding-in');
  if (addBtn) boardEl.insertBefore(newCol, addBtn);
  else boardEl.appendChild(newCol);
  newCol.addEventListener('animationend', () => newCol.classList.remove('sliding-in'), { once: true });
  logEvent('col', `+ column "${column.name || column.id}"`);
}

function handleColumnRemoved({ id }) {
  if (!state) return;
  const removed = state.columns.find(c => c.id === id);
  state.columns = state.columns.filter(c => c.id !== id);
  if (removed) logEvent('col', `− column "${removed.name || removed.id}"`);
  if (isDragInProgress()) { _pendingResync = true; return; }   // #494 — defer DOM until drag ends
  const el = findColumnEl(id);
  if (!el) return;
  el.style.transition = 'opacity 200ms ease, max-width 300ms ease';
  el.style.opacity = '0';
  el.style.maxWidth = '0';
  setTimeout(() => el.remove(), 320);
}

function handleColumnRenamed({ id, name }) {
  const col = state && state.columns.find(c => c.id === id);
  if (col) col.name = name;
  const nameEl = document.querySelector(`.column[data-col="${cssEsc(id)}"] .name`);
  if (nameEl && nameEl.textContent !== name) nameEl.textContent = name;
}

function handleRevBumped({ rev, savedBy, savedAt }) {
  if (!state) return;
  state.rev = rev;
  state.savedBy = savedBy;
  state.savedAt = savedAt;
  lastRev = rev;
  // Cancel imminent poll since we have fresh data
  suppressPollUntil = Date.now() + 2000;
  setStatus('live');
}

function startSSE() {
  if (!window.EventSource) return;             // very old browser — polling will cover it
  try { _es && _es.close(); } catch (_) {}
  _es = new EventSource('/events');
  _es.addEventListener('open', () => {
    _sseConnected = true;
    setStatus('live');
  });
  _es.addEventListener('card-added',     e => handleCardAdded(JSON.parse(e.data)));
  _es.addEventListener('card-updated',   e => handleCardUpdated(JSON.parse(e.data)));
  _es.addEventListener('card-removed',   e => handleCardRemoved(JSON.parse(e.data)));
  _es.addEventListener('card-flash',     e => handleCardFlash(JSON.parse(e.data)));
  _es.addEventListener('session-divider', e => handleSessionDivider(JSON.parse(e.data)));
  _es.addEventListener('column-added',   e => handleColumnAdded(JSON.parse(e.data)));
  _es.addEventListener('column-removed', e => handleColumnRemoved(JSON.parse(e.data)));
  _es.addEventListener('column-renamed', e => handleColumnRenamed(JSON.parse(e.data)));
  _es.addEventListener('rev-bumped',     e => handleRevBumped(JSON.parse(e.data)));
  _es.addEventListener('extract_progress', e => {        // #318 BOARD-LOAD HUD
    try {
      const d = JSON.parse(e.data);
      if (!window.BoardLoadHUD) return;
      // #92 — remember a bootstrap FILL ran this HUD session (replay/speedup/solo),
      // so we only auto-reorder after a reconcile that FOLLOWED a fill (i.e. a
      // bootstrap), not after a standalone live SessionStart recon.
      if (d.phase === 'replay' || d.phase === 'speedup' || d.phase === 'solo') _bootstrapFillSeen = true;
      // #327 single-HUD: completion is driven by the backend `final` flag, NOT by
      // "done>=total" — a stage hitting 100% (replay/speedup/solo) is NOT the end,
      // it hands off to the next stage on the SAME HUD (no flash/disappear/race).
      if (d.final) {
        BoardLoadHUD.done(d.label, d.phase);
        // #92 — ONLY during bootstrap, ONLY after the reconcile finishes: glide
        // every card into time order (flipResort, FLIP animation). A standalone
        // live recon (no preceding fill) keeps the cheap one-time snap-sort.
        if (d.phase === 'reconcile' && _bootstrapFillSeen) {
          _bootstrapFillSeen = false;
          setTimeout(flipResort, 600);
        } else {
          // #101 — fill fully done; let the last card writes apply, then run the
          // one-time newest-on-top sort across all columns (self-guards to once).
          setTimeout(sortAllColumnsOnceAfterFill, 600);
        }
      } else if (d.total > 0 && d.done >= d.total) {
        // Stage reached 100% but isn't final → advance the header to the next
        // stage and stay visible. replay→speedup, speedup/solo→reconcile.
        if (d.phase === 'replay') BoardLoadHUD.handoff(d.label, 'speedup');
        else if (d.phase === 'speedup' || d.phase === 'solo') BoardLoadHUD.handoff(d.label, 'reconcile');
        else {
          // inline ('') / unknown terminal with no reconcile to follow — complete.
          BoardLoadHUD.done(d.label, d.phase);
          setTimeout(sortAllColumnsOnceAfterFill, 600);
        }
      } else BoardLoadHUD.update(d.done || 0, d.total || 0, d.label || '', d.phase || '');
    } catch (_) {}
  });
  _es.onerror = () => {
    // Browser auto-reconnects; just downgrade status badge.
    if (_sseConnected) setStatus('reconnecting…', 'unsynced');
    _sseConnected = false;
  };
}

// #526 — SSE self-heal watchdog. onerror trusts the browser's native
// EventSource auto-reconnect, which covers transient drops but NOT a terminal
// CLOSED state (readyState===2) — e.g. the server restarts and native reconnect
// gives up. A VISIBLE board would then silently stop animating until a manual
// refresh. This watchdog re-opens the stream whenever the tab is visible and
// the stream is gone (null) or terminally closed. It deliberately does NOTHING
// while hidden — the visibilitychange handler (#337) owns close-on-hide /
// reopen-on-show, and we must not fight it. Cheap (one readyState check / 5s)
// and idempotent (startSSE closes any prior handle first). The 3s poll already
// guarantees state correctness; this restores the live glide.
let _sseWatchdogTimer = null;
function startSSEWatchdog() {
  if (_sseWatchdogTimer) clearInterval(_sseWatchdogTimer);
  _sseWatchdogTimer = setInterval(() => {
    if (document.hidden) return;                       // #337 owns the hidden case
    if (!window.EventSource) return;
    // CONNECTING(0)/OPEN(1) → healthy or natively recovering; leave it.
    // null or CLOSED(2) while visible → the stream is dead; re-open it.
    if (!_es || _es.readyState === 2) startSSE();
  }, 5000);
}
// A network flap that terminally kills the stream: reconnect the instant the OS
// reports we're back online (don't wait up to 5s for the watchdog tick).
window.addEventListener('online', () => {
  if (!document.hidden && (!_es || _es.readyState === 2)) startSSE();
});

// ===== Init =====
async function init() {
  // Close modal: ESC or click on overlay backdrop
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (_openCardId) closeModal();
      else if (_tagLegendOpen) toggleTagLegend(false);
      return;
    }
    // #346 — Enter closes the open card ("go back", like clicking outside),
    // EXCEPT where Enter has a job: textareas (notes/writeup newlines), inputs
    // (tag/link/subtask add), and buttons keep it. The title contenteditable is
    // isContentEditable→excluded here; its own keydown commits then closes.
    if (e.key === 'Enter' && _openCardId
        && !e.metaKey && !e.ctrlKey && !e.shiftKey && !e.altKey) {
      const t = e.target, tag = (t && t.tagName) || '';
      const editable = tag === 'TEXTAREA' || tag === 'INPUT' || tag === 'BUTTON'
                       || (t && t.isContentEditable);
      if (!editable) { e.preventDefault(); closeModal(); return; }
    }
    // Ctrl/Cmd+Z = undo · Ctrl/Cmd+Shift+Z or Ctrl/Cmd+Y = redo.
    // Intercepts globally (including inside textareas/contentEditables) so
    // structural changes (column move, delete, etc.) can be undone from
    // anywhere on the board.
    const meta = e.metaKey || e.ctrlKey;
    if (!meta) return;
    const k = e.key.toLowerCase();
    if (k === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    else if ((k === 'z' && e.shiftKey) || k === 'y') { e.preventDefault(); redo(); }
    else if (k === '0') { e.preventDefault(); setZoom(1, true); }   // #523 — reset zoom to 100%
  });
  $('#modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // #127 — Figma-style background drag-to-pan. Grab the board background
  // (anywhere not on a column/card/button) and drag — the board pans with
  // the cursor (content follows the mouse: drag right → reveals left side).
  // Only fires when mousedown target IS #board itself; clicks on columns
  // or cards bubble first to their own handlers (no interference).
  (() => {
    const board = $('#board');
    let panning = false, startX = 0, startY = 0;
    let startScrollLeft = 0, startScrollTop = 0;
    board.addEventListener('mousedown', e => {
      if (e.target !== board) return;       // ignore clicks on children
      if (e.button !== 0) return;           // left button only
      panning = true;
      startX = e.clientX; startY = e.clientY;
      startScrollLeft = board.scrollLeft;
      startScrollTop  = board.scrollTop;
      board.style.cursor = 'grabbing';
      board.style.userSelect = 'none';
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!panning) return;
      // 2D pan — content follows cursor in any direction (Figma-style).
      board.scrollLeft = startScrollLeft - (e.clientX - startX);
      board.scrollTop  = startScrollTop  - (e.clientY - startY);
    });
    const stop = () => {
      if (!panning) return;
      panning = false;
      board.style.cursor = '';
      board.style.userSelect = '';
    };
    document.addEventListener('mouseup', stop);
    document.addEventListener('mouseleave', stop);
    // Hint on hover over empty board area — only when not currently dragging
    // a card/column (those own the cursor style).
    board.addEventListener('mouseenter', () => {
      if (!document.body.classList.contains('col-dragging-active') &&
          !document.body.classList.contains('card-dragging-active')) {
        board.style.cursor = 'grab';
      }
    });
    board.addEventListener('mouseleave', () => {
      if (!panning) board.style.cursor = '';
    });
  })();

  // Tag legend: header pill toggles, click-outside closes, clear-filter resets
  $('#tags-btn').addEventListener('click', e => {
    e.stopPropagation();
    toggleTagLegend();
  });
  $('#tag-clear').addEventListener('click', e => {
    e.stopPropagation();
    _tagFilter.clear();
    _columnFilter.clear();
    refreshTagLegend();
    render();
  });
  // Outside-click closes popover. Use mousedown (fires BEFORE click) so the
  // closest() check runs while the clicked chip is still attached to DOM.
  // If we waited for click, refreshTagLegend() would have already wiped the
  // popover body, detaching the chip — closest() returns null — and the
  // handler would incorrectly close the popover. (User can't filter
  // multiple things without reopening.)
  document.addEventListener('mousedown', e => {
    if (!_tagLegendOpen) return;
    if (e.target.closest('#tag-legend') || e.target.closest('#tags-btn')) return;
    toggleTagLegend(false);
  });

  initTooltipDelegation();

  document.querySelectorAll('#view-toggle button').forEach(b => {
    b.onclick = () => setView(b.dataset.view);
  });

  // Trash drop-zone — visible while either a column or a card is being
  // dragged. Accepts both drops; type is disambiguated by which MIME the
  // dataTransfer carries (text/col-id vs text/plain "card:<id>").
  const trash = $('#col-trash');
  trash.addEventListener('dragover', e => {
    const types = e.dataTransfer.types || [];
    const isCol  = types.includes('text/col-id');
    const isCard = types.includes('text/card-id') || types.includes('text/plain') || !!_cardDrag;
    if (!isCol && !isCard) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    trash.classList.add('over');
  });
  trash.addEventListener('dragleave', () => trash.classList.remove('over'));
  trash.addEventListener('drop', async e => {
    trash.classList.remove('over');
    e.preventDefault();

    // ── Card drop ────────────────────────────────────────────────────
    let cardId = e.dataTransfer.getData('text/card-id');
    if (!cardId) {
      const plain = e.dataTransfer.getData('text/plain') || '';
      if (plain.startsWith('card:')) cardId = plain.slice(5);
    }
    if (!cardId && _cardDrag) cardId = _cardDrag.cardId;
    if (cardId) {
      // Cancel any in-flight drag preview so the source element returns
      // to its column before the deletion animation runs.
      if (_cardDrag) cancelCardDrag();
      const card = state.cards.find(c => c.id === cardId);
      if (!card) return;
      discardCard(cardId);   // #358 — drop-to-trash now soft-deletes → Discarded col
      return;
    }

    // ── Column drop (existing behaviour) ────────────────────────────
    const colId = e.dataTransfer.getData('text/col-id');
    if (!colId) return;
    const col = state.columns.find(c => c.id === colId);
    if (!col) return;
    if (col.kind !== 'custom') {
      toast(`"${col.name}" is a default column — can't delete`);
      return;
    }
    const cardCount = state.cards.filter(c => c.column === colId).length;
    const sub = cardCount
      ? `Delete "${col.name}" — ${cardCount} card(s) → Backlog`
      : `Delete column "${col.name}"`;
    if (!(await miniConfirm('Confirm?', { sub }))) return;
    deleteColumn(colId);
  });

  setInterval(tickTimes, 15000);

  // Show where we're fetching from (helps user debug if server isn't up).
  const setupUrl = $('#setup-url');
  if (setupUrl) setupUrl.textContent = location.origin + BOARD_URL;

  try {
    await loadFromFile();
    enterApp();
    startSSE();
    startPoll();
    startSSEWatchdog();   // #526 — re-open a terminally-dead stream while visible
  } catch (e) {
    $('#setup-err').textContent =
      'Could not reach board server: ' + (e.message || e) +
      '. Run `board-steward serve` (or `python ~/.claude/skills/board-steward/scripts/serve.py`) from the project directory.';
  }
}

init();

// ═════════════════════════════════════════════════════════════════════
// LIFECYCLE SELF-TEST — DO NOT BREAK
// Console contract check for the canonical Claude-task lifecycle. Fires
// the underlying CSS+JS primitives against expected shapes/durations.
// If a new feature accidentally redefines a keyframe, renames a function,
// or strips a class, this lights up red.
//
//   Open DevTools console and type:   runLifecycle()
//
// Returns {ok, checks:[{name, pass, got?}]}. Toast on screen + grouped
// console log. Fast — does not actually move cards (use card.py sim for
// the visual end-to-end test).
// ═════════════════════════════════════════════════════════════════════
window.runLifecycle = function runLifecycle() {
  const checks = [];
  const ck = (name, pass, got) => checks.push({ name, pass: !!pass, got });

  // --- CSS contract ---------------------------------------------------
  const t = document.createElement('div');
  t.className = 'card popping-in';
  t.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
  document.body.appendChild(t);
  const cs1 = getComputedStyle(t);
  ck('popping-in animation duration ≈ 640ms',
     cs1.animationDuration === '0.64s', cs1.animationDuration);
  t.remove();

  const t2 = document.createElement('div');
  t2.className = 'column card-src-col';
  t2.style.cssText = 'position:fixed;top:-9999px;';
  document.body.appendChild(t2);
  const cs2 = getComputedStyle(t2);
  ck('card-src-col opacity ≤ 0.7',
     parseFloat(cs2.opacity) <= 0.7, cs2.opacity);
  t2.remove();

  // --- JS primitives --------------------------------------------------
  ck('simulateUserDragMove is a fn', typeof simulateUserDragMove === 'function');
  ck('flipPlayCards is a fn',        typeof flipPlayCards        === 'function');
  ck('captureCardRects is a fn',     typeof captureCardRects     === 'function');
  ck('reflowCardDragPreview is a fn',typeof reflowCardDragPreview === 'function');
  ck('commitCardDrag is a fn',       typeof commitCardDrag       === 'function');
  ck('handleCardAdded is a fn',      typeof handleCardAdded      === 'function');
  ck('handleCardUpdated is a fn',    typeof handleCardUpdated    === 'function');
  ck('flipPlayCards accepts opts arg', flipPlayCards.length >= 2);

  let rectsOk = false;
  try { rectsOk = captureCardRects() instanceof Map; } catch (_) {}
  ck('captureCardRects() → Map', rectsOk);

  // --- Report ---------------------------------------------------------
  const failures = checks.filter(c => !c.pass);
  const ok = failures.length === 0;
  const label = ok ? 'OK' : 'FAIL';
  console.group(`%clifecycle self-test: ${label}`,
                `color:${ok ? '#0a7a0a' : '#c00'};font-weight:bold;`);
  checks.forEach(c => {
    const sym = c.pass ? '✓' : '✗';
    const msg = c.got !== undefined ? `${c.name} → ${c.got}` : c.name;
    console.log(`%c${sym} ${msg}`, `color:${c.pass ? '#0a7a0a' : '#c00'}`);
  });
  console.groupEnd();

  if (typeof toast === 'function') {
    toast(ok
      ? '✓ Lifecycle self-test passed'
      : `✗ ${failures.length} lifecycle check(s) failed — see console`);
  }
  return { ok, checks };
};
</script>
