  const btn  = document.getElementById('logs-min-btn');
  if (!hud || !body || !btn) return;
  hud.dataset.minimized = min ? '1' : '0';
  if (min) {
    body.style.display = 'none';
    hud.style.height  = 'auto';
    hud.style.resize  = 'none';
    btn.textContent   = '▸';
    btn.title         = 'Expand';
  } else {
    body.style.display = '';
    let savedSize = null;
    try { savedSize = JSON.parse(localStorage.getItem(_LOGS_HUD_SIZE_KEY) || 'null'); } catch (e) {}
    if (savedSize && Number.isFinite(savedSize.w) && Number.isFinite(savedSize.h)) {
      hud.style.width  = savedSize.w + 'px';
      hud.style.height = savedSize.h + 'px';
    } else {
      hud.style.height = '240px';
    }
    hud.style.resize  = 'both';
    btn.textContent   = '▾';
    btn.title         = 'Minimize';
  }
  try { localStorage.setItem(_LOGS_HUD_MIN_KEY, min ? '1' : '0'); } catch (e) {}
}

// Start the clock once; always running while HUD exists (it's always on now).
function startLogsClock() {
  if (_logsClockTimer) return;
  _logsClockTimer = setInterval(() => {
    const el = document.getElementById('logs-clock');
    if (el) el.textContent = new Date().toTimeString().slice(0,8);
  }, 1000);
}

async function refreshLogsCommit() {
  try {
    const r = await fetch('/health');
    if (!r.ok) return;
    const j = await r.json();
    _logsCommitMeta = { sha: j.commit || '', msg: j.commitMsg || '' };
    const el = document.getElementById('logs-commit');
    if (el) {
      el.textContent = j.commit ? '@ ' + j.commit : '(no git)';
      el.title = j.commitMsg || '';
    }
    const conn = document.getElementById('logs-conn');
    if (conn) {
      const live = (j.sseClients || 0) > 0;
      conn.style.color = live ? '#9adb9a' : '#FFD479';
      conn.title = live ? `SSE live (${j.sseClients} client${j.sseClients>1?'s':''})` : 'SSE not connected';
    }
  } catch (e) {}
}

// Append a single line to the Logs HUD tail. Safe to call always — only
// renders if the HUD is open (cheap check). Used by SSE handlers.
// Optional `card` arg appends tag chips (currently just 🐞 bug) so the
// log line carries the same context the user sees on the card itself.
function logEvent(kind, summary, card) {
  const body = document.getElementById('logs-hud-body');
  if (!body) return;
  const line = document.createElement('div');
  const t = new Date().toTimeString().slice(0,8);
  const colorByKind = {
    'add':    '#9adb9a',
    'move':   '#7fb9ff',
    'remove': '#ff8a7a',
    'col':    '#FFD479',
    'sys':    '#a09ab8',
  };
  const color = colorByKind[kind] || '#cfd6df';
  const esc = s => String(s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
  let tagSuffix = '';
  if (card && (card.tags || []).includes('bug')) {
    tagSuffix = ' <span style="color:#ff6b6b;font-weight:600;">[🐞 bug]</span>';
  }
  line.innerHTML = `<span style="color:#777;">${t}</span> <span style="color:${color};">${kind.toUpperCase().padEnd(6, ' ')}</span> ${esc(summary)}${tagSuffix}`;
  body.insertBefore(line, body.firstChild);
  while (body.childNodes.length > 30) body.removeChild(body.lastChild);
}
document.addEventListener('DOMContentLoaded', () => {
  _dbgHud();
  dbg('HUD ready — drag a column (grip) or a card');
  document.addEventListener('dragstart', e => {
    const t = e.target;
    dbg('DOC dragstart on <' + (t && t.tagName) + '>.' + (t && t.className && t.className.toString().slice(0,30)) + ' draggable=' + (t && t.draggable));
  }, true);
  document.addEventListener('mousedown', e => {
    const t = e.target;
    const cardAnc = t.closest && t.closest('.card');
    const colAnc  = t.closest && t.closest('.column');
    dbg('mdown <' + t.tagName + '>.' + String(t.className || '').slice(0,24)
        + (cardAnc ? ' [in .card draggable=' + cardAnc.draggable + ']'
                   : colAnc ? ' [in .column NO CARD]'
                            : ' [outside]'));
  }, true);
});

// ===== Edge auto-scroll while dragging (#332, orig. #303) ===============
// Native HTML5 DnD can't scroll a container mid-drag, so on a trackpad you
// can't drag a card to a column that's scrolled off-screen — the long Done
// column especially (card is "very low", you can't reach the drop target).
// This pans the relevant scroll container when the cursor nears an edge,
// speed ramping with proximity. Two axes: #board scrolls horizontally
// (between columns), each .column-body scrolls vertically (within a column).
// Trello/Linear/Notion all do this; the user just drags toward the edge and
// the board follows. Self-contained: driven only by document-level drag
// events, so it leaves the existing per-element drag handlers untouched.
const _AS = { x: 0, y: 0, active: false, raf: null };
const AS_EDGE = 60;        // px from an edge where panning starts
const AS_MAX_SPEED = 18;   // px/frame at the very edge (~1000px/s @60fps)

// dist = px the cursor sits INSIDE the edge zone (0 = on the edge). Closer to
// the edge → faster. Returns 0 outside the zone so callers can branch on it.
function _asRamp(dist) {
  if (dist >= AS_EDGE) return 0;
  const t = Math.max(0, Math.min(1, (AS_EDGE - dist) / AS_EDGE));
  return Math.ceil(t * AS_MAX_SPEED);
}
function _asStep() {
  const x = _AS.x, y = _AS.y;
  // Horizontal pan across the whole board (reach off-screen columns).
  const board = document.getElementById('board');
  if (board) {
    const r = board.getBoundingClientRect();
    if (x < r.left + AS_EDGE)        board.scrollLeft -= _asRamp(x - r.left);
    else if (x > r.right - AS_EDGE)  board.scrollLeft += _asRamp(r.right - x);
  }
  // Vertical pan within the column the cursor is currently over (reach a card
  // far down a long column). elementFromPoint resolves the live hover target.
  const el = document.elementFromPoint(x, y);
  const body = el && el.closest ? el.closest('.column-body') : null;
  if (body) {
    const r = body.getBoundingClientRect();
    if (y < r.top + AS_EDGE)         body.scrollTop -= _asRamp(y - r.top);
    else if (y > r.bottom - AS_EDGE) body.scrollTop += _asRamp(r.bottom - y);
  }
}
function _asStart() {

// ===== Column stacking schema (#117 — schema only; no render impact yet) =====
// A column may sit BELOW another column in a vertical stack via the
// `stackUnder` field. null/missing = top-level column with its own slot in
// the horizontal flex layout. Non-null = sits directly under its parent.
//
// Render (added in #117 part 2) walks state.columns in array order, groups by
// stack root, and lays out each root → its descendants as one vertical stack
// container. Until then, all columns stay flat regardless of stackUnder value
// — these helpers are dormant.

// dangling parent refs (parent deleted) are reset to null; cycles get broken
// at the first repeat (the offender becomes a root).

  roots.forEach(r => walkStack(r.id).forEach(c => out.push(c)));
  // Safety: append any column the walk missed (cycle survivor / orphan).

// Capture all column bounding rects (FLIP "first" step).

  const map = new Map();
  document.querySelectorAll('#board .column').forEach(c => {
    map.set(c.dataset.col, c.getBoundingClientRect());
  });
  return map;
}

// FLIP "last/invert/play": after a re-render, animate each column from
// where it WAS (in oldRects) to where it IS (current rect).
function flipPlayColumns(oldRects) {
  if (!oldRects) return;
  document.querySelectorAll('#board .column').forEach(c => {
    const id = c.dataset.col;
    const oldR = oldRects.get(id);
    if (!oldR) return;
    const newR = c.getBoundingClientRect();
    const dx = oldR.left - newR.left;
    const dy = oldR.top  - newR.top;
    if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
    c.animate(
      [
        { transform: `translate(${dx}px, ${dy}px)` },
        { transform: 'translate(0, 0)' },
      ],
      // #119 — slowed 360 → 1080ms (1/3 speed) per user request for column reflow.
      { duration: 1080, easing: 'cubic-bezier(0.34, 1.4, 0.64, 1)' }
    );
  });
}

// #119 — card-level FLIP. Mirrors captureColumnRects/flipPlayColumns but

function captureCardRects() {

}

  document.querySelectorAll('.card[data-card-id]').forEach(c => {
    const id = c.dataset.cardId;
    const oldR = oldRects.get(id);

      [

function reorderColumn(srcId, targetId) {
  if (!state) return;
  const cols = state.columns;
  const si = cols.findIndex(c => c.id === srcId);
  const ti = cols.findIndex(c => c.id === targetId);
  if (si < 0 || ti < 0 || si === ti) return;
  pushUndo();
  const old = _colDragRects;       // captured at dragstart
  const src = cols[si];
  // Reordering implies "back to top-level row" — if src was stacked, free it.
  if (src.stackUnder) src.stackUnder = null;
  const [moved] = cols.splice(si, 1);
  cols.splice(ti, 0, moved);
  scheduleSave();
  render();
  requestAnimationFrame(() => flipPlayColumns(old));

  // computed relative to the dragstart snapshot so the result depends only

  // frame, animations stack, and unrelated columns visibly vibrate.

  const snap = _colDragSnapshot;
  const si = snap.findIndex(c => c.id === srcId);
  const ti = snap.findIndex(c => c.id === targetId);
  if (si < 0 || ti < 0 || si === ti) return;
  const old = captureColumnRects();
  const next = snap.map(c => ({ ...c }));
  const wasStacked = !!next[si].stackUnder;
  if (wasStacked) next[si].stackUnder = null;  // free from stack on horizontal drag
  const [moved] = next.splice(si, 1);

  // toward src's old slot). For stacked source, src had no row slot; the
  // removal didn't shift target visually, so we want moved to LAND at the
  // target's current slot and push the target away. Use target's post-removal
  // index in that case.
  let insertAt = ti;

  const cols = state.columns;

  const parent = cols.find(c => c.id === parentId);
  if (!src || !parent) return;
  // Cycle guard: walk parent's descendants; if src appears, refuse.
  const descendantOfSrc = walkStack(srcId).some(c => c.id === parentId);
  if (descendantOfSrc) { toast('Cycle blocked'); return; }
  if (src.stackUnder === parentId) return;  // no-op
  pushUndo();
  const old = _colDragRects;
  src.stackUnder = parentId;

  render();

// #119 — preview the dragged card's would-be slot in the hover column by
// physically moving the element + animating displaced siblings via FLIP.
// No state mutation; on commitCardDrag the state catches up to the DOM.
function reflowCardDragPreview() {
  if (!_cardDrag || !_cardDrag.srcEl) return;
  const targetCol = document.querySelector(
    `.column[data-col="${_cardDrag.hoverCol}"] .column-body`

  if (!targetCol) return;

  // when the cursor moves within the same insertion zone).
  const cur = _cardDrag.srcEl.parentElement;
  const curNext = _cardDrag.srcEl.nextElementSibling;
  const wantNextId = _cardDrag.hoverBeforeCardId;
  const wantNextEl = wantNextId ? targetCol.querySelector(`[data-card-id="${wantNextId}"]`) : null;

  // settled positions, not mid-animation transforms (was causing vibration
  // when dragover fired faster than animations completed).
  document.querySelectorAll('.card[data-card-id]').forEach(c => {
    c.getAnimations().forEach(a => a.finish());
  });
  const rects = captureCardRects();
  targetCol.insertBefore(_cardDrag.srcEl, wantNextEl);
  _cardDragRects = rects;

// Commit the previewed position to state on drop. Computes insertion index

// drag-order within a priority bucket.
function commitCardDrag() {

  if (!card) { _cardDrag = null; return; }

  const srcIdx = state.cards.indexOf(card);
  state.cards.splice(srcIdx, 1);

    insertIdx = state.cards.findIndex(c => c.id === _cardDrag.hoverBeforeCardId);
    if (insertIdx < 0) insertIdx = state.cards.length;
  } else {
    // append-at-end of the hover column → place after the last card already
    // in that column to keep neighbors stable.

    insertIdx = lastIdx + 1;

// Canonical NON-DRAG move — the one source of truth for moving a card to a
// column without dragging: the editor's Column <select> and the card kebab
// "Move to" menu (#333) both call this. Mirrors commitCardDrag's side-effects

  const fromCol = card.column;
  const rects = captureCardRects();          // FLIP: positions before the move
  pushUndo();
  card.column = targetCol;
  card.updatedAt = now();
  if (targetCol === 'done' && !card.doneAt) card.doneAt = card.updatedAt;
  if (targetCol !== 'done') card.doneAt = null;
  recordMove(card, fromCol, targetCol);      // #258 movement history
  // #254 — active-work follows a move into / out of In Progress (persisted).
  if (targetCol === 'inprogress' && fromCol !== 'inprogress') state.activeWorkId = card.id;
  else if (fromCol === 'inprogress' && targetCol !== 'inprogress' && state.activeWorkId === card.id) state.activeWorkId = null;
  scheduleSave();

  requestAnimationFrame(() => flipPlayCards(rects, { duration: 480 }));

function cancelCardDrag() {
  if (!_cardDrag) return;
  _cardDrag = null;
  _cardDragRects = null;
  render();   // canonical state wins → undoes any DOM-only preview moves
}

function deleteColumn(id) {
  if (!state) return;
  const col = state.columns.find(c => c.id === id);
  if (!col) return;
  pushUndo();
  // Reassign cards in this column → 'backlog' (don't orphan them in state).
  let moved = 0;
  state.cards.forEach(c => {
    if (c.column === id) { c.column = 'backlog'; c.updatedAt = now(); moved++; }
  });
  state.columns = state.columns.filter(c => c.id !== id);
  scheduleSave(); render();
  toast(moved > 0
    ? `Column "${col.name}" deleted · ${moved} card(s) → Backlog`
    : `Column "${col.name}" deleted`);
}

const $ = s => document.querySelector(s);
const now = () => new Date().toISOString();
const uid = (p='c') => p + '-' + Math.random().toString(36).slice(2,9);

function fmtTime(s) {
  if (!s) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d = new Date(s);
  if (isNaN(d)) return s;
  const yr = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${yr}-${mo}-${dy} ${hh}:${mm}`;
}

// Local-frame YYYY-MM-DD (NOT toISOString — that's UTC and breaks day comparison
// for non-UTC timezones, e.g. SGT at 11am local = previous day in UTC).
function localYmd(d) {
  if (!(d instanceof Date)) d = new Date(d);
  if (isNaN(d)) return '';
  const yr = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  return `${yr}-${mo}-${dy}`;
}

// Human-friendly relative time: "3d ago", "2h ago", "just now"
function relativeTime(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 45) return 'just now';
  if (diff < 3600)   return Math.floor(diff/60)    + 'm ago';
  if (diff < 86400)  return Math.floor(diff/3600)  + 'h ago';
  const days = Math.floor(diff/86400);
  if (days === 1) return 'yesterday';
  if (days < 30)  return days + 'd ago';
  if (days < 365) return Math.floor(days/30) + 'mo ago';
  return Math.floor(days/365) + 'y ago';
}

// ===== JS tooltip (body-level — escapes overflow:hidden ancestors) =====
let _tooltipEl = null;
function ensureTooltipEl() {
  if (_tooltipEl) return _tooltipEl;
  _tooltipEl = document.createElement('div');

  document.body.appendChild(_tooltipEl);
  return _tooltipEl;
}
function showTooltip(target, text) {
  if (!text) return;
  const tip = ensureTooltipEl();
  tip.textContent = text;
  tip.style.left = '-9999px';
  tip.style.top  = '0px';
  tip.classList.add('show');
  const r  = target.getBoundingClientRect();
  const tr = tip.getBoundingClientRect();
  const M = 8;
  // #243 — per-target placement override via data-tip-placement="right".
  // Right-of-target, vertically centered, flip-to-left at right edge is the
  // industry standard for dense list/calendar rows (Google Cal, Linear,
  // Asana). Default stays 'below' for the rest of the board.
  const place = target.getAttribute('data-tip-placement') || 'below';
  let top, left;
  if (place === 'right') {
    left = r.right + M;
    if (left + tr.width > window.innerWidth - M) {
      // No room on the right → place to the left of the target instead
      left = Math.max(M, r.left - tr.width - M);
    }
    top = r.top + r.height / 2 - tr.height / 2;
    top = Math.max(M, Math.min(top, window.innerHeight - tr.height - M));
  } else {
    // Default: below the target; flip above if not enough room
    top = r.bottom + M;
    if (top + tr.height > window.innerHeight - M) {
      top = Math.max(M, r.top - tr.height - M);
    }
    left = r.left + r.width / 2 - tr.width / 2;
    left = Math.max(M, Math.min(left, window.innerWidth - tr.width - M));
  }
  tip.style.left = left + 'px';
  tip.style.top  = top  + 'px';
}
function hideTooltip() {
  if (_tooltipEl) _tooltipEl.classList.remove('show');
}

// First call (prev empty) seeds the snapshot without flashing anything.
function detectChangesAndSnapshot() {
  const flash = new Set();
  const next = new Map();
  const cards = (state && state.cards) || [];
  const seeding = _prevSnapshot.size === 0;
  for (const c of cards) {
    const k = (c.updatedAt || '') + '|' + (c.column || '');
    next.set(c.id, k);
    if (!seeding) {
      const prev = _prevSnapshot.get(c.id);
      if (prev === undefined || prev !== k) flash.add(c.id);
    }
  }
  _flashIds = flash;
  _prevSnapshot = next;
}

// v2: live header "↻ updated Xs ago" — ticks every 1s. Stale (>5min) → amber.
function tickLastUpdate() {
  const el = $('#last-update');
  if (!el) return;
  if (!state || !state.savedAt) { el.textContent = ''; return; }
  const ageSec = (Date.now() - new Date(state.savedAt).getTime()) / 1000;
  el.textContent = '↻ ' + relativeTime(state.savedAt);
  el.classList.toggle('stale', ageSec > 300);
}

// Refresh every visible card-time element from its card's createdAt — cheap.
// Doesn't touch any other DOM (preserves focus, modal state, scroll).
function tickTimes() {
  if (!state) return;
  document.querySelectorAll('.card-time').forEach(el => {
    const cardEl = el.closest('.card');
    if (!cardEl) return;
    const card = state.cards.find(c => c.id === cardEl.dataset.cardId);
    if (!card || !card.createdAt) return;
    const next = relativeTime(card.createdAt);
    if (el.textContent !== next) el.textContent = next;
  });
}

function initTooltipDelegation() {
  document.addEventListener('mouseover', e => {
    const t = e.target.closest && e.target.closest('[data-tip]');
    if (t) showTooltip(t, t.getAttribute('data-tip'));
  });
  document.addEventListener('mouseout', e => {
    const t = e.target.closest && e.target.closest('[data-tip]');
    if (t) hideTooltip();
  });
  // Hide on scroll/resize so it doesn't stick in the wrong place
  window.addEventListener('scroll', hideTooltip, true);
  window.addEventListener('resize', hideTooltip);
}

function setStatus(text, kind) {

  // beside the title). Keep state on the wrapper class for color cues.
  const tx = $('#status-text');

  clearTimeout(showAutoCardToast._closeT);
  const src = (card.meta && card.meta.autoSource) ? card.meta.autoSource : '';
  const title = (card.title || '').slice(0, 80);
  const colName = (state && state.columns ? state.columns.find(c => c.id === card.column) : null);
  const colLabel = (colName && colName.name) || card.column || '';
  t.innerHTML = '';
  const row = document.createElement('div'); row.className = 'ut-row';
  const icon = document.createElement('span'); icon.className = 'ut-icon'; icon.textContent = '✨';
  const body = document.createElement('div'); body.className = 'ut-body';
  const tt = document.createElement('div'); tt.className = 'ut-title';
  tt.textContent = `Auto-added #${card.num} → ${colLabel}`;
  const sub = document.createElement('div'); sub.className = 'ut-sub';
  sub.textContent = src ? `"${src}" — ${title}` : title;
  body.appendChild(tt); body.appendChild(sub);
  const keep = document.createElement('button'); keep.className = 'ut-btn'; keep.textContent = 'Keep';
  const undoBtn = document.createElement('button'); undoBtn.className = 'ut-btn primary'; undoBtn.textContent = 'Undo';
  row.appendChild(icon); row.appendChild(body); row.appendChild(keep); row.appendChild(undoBtn);
  const bar = document.createElement('div'); bar.className = 'ut-bar';
  const fill = document.createElement('div'); fill.className = 'ut-bar-fill';
  bar.appendChild(fill);
  t.appendChild(row); t.appendChild(bar);
  t.classList.add('show');
  // Drive the timer bar via WAAPI so it stays in lock-step with auto-dismiss.
  if (fill.animate) {
    fill.animate(
      [{ transform: 'scaleX(1)' }, { transform: 'scaleX(0)' }],
      { duration: ms, easing: 'linear', fill: 'forwards' }
    );
  }
  const close = () => {
    t.classList.remove('show');
    clearTimeout(showAutoCardToast._t);
  };
  keep.onclick = close;
  undoBtn.onclick = () => {
    close();
    if (!state) return;
    const idx = state.cards.findIndex(c => c.id === card.id);
    if (idx < 0) { toast('Already gone'); return; }
    pushUndo();
    state.cards.splice(idx, 1);
    render();
    scheduleSave();
    toast(`Undid #${card.num}`);
  };
  showAutoCardToast._t = setTimeout(close, ms);
}
// OS-aware undo hint. Mac uses ⌘; Linux/Windows use Ctrl. Detection prefers
// userAgentData (modern), falls back to navigator.platform (legacy reliable
// for Mac sniff). Computed once at script load — OS doesn't change at runtime.
const IS_MAC = (() => {
  const p = (navigator.userAgentData && navigator.userAgentData.platform) || navigator.platform || '';
  return /mac|iphone|ipad|ipod/i.test(p);
})();
function undoHint() { return IS_MAC ? '⌘+Z' : 'Ctrl+Z'; }

// Small async confirm dialog (boho-styled). Resolves true/false.
// opts: { sub?: string, okText?: string, okClass?: 'danger'|'primary' }
function miniConfirm(msg = 'Confirm?', opts = {}) {
  return new Promise(resolve => {
    const overlay = $('#mini-confirm-overlay');
    const msgEl   = overlay.querySelector('.mc-msg');
    const subEl   = $('#mc-sub');
    const okBtn   = $('#mc-ok');
    const cxBtn   = $('#mc-cancel');
    msgEl.textContent = msg;
    if (opts.sub) { subEl.textContent = opts.sub; subEl.style.display = ''; }
    else          { subEl.textContent = '';        subEl.style.display = 'none'; }
    okBtn.textContent = opts.okText || 'Delete';
    okBtn.className = 'mc-btn ' + (opts.okClass || 'danger');
    overlay.classList.add('show');

    const cleanup = () => {
      overlay.classList.remove('show');
      okBtn.onclick = cxBtn.onclick = null;
      overlay.onclick = null;
      document.removeEventListener('keydown', onKey);
    };
    const onKey = e => {
      if (e.key === 'Escape') { cleanup(); resolve(false); }
      else if (e.key === 'Enter') { cleanup(); resolve(true); }
    };
    okBtn.onclick = () => { cleanup(); resolve(true); };
    cxBtn.onclick = () => { cleanup(); resolve(false); };
    overlay.onclick = e => {
      if (e.target === overlay) { cleanup(); resolve(false); }
    };
    document.addEventListener('keydown', onKey);
    // Focus the primary action so Enter confirms by default.
    setTimeout(() => okBtn.focus(), 30);
  });
}

// ===== HTTP IO (v3: same-origin fetch to board-steward serve) =====
function _absorbState(incoming) {
  state = incoming;
  if (state.nextNum == null) {
    state.nextNum = (state.cards || []).reduce((m, c) => Math.max(m, c.num || 0), 0) + 1;
  }
  migrateStackUnder(state);
  lastRev = state.rev || 0;
  pendingDirty = false;
  if (document.getElementById('board-title')) applyBoardTitle();
  if (document.getElementById('tag-legend-list')) refreshTagLegend();
}
async function loadFromFile() {
  const r = await fetch(BOARD_URL, { cache: 'no-store' });
  if (!r.ok) throw new Error(`GET ${BOARD_URL} → ${r.status}`);
  _absorbState(await r.json());
  detectChangesAndSnapshot();   // v2: seed snapshot on first load (no flash)
  render();
  tickLastUpdate();
  setStatus('live');
}
async function save(by='user') {
  state.rev = (state.rev || 0) + 1;
  state.savedAt = new Date().toISOString();
  state.savedBy = by;
  lastRev = state.rev;
  try {
    const r = await fetch(BOARD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    });
    if (!r.ok) throw new Error(`POST → ${r.status}`);
    suppressPollUntil = Date.now() + 2000;
    pendingDirty = false;
    setStatus('live');
  } catch (e) {
    setStatus('save failed: ' + (e.message || e), 'error');
  }
}
function scheduleSave() {
  pendingDirty = true;
  setStatus('saving…', 'unsynced');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => save('user'), 400);
}

// ===== Undo / Redo =====
// Snapshot strategy: deep-clone the mutable parts of state (cards, columns,
// title) before each user-initiated mutation. Stack capped at _UNDO_CAP.
// Text inputs (notes, writeup, card title) snapshot ONCE on focus — not per
// keystroke — so undo restores the pre-edit state cleanly.
let _undoStack = [];
let _redoStack = [];
const _UNDO_CAP = 80;

function _snapState() {
  if (!state) return null;
  return JSON.stringify({
    title: state.title || '',
    columns: state.columns || [],
    cards: state.cards || [],
  });
}
function _restoreSnap(snap) {
  const o = JSON.parse(snap);
  state.title = o.title;
  state.columns = o.columns;
  state.cards = o.cards;
}
function pushUndo() {
  const s = _snapState();
  if (s === null) return;
  // De-dupe — don't push identical consecutive snapshots (e.g. focus-with-no-edit).
  if (_undoStack.length && _undoStack[_undoStack.length - 1] === s) return;
  _undoStack.push(s);
  if (_undoStack.length > _UNDO_CAP) _undoStack.shift();
  _redoStack.length = 0;
}
function undo() {
  if (!_undoStack.length) { toast('Nothing to undo'); return; }
  // Blur any focused editor so its post-edit state isn't re-committed onto
  // the restored snapshot.
  if (document.activeElement && document.activeElement.blur) {
    try { document.activeElement.blur(); } catch (_) {}
  }
  const cur = _snapState();
  const prev = _undoStack.pop();
  if (cur && cur !== prev) _redoStack.push(cur);
  _restoreSnap(prev);
  applyBoardTitle();
  scheduleSave();
  render();
  refreshTagLegend();
  toast('Undo');
}
function redo() {
  if (!_redoStack.length) { toast('Nothing to redo'); return; }
  if (document.activeElement && document.activeElement.blur) {
    try { document.activeElement.blur(); } catch (_) {}
  }
  const cur = _snapState();
  const next = _redoStack.pop();
  if (cur && cur !== next) _undoStack.push(cur);
  _restoreSnap(next);
  applyBoardTitle();
  scheduleSave();
  render();
  refreshTagLegend();
  toast('Redo');
}

// Arm a "snap on first edit" handler for a text field — captures the
// pre-edit state once on focus so Ctrl+Z restores it. Safe to attach to
// inputs, textareas, contentEditable nodes.
function armUndoOnFocus(el) {
  if (!el || el.dataset.undoArmed === '1') return;
  el.dataset.undoArmed = '1';
  el.addEventListener('focus', () => { pushUndo(); }, true);
}
function isUserEditing() {
  const a = document.activeElement;
  return a && (a.isContentEditable || a.tagName === 'TEXTAREA' || a.tagName === 'INPUT');
}
function startPoll() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (pendingDirty) return;
    if (Date.now() < suppressPollUntil) return;
    if (isUserEditing()) return;
    try {
      const r = await fetch(BOARD_URL, { cache: 'no-store' });
      if (!r.ok) return;
      const incoming = await r.json();
      if ((incoming.rev || 0) !== lastRev) {
        _absorbState(incoming);
        detectChangesAndSnapshot();   // v2: mark changed cards for flash
        render();
        tickLastUpdate();
        setStatus('live');
        toast(state.savedBy === 'claude' ? '↻ Board updated by Claude' : '↻ Board updated');
      }
    } catch (e) { /* transient — server might be restarting */ }
  }, 3000);
}

// #337 — tab refocus. A backgrounded tab is throttled, so live SSE card-added
// events QUEUE; on return they flush in a burst, each replaying its pop-in →
// "the whole board re-flies to catch up" (most visible mid-fill). Instead, open
// a short suppress window and snap straight to canonical truth in one silent
// re-sync. The queued events then find their cards already in the DOM (add =
// no-op) or already at their final spot (move = zero FLIP delta), so nothing
// re-flies — the board just continues where reality is.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  _animSuppressUntil = Date.now() + 1200;   // cover the flush + this re-sync
  fetch(BOARD_URL, { cache: 'no-store' })
    .then(r => (r.ok ? r.json() : null))
    .then(incoming => {
      if (incoming && (incoming.rev || 0) !== lastRev) {
        _absorbState(incoming);
        render();            // playEntrance() self-suppresses via _animSuppressed()
        tickLastUpdate();
        setStatus('live');
      }
    })
    .catch(() => { /* transient */ });
});

// ===== Subtask tree helpers =====
function countSubtasks(nodes) {
  let total = 0, done = 0;
  const walk = ns => ns.forEach(n => { total++; if (n.done) done++; if (n.children) walk(n.children); });
  walk(nodes || []);
  return { total, done };
}
function deleteSubtaskByPath(rootArr, path) {
  if (path.length === 1) { rootArr.splice(path[0], 1); return; }
  const idx = path[0]; // path[1] === 'children'
  deleteSubtaskByPath(rootArr[idx].children || [], path.slice(2));
}
// Stamp both card.updatedAt and card.lastTouchedSubtask whenever subtask state
// changes — so traversal can sort by "real activity" not just card-level edits.
function touchSubtask(card) {
  const ts = now();
  card.updatedAt = ts;
  card.lastTouchedSubtask = ts;
}

// ===== Card-link helpers (bidirectional) =====
function addCardLink(cardA, cardB) {
  if (cardA.id === cardB.id) return;
  if (!cardA.linkedCards) cardA.linkedCards = [];
  if (!cardB.linkedCards) cardB.linkedCards = [];
  if (!cardA.linkedCards.includes(cardB.id)) cardA.linkedCards.push(cardB.id);
  if (!cardB.linkedCards.includes(cardA.id)) cardB.linkedCards.push(cardA.id);
  cardA.updatedAt = now();
  cardB.updatedAt = now();
}
function removeCardLink(cardA, cardB) {
  if (cardA.linkedCards) cardA.linkedCards = cardA.linkedCards.filter(id => id !== cardB.id);
  if (cardB.linkedCards) cardB.linkedCards = cardB.linkedCards.filter(id => id !== cardA.id);
  cardA.updatedAt = now();
  cardB.updatedAt = now();
}

// ===== Day-header formatting (Done column grouping) =====
function formatDayHeader(ymd) {
  if (!ymd || ymd.length < 10) return ymd || 'No date';
  ymd = ymd.slice(0, 10);
  const [y, m, d] = ymd.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today = new Date();
  const todayYmd = localYmd(today);
  const yesterdayYmd = localYmd(new Date(today.getTime() - 86400000));
  if (ymd === todayYmd)      return `Today · ${d} ${months[m-1]} ${y}`;
  if (ymd === yesterdayYmd)  return `Yesterday · ${d} ${months[m-1]} ${y}`;
  return `${d} ${months[m-1]} ${y}`;
}

// ===== Reusable bits =====
function makePrioChip(card) {
  const btn = document.createElement('button');
  const pset = card.priority || 'unset';
  btn.className = 'prio-chip ' + pset;
  btn.title = 'Priority: ' + (card.priority || 'unset') + ' — click to cycle';
  btn.onclick = (e) => {
    e.stopPropagation();
    const cycle = { critical: 'mid', mid: 'low', low: null, null: 'critical' };
    card.priority = cycle[card.priority ?? 'null'];
    card.updatedAt = now();
    scheduleSave(); render();
  };
  return btn;
}
function makeNumRef(card) {
  const el = document.createElement('span');
  el.className = 'num-ref';
  el.textContent = card.num != null ? card.num : '?';
  el.title = 'Global item number — click to copy "#' + card.num + '"';
  el.onclick = (e) => {
    e.stopPropagation();
    const ref = '#' + card.num + (card.code ? ' ' + card.code : '');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(ref).then(() => toast('Copied: ' + ref)).catch(() => {});
    }
  };
  return el;
}
function makeBadge(card, editable=false) {
  const b = document.createElement('span');
  b.className = 'badge';
  b.textContent = card.code || '';
  if (editable) {
    b.contentEditable = 'true';
    b.title = 'Edit code/badge';
    b.addEventListener('click', e => e.stopPropagation());
    b.addEventListener('blur', () => {
      const v = b.textContent.trim();
      if (v !== (card.code || '')) { card.code = v; card.updatedAt = now(); scheduleSave(); render(); }
    });
    b.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); b.blur(); } });
  }
  return b;
}

// ===== Render: compact card (home view) =====
function renderCardCompact(card) {
  const el = document.createElement('div');
  el.className = 'card';
  if (card.priority) el.classList.add('prio-' + card.priority);
  if ((card.tags || []).includes('bug')) el.classList.add('is-bug');
  if (_tagFilter.size && !(card.tags || []).some(t => _tagFilter.has(t))) el.classList.add('dim-by-filter');
  if (_columnFilter.size && !_columnFilter.has(card.column)) el.classList.add('dim-by-filter');
  el.draggable = true;
  el.dataset.cardId = card.id;
  el.dataset.col = card.column;
  // v2: one-shot flash if this card changed since the last poll.
  if (_flashIds.has(card.id)) {
    el.classList.add('flashing');
    setTimeout(() => el.classList.remove('flashing'), 1300);
  }

  el.addEventListener('dragstart', e => {
    // Safari rejects custom MIME types; mirror the id into text/plain so
    // mouse-drag works in every browser. text/card-id is kept for back-compat.
    e.dataTransfer.setData('text/plain', 'card:' + card.id);
    try { e.dataTransfer.setData('text/card-id', card.id); } catch (_) {}
    e.dataTransfer.effectAllowed = 'move';
    el.classList.add('dragging');
    // Show the trash zone while a card is mid-drag (mirrors col drag).
    document.body.classList.add('card-dragging-active');
    // #119 — seed live-reflow state. hover slot is filled on first dragover.
    _cardDrag = {
      cardId: card.id,
      srcCol: card.column,
      srcEl: el,
      hoverCol: card.column,
      hoverBeforeCardId: null,
    };
    // #119 — dim source column to signal "card is leaving here".
    const srcColEl = document.querySelector('.column[data-col="' + card.column + '"]');
    if (srcColEl) srcColEl.classList.add('card-src-col');
    dbg('dragstart ' + card.id + ' from ' + card.column);
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.body.classList.remove('card-dragging-active');
    document.querySelectorAll('.column.card-src-col')
      .forEach(c => c.classList.remove('card-src-col'));
    dbg('dragend (cardDrag=' + (_cardDrag ? 'pending' : 'committed') + ')');
    // #119 — if drop already committed, _cardDrag is null and this is a no-op.
    // Otherwise (drag cancelled outside any drop target), restore via render.
    if (_cardDrag) cancelCardDrag();
  });
  el.addEventListener('click', e => {
    if (e.target.closest('.prio-chip, .num-ref')) return;
    openModal(card.id);
  });
  // Right-click → confirm + delete. Same path as the modal Delete button
  // and the drag-to-trash zone (see deleteCard helper).
  // #333 — right-click opens the card action menu (Move to / Delete) instead
  // of jumping straight to a delete confirm. Delete now lives inside that menu.
  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    openCardMenu(card, e.clientX, e.clientY);
  });

  const head = document.createElement('div');
  head.className = 'card-head';
  head.appendChild(makePrioChip(card));
  head.appendChild(makeNumRef(card));
  if (card.code) head.appendChild(makeBadge(card, false));
  // Origin tooltip icon — only if origin text present
  if (card.origin && card.origin.trim()) {
    const tip = document.createElement('span');
    tip.className = 'tip-icon';
    tip.setAttribute('data-tip', card.origin);
    // #244 — right-side placement so origin tip doesn't cover the card below.
    tip.setAttribute('data-tip-placement', 'right');
    tip.textContent = 'i';
    tip.onclick = (e) => e.stopPropagation();
    head.appendChild(tip);
  }
  // Relative-time pushed to far right of the head row (margin-left: auto)
  // Saves a row of vertical height vs. having time below the card.
  if (card.createdAt) {
    const tm = document.createElement('div');
    tm.className = 'card-time';
    tm.textContent = relativeTime(card.createdAt);
    tm.setAttribute('data-tip',
      `created : ${fmtTime(card.createdAt)}` +
      (card.updatedAt && card.updatedAt !== card.createdAt ? `\nupdated : ${fmtTime(card.updatedAt)} (${relativeTime(card.updatedAt)})` : '') +
      (card.lastTouchedSubtask ? `\nsubtask : ${fmtTime(card.lastTouchedSubtask)} (${relativeTime(card.lastTouchedSubtask)})` : '') +
      (card.doneAt ? `\ndone    : ${fmtTime(card.doneAt)} (${relativeTime(card.doneAt)})` : '')
    );
    tm.setAttribute('data-tip-placement', 'right');
    tm.onclick = (e) => e.stopPropagation();
    head.appendChild(tm);
  }
  // #333 — kebab ⋯ opens the card action menu. Right-aligned: card-time (when
  // present) already carries margin-left:auto so the kebab sits just right of
  // it; otherwise the kebab carries the auto-margin itself.
  const kebab = document.createElement('button');
  kebab.className = 'card-kebab';
  kebab.textContent = '⋯';
  kebab.title = 'Card actions';
  kebab.setAttribute('aria-label', 'Card actions');
  if (!card.createdAt) kebab.style.marginLeft = 'auto';
  kebab.onclick = (e) => {
    e.stopPropagation();                       // don't open the card editor
    const r = kebab.getBoundingClientRect();
    openCardMenu(card, r.right, r.bottom + 4);
  };
  head.appendChild(kebab);
  el.appendChild(head);

  const title = document.createElement('div');
  title.className = 'card-title';
  title.textContent = card.title || '(untitled)';
  el.appendChild(title);

  // Live progress bar for cards tagged 'banner' (e.g. hourly_extractor's
  // "🔄 extracting N/M chunks…"). Parses the first "N/M" from title or
  // notes and renders a visual bar. Updates automatically via SSE
  // card-updated events because renderCardCompact re-runs.
  if ((card.tags || []).includes('banner')) {
    const txt = (card.title || '') + ' ' + (card.notes || '');
    const m = txt.match(/(\d+)\s*\/\s*(\d+)/);
    if (m) {
      const done = parseInt(m[1], 10), total = parseInt(m[2], 10);
      const pct = total > 0 ? Math.round(done / total * 100) : 0;
      const p = document.createElement('div');
      p.className = 'card-progress';
      p.innerHTML = `<span>${done}/${total} (${pct}%)</span>`
        + `<div class="bar"><div style="width:${pct}%"></div></div>`;
      el.appendChild(p);
      el.classList.add('is-banner');
    }
  }

  if (card.tags && card.tags.length) {
    const tags = document.createElement('div');
    tags.className = 'card-tags';
    card.tags.forEach(t => {
      const ch = document.createElement('span');
      ch.className = 'tag';
      ch.style.setProperty('--tag-c', tagColor(t));
      ch.textContent = t === 'aging-30d+' ? '⏰ aging' : t;
      ch.title = tagKind(t) + ' tag · ' + t;
      tags.appendChild(ch);
    });
    el.appendChild(tags);
  }

  if (card.subtasks && card.subtasks.length) {
    const { total, done } = countSubtasks(card.subtasks);
    const pct = total ? Math.round(done / total * 100) : 0;
    const p = document.createElement('div');
    p.className = 'card-progress';
    p.innerHTML = `<span>${done}/${total}</span><div class="bar"><div style="width:${pct}%"></div></div>`;
    el.appendChild(p);
  }

  // (Time moved to head row above; expand-hint removed —
  // hover lift + cursor:pointer + interactive head elements are enough signal.)
  return el;
}

// ===== Render: modal (full detail on click) =====
function renderModal(card) {
  const overlay = $('#modal-overlay');
  overlay.innerHTML = '';
  overlay.classList.add('open');

  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.addEventListener('click', e => e.stopPropagation());

  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.textContent = '×';
  closeBtn.onclick = closeModal;
  modal.appendChild(closeBtn);

  // Head
  const head = document.createElement('div');
  head.className = 'modal-head';
  head.appendChild(makePrioChip(card));
  head.appendChild(makeNumRef(card));
  head.appendChild(makeBadge(card, true));
  modal.appendChild(head);

  // Title (editable)
  const title = document.createElement('div');
  title.className = 'modal-title';
  title.contentEditable = 'true';
  title.textContent = card.title || '';
  title.addEventListener('blur', () => {
    const v = title.textContent.trim();
    if (v !== (card.title || '')) { card.title = v; card.updatedAt = now(); scheduleSave(); }
  });
  title.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); title.blur(); } });
  armUndoOnFocus(title);
  modal.appendChild(title);

  // Meta: column changer + (auto-set) doneAt info
  const meta = document.createElement('div');
  meta.className = 'modal-meta';
  const colLabel = document.createElement('label');
  colLabel.textContent = 'Column:';
  meta.appendChild(colLabel);
  const colSel = document.createElement('select');
  state.columns.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.name;
    if (c.id === card.column) opt.selected = true;
    colSel.appendChild(opt);
  });
  colSel.onchange = () => moveCardToColumn(card, colSel.value);   // #333 — shared move helper
  meta.appendChild(colSel);

  const prioLabel = document.createElement('label');
  prioLabel.textContent = 'Priority:';
  prioLabel.style.marginLeft = '8px';
  meta.appendChild(prioLabel);
  const prioSel = document.createElement('select');
  ['', 'critical', 'mid', 'low'].forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p || '— unset —';
    if ((card.priority || '') === p) opt.selected = true;
    prioSel.appendChild(opt);
  });
  prioSel.onchange = () => {
    card.priority = prioSel.value || null;
    card.updatedAt = now();
    scheduleSave(); render();
  };
  meta.appendChild(prioSel);
  modal.appendChild(meta);

  // Origin · why this exists (THE WHY — first thing after meta)
  const originLabel = document.createElement('div');
  originLabel.className = 'modal-section-label';
  const originTitleSpan = document.createElement('span');
  originTitleSpan.textContent = 'Origin · why this exists';
  originLabel.appendChild(originTitleSpan);
  const tip = document.createElement('span');
  tip.className = 'tip-icon';
  tip.setAttribute('data-tip',
    "Why was this card created? Your original words, the conversation context, " +
    "and the thought process behind it.\n\n" +
    "Reading this 2 months later you should be able to remember exactly why this " +
    "is on the board — what triggered it, what we discussed, what trade-offs were " +
    "weighed.\n\n" +
    "Claude fills this when creating a card from your message. You can edit anytime."
  );
  tip.textContent = 'i';
  tip.style.fontStyle = 'italic';
  tip.style.fontFamily = 'serif';
  originLabel.appendChild(tip);
  modal.appendChild(originLabel);

  const origin = document.createElement('textarea');
  origin.className = 'origin-modal';
  origin.value = card.origin || '';
  origin.placeholder = 'Why was this created? Your original words / what we discussed / the thought process that led here…';
  origin.addEventListener('input', () => { card.origin = origin.value; scheduleSave(); });
  modal.appendChild(origin);

  // Tags editor
  const tagsLabel = document.createElement('div');
  tagsLabel.className = 'modal-section-label';
  tagsLabel.textContent = 'Tags';
  modal.appendChild(tagsLabel);

  const tagsRow = document.createElement('div');
  tagsRow.className = 'tags-edit';
  (card.tags || []).forEach((t, idx) => {
    const ch = document.createElement('span');
    ch.className = 'tag';
    ch.style.setProperty('--tag-c', tagColor(t));
    ch.textContent = (t === 'aging-30d+' ? '⏰ aging 30d+' : t) + ' ×';
    ch.title = tagKind(t) + ' tag · click to remove';
    ch.style.cursor = 'pointer';
    ch.onclick = () => {
      card.tags.splice(idx, 1);
      card.updatedAt = now();
      scheduleSave(); render();
    };
    tagsRow.appendChild(ch);
  });
  const addTag = document.createElement('input');
  addTag.placeholder = '+ tag';
  addTag.className = 'tag-input';
  addTag.onkeydown = e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const v = addTag.value.trim();
      if (!v) return;
      if (!card.tags) card.tags = [];
      card.tags.push(v);
      card.updatedAt = now();
      scheduleSave(); render();
    }
  };
  tagsRow.appendChild(addTag);
  modal.appendChild(tagsRow);

  // Linked cards (bidirectional family/relation links)
  const linksLabel = document.createElement('div');
  linksLabel.className = 'modal-section-label';
  const linksTitle = document.createElement('span');
  linksTitle.textContent = 'Linked cards';
  linksLabel.appendChild(linksTitle);
  const linksTip = document.createElement('span');
  linksTip.className = 'tip-icon';
  linksTip.setAttribute('data-tip',
    'Cards that relate to this one (same family, blockers, follow-ups).\n\n' +
    'Click a link to jump to that card.\n\n' +
    'Add by typing #N (e.g. #5) or a code (e.g. FACT9) and pressing Enter. ' +
    'Links are bidirectional — adding link A→B also adds B→A.\n\n' +
    'Remove with the × on hover.'
  );
  linksTip.textContent = 'i';
  linksLabel.appendChild(linksTip);
  modal.appendChild(linksLabel);

  const linksRow = document.createElement('div');
  linksRow.className = 'links-edit';
  (card.linkedCards || []).forEach(linkedId => {
    const target = state.cards.find(c => c.id === linkedId);
    const chip = document.createElement('span');
    chip.className = 'link-chip';
    if (!target) {
      chip.classList.add('orphan');
      chip.textContent = '(missing) ' + linkedId;
      const rm = document.createElement('span');
      rm.className = 'link-remove';
      rm.textContent = '×';
      rm.onclick = (e) => {
        e.stopPropagation();
        card.linkedCards = (card.linkedCards || []).filter(id => id !== linkedId);
        card.updatedAt = now();
        scheduleSave(); render();
      };
      chip.appendChild(rm);
      linksRow.appendChild(chip);
      return;
    }
    if (target.priority) chip.classList.add('link-prio-' + target.priority);
    if (target.column === 'done') chip.classList.add('link-done');

    const txt = document.createElement('span');
    txt.className = 'link-text';
    txt.textContent = '#' + target.num + (target.code ? ' ' + target.code : '');
    chip.appendChild(txt);
    const ttl = document.createElement('span');
    ttl.className = 'link-title';
    const shortTitle = (target.title || '').length > 40 ? target.title.slice(0,40) + '…' : (target.title || '');
    ttl.textContent = ' · ' + shortTitle;
    chip.appendChild(ttl);

    chip.onclick = () => openModal(target.id);
    const rm = document.createElement('span');
    rm.className = 'link-remove';
    rm.textContent = '×';
    rm.title = 'Remove link';
    rm.onclick = (e) => {
      e.stopPropagation();
      removeCardLink(card, target);
      scheduleSave(); render();
    };
    chip.appendChild(rm);
    linksRow.appendChild(chip);
  });
  const addLinkInput = document.createElement('input');
  addLinkInput.className = 'tag-input';
  addLinkInput.placeholder = '+ link (#N or code)';
  addLinkInput.style.width = '160px';
  addLinkInput.onkeydown = e => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    const q = addLinkInput.value.trim();
    if (!q) return;
    const m = q.match(/^#?(\d+)$/);
    let target = null;
    if (m) {
      const n = parseInt(m[1], 10);
      target = state.cards.find(c => c.num === n);
    } else {
      const ql = q.toLowerCase();
      target = state.cards.find(c => (c.code || '').toLowerCase() === ql);
    }
    if (!target) { toast('No card matches "' + q + '"'); return; }
    if (target.id === card.id) { toast("Can't link a card to itself"); return; }
    if ((card.linkedCards || []).includes(target.id)) {
      toast('Already linked to #' + target.num);
      addLinkInput.value = '';
      return;
    }
    addCardLink(card, target);
    addLinkInput.value = '';
    scheduleSave(); render();
  };
  linksRow.appendChild(addLinkInput);
  modal.appendChild(linksRow);

  // Subtasks
  const { total, done } = countSubtasks(card.subtasks || []);
  const stLabel = document.createElement('div');
  stLabel.className = 'modal-section-label';
  stLabel.textContent = total ? `Subtasks (${done}/${total} · ${total ? Math.round(done/total*100) : 0}%)` : 'Subtasks';
  modal.appendChild(stLabel);

  const stRoot = document.createElement('div');
  stRoot.className = 'subtasks';
  (card.subtasks || []).forEach((node, idx) => {
    stRoot.appendChild(renderSubtaskNode(node, card, String(idx + 1), [idx]));
  });
  modal.appendChild(stRoot);

  const addSt = document.createElement('button');
  addSt.className = 'add-subtask';
  addSt.textContent = '+ subtask';
  addSt.onclick = () => {
    if (!card.subtasks) card.subtasks = [];
    card.subtasks.push({ id: uid('s'), text: 'new subtask', done: false, collapsed: false, children: [] });
    touchSubtask(card);
    scheduleSave(); render();
  };
  modal.appendChild(addSt);

  // Notes
  const notesLabel = document.createElement('div');
  notesLabel.className = 'modal-section-label';
  notesLabel.textContent = card.column === 'ideas' ? 'Idea detail' : 'Notes';
  modal.appendChild(notesLabel);

  const notes = document.createElement('textarea');
  notes.className = 'notes-modal';
  notes.value = card.notes || '';
  notes.placeholder = card.column === 'ideas'
    ? 'Describe the idea (Claude reads this and will triage it)…'
    : 'Notes / context (you or Claude)…';
  notes.addEventListener('input', () => { card.notes = notes.value; scheduleSave(); });
  armUndoOnFocus(notes);
  modal.appendChild(notes);

  // Write-up
  const wuLabel = document.createElement('div');
  wuLabel.className = 'modal-section-label';
  wuLabel.textContent = card.column === 'done' ? '✓ Write-up (how it was done)' : 'Write-up (filled when done)';
  modal.appendChild(wuLabel);

  const wu = document.createElement('textarea');
  wu.className = 'writeup-modal';
  wu.value = card.writeup || '';
  wu.placeholder = card.column === 'done'
    ? 'Claude writes this when moving the card to Done…'
    : '(Claude will fill this when this card is marked done)';
  wu.addEventListener('input', () => { card.writeup = wu.value; scheduleSave(); });
  armUndoOnFocus(wu);
  modal.appendChild(wu);

  if (card.column === 'done' && !(card.writeup || '').trim()) {
    const flag = document.createElement('div');
    flag.className = 'writeup-missing-flag';
    flag.textContent = '⚠ Done card missing write-up';
    modal.appendChild(flag);
  }

  // Foot
  const foot = document.createElement('div');
  foot.className = 'modal-foot';
  const dates = document.createElement('span');
  const createdStr = card.createdAt ? 'created ' + fmtTime(card.createdAt) : '';
  const doneStr    = card.doneAt    ? ' · ✓ done ' + fmtTime(card.doneAt)    : '';
  const updStr     = (card.updatedAt && card.updatedAt !== card.createdAt) ? ' · upd ' + fmtTime(card.updatedAt) : '';
  dates.textContent = createdStr + (card.doneAt ? doneStr : updStr);
  dates.title =
    `created : ${card.createdAt || '—'}\n` +
    `updated : ${card.updatedAt || '—'}\n` +
    `done    : ${card.doneAt    || '—'}`;
  foot.appendChild(dates);

  // #164 — Reopen as bug: only shown on Done cards. Moves the card back
  // to In Progress and stamps a 'bug' tag so the regression is visible
  // until the next ship (then auto-stripped).
  if (card.column === 'done') {
    const impBtn = document.createElement('button');
    impBtn.className = 'modal-improve';
    impBtn.textContent = '✨ Improve';
    impBtn.title = 'Add an improvement subtask + reopen back to In Progress (no bug tag — this is an enhancement)';
    impBtn.onclick = () => improveCard(card.id);
    foot.appendChild(impBtn);

    const bugBtn = document.createElement('button');
    bugBtn.className = 'modal-reopen-bug';
    bugBtn.textContent = '🐞 Reopen as bug';
    bugBtn.title = 'Move back to In Progress + add a "bug" tag';
    bugBtn.onclick = () => reopenAsBug(card.id);
    foot.appendChild(bugBtn);
  }

  const del = document.createElement('button');
  del.className = 'modal-delete';
  del.textContent = 'Delete card';
  del.onclick = async () => {
    if (!(await miniConfirm('Confirm?', { sub: `Delete card "${card.title}"` }))) return;
    deleteCard(card.id);
  };
  foot.appendChild(del);
  modal.appendChild(foot);

  overlay.appendChild(modal);
}

// ===== Subtask render (used inside modal) =====
function renderSubtaskNode(node, card, number, path) {
  const hasChildren = node.children && node.children.length > 0;
  const wrap = document.createElement('div');
  wrap.className = 'subtask';
  if (hasChildren) wrap.classList.add('has-children');
  if (node.collapsed) wrap.classList.add('collapsed');
  if (node.done) wrap.classList.add('done');

  const row = document.createElement('div');
  row.className = 'row';

  const toggle = document.createElement('button');
  toggle.className = 'toggle';
  toggle.onclick = () => {
    if (!hasChildren) return;
    node.collapsed = !node.collapsed;
    scheduleSave(); render();
  };
  row.appendChild(toggle);

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!node.done;
  cb.onchange = () => {
    node.done = cb.checked;
    touchSubtask(card);
    scheduleSave(); render();
  };
  row.appendChild(cb);

  const num = document.createElement('span');
  num.className = 'num';
  num.textContent = number;
  row.appendChild(num);

  const txt = document.createElement('span');
  txt.className = 'text';
  txt.contentEditable = 'true';
  txt.textContent = node.text || '';
  txt.addEventListener('blur', () => {
    const v = txt.textContent.trim();
    if (v !== (node.text || '')) { node.text = v; touchSubtask(card); scheduleSave(); }
  });
  txt.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); txt.blur(); } });
  row.appendChild(txt);

  const acts = document.createElement('div');
  acts.className = 'st-actions';
  const addChild = document.createElement('button');
  addChild.className = 'icon-btn';
  addChild.textContent = '+';
  addChild.title = 'Add child subtask';
  addChild.onclick = () => {
    if (!node.children) node.children = [];
    node.children.push({ id: uid('s'), text: 'new subtask', done: false, collapsed: false, children: [] });
    node.collapsed = false;
    touchSubtask(card);
    scheduleSave(); render();
  };
  acts.appendChild(addChild);

  const delSt = document.createElement('button');
  delSt.className = 'icon-btn del-btn';
  delSt.textContent = '×';
  delSt.title = 'Delete subtask (and any children)';
  delSt.onclick = () => {
    deleteSubtaskByPath(card.subtasks, path);
    touchSubtask(card);
    scheduleSave(); render();
  };
  acts.appendChild(delSt);
  row.appendChild(acts);

  wrap.appendChild(row);

  if (hasChildren) {
    const ch = document.createElement('div');
    ch.className = 'children';
    node.children.forEach((child, ci) => {
      const childNumber = number + '.' + (ci + 1);
      ch.appendChild(renderSubtaskNode(child, card, childNumber, path.concat(['children', ci])));
    });
    wrap.appendChild(ch);
  }
  return wrap;
}

// #125 — Reset columns to default order: Task → Backlog → In Progress →
// Done → Notes (matched by id OR case-insensitive name so it works across
// boards with migrated column ids), then remaining columns by latest card
// activity desc (empty columns last). Clears stackUnder. One undo entry.
async function resetColumnsToDefault() {
  if (!state) return;
  if (!(await miniConfirm('Reset column order?', {
    sub: 'Reorders columns to: Task → Backlog → In Progress → Done → Notes, then the rest by latest activity. Also flattens any stacked columns back into a row. No cards or columns are deleted — ' + undoHint() + ' to undo.',
    okText: 'Reset',
    okClass: 'primary',
  }))) return;
  pushUndo();
  const cols = state.columns.map(c => ({ ...c, stackUnder: null }));
  const matchers = [
    c => c.id === 'task' || /^task$/i.test(c.name || ''),
    c => c.id === 'backlog' || /^backlog$/i.test(c.name || ''),
    c => c.id === 'inprogress' || /^in\s*progress$/i.test(c.name || ''),
    c => c.id === 'done' || /^done$/i.test(c.name || ''),
    c => /^notes$/i.test(c.name || ''),
  ];
  const pinned = [];
  const remaining = cols.slice();
  for (const m of matchers) {
    const i = remaining.findIndex(m);
    if (i >= 0) pinned.push(...remaining.splice(i, 1));
  }
  const recency = new Map();
  for (const c of remaining) {
    const ts = (state.cards || [])
      .filter(card => card.column === c.id)
      .map(card => card.updatedAt || card.createdAt || '')
      .reduce((a, b) => (a > b ? a : b), '');
    recency.set(c.id, ts);
  }
  remaining.sort((a, b) => {
    const ra = recency.get(a.id) || '';
    const rb = recency.get(b.id) || '';
    if (ra === rb) return 0;
    if (!ra) return 1;
    if (!rb) return -1;
    return rb.localeCompare(ra);
  });
  const old = captureColumnRects();
  state.columns = pinned.concat(remaining);
  scheduleSave();
  render();
  requestAnimationFrame(() => flipPlayColumns(old));
  toast('Columns reset — ' + undoHint() + ' to undo', 3200);
}

// Read project name from board.json `title` field. Falls back gracefully.
function applyBoardTitle() {
  const el = $('#board-title');
  if (!el || !state) return;
  if (el.dataset.editing === '1') return; // don't clobber mid-edit
  const t = (state.title || '').trim() || 'WorkBoard';
  el.textContent = t;
  document.title = t;
}

// Title interactions — wired once (idempotent guard via dataset.wired).
function wireBoardTitle() {
  const el = $('#board-title');
  if (!el || el.dataset.wired === '1') return;
  el.dataset.wired = '1';

  el.addEventListener('click', () => {
    if (el.dataset.editing === '1') return; // editing — let caret place
    setView('board');
  });

  el.addEventListener('dblclick', () => {
    pushUndo();
    el.dataset.editing = '1';
    el.contentEditable = 'true';
    el.textContent = (state && state.title) ? state.title : 'WorkBoard';
    el.focus();
    // Select all so first keystroke replaces.
    const r = document.createRange(); r.selectNodeContents(el);
    const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
  });

  const commit = () => {
    if (el.dataset.editing !== '1') return;
    const v = el.textContent.trim();
    el.contentEditable = 'false';
    el.dataset.editing = '0';
    if (v && state && v !== state.title) {
      state.title = v;
      scheduleSave();
    }
    applyBoardTitle();
  };
  el.addEventListener('blur', commit);
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    else if (e.key === 'Escape') {
      e.preventDefault();
      el.dataset.editing = '0';
      el.contentEditable = 'false';
      applyBoardTitle(); // revert
    }
  });
}

// ===== Velocity view (#114 BOARD-METRICS) =====
// Fetches /metrics (computed server-side from board.json) and paints stat
// cards + a 7-day throughput bar chart + a stuck-card leaderboard. Read-only;
// no board.json mutation. Re-fetched each time the tab opens.
async function renderVelocity() {
  const host = $('#velocity');
  if (!host) return;
  host.innerHTML = `<div class="vel-head"><h2>Velocity</h2><span class="vel-sub">loading…</span></div>`;
  let m;
  try {
    const r = await fetch('/metrics?since=7d', { cache: 'no-store' });
    m = await r.json();
  } catch (e) {
    host.innerHTML = `<div class="vel-head"><h2>Velocity</h2><span class="vel-sub">metrics unavailable (server offline?)</span></div>`;
    return;
  }
  const tp = m.throughput, ct = m.cycleTime, pr = m.priority;
  const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const cycleStr = ct.medianDays != null ? `${ct.medianDays}d` : '—';
  const maxDay = Math.max(1, ...tp.perDay.map(d => d.count));

  const stat = (num, label, sub, cls='') =>
    `<div class="vel-stat ${cls}"><div class="vs-num">${num}</div><div class="vs-label">${label}</div>${sub ? `<div class="vs-sub">${sub}</div>` : ''}</div>`;

  const bars = tp.perDay.map(d => {
    const h = Math.round(d.count / maxDay * 100);
    const dow = new Date(d.date + 'T00:00:00Z').toLocaleDateString(undefined, { weekday: 'short' });
    return `<div class="vel-bar-wrap" title="${d.date}: ${d.count}">`
         + `<span class="vel-bar-cap">${d.count || ''}</span>`
         + `<div class="vel-bar ${d.count ? '' : 'zero'}" style="height:${Math.max(h, d.count ? 6 : 2)}%"></div>`
         + `<span class="vel-bar-day">${dow}</span></div>`;
  }).join('');

  const leader = (m.blockers && m.blockers.length)
    ? `<ul class="vel-leader">` + m.blockers.slice(0, 8).map(b =>
        `<li><span class="vl-days">${b.stuckDays}d</span><span class="vl-num">#${b.num}</span>`
        + `<span class="vl-title">${esc(b.code ? b.code + ' — ' : '')}${esc(b.title)}</span></li>`).join('') + `</ul>`
    : `<div class="vel-empty">Nothing stuck more than 7 days in progress 🎉</div>`;

  host.innerHTML = `
    <div class="vel-head"><h2>Velocity</h2><span class="vel-sub">last ${m.sinceDays} days · rev ${m.rev} · ${m.totalCards} cards</span></div>
    <div class="vel-stats">
      ${stat(tp.total, 'shipped', `${tp.perDayAvg}/day avg`)}
      ${stat(cycleStr, 'median cycle', ct.count ? `${ct.count} cards` : 'no data')}
      ${stat(m.wip, 'in progress', 'work-in-progress')}
      ${stat(pr.openCritical, 'open critical', `${pr.criticalNotStarted} not started`, pr.openCritical ? 'crit' : '')}
      ${stat(pr.openMid, 'open mid', '', pr.openMid ? 'warn' : '')}
    </div>
    <div class="vel-panel"><h3>Throughput — cards shipped per day</h3><div class="vel-bars">${bars}</div></div>
    <div class="vel-panel"><h3>Blockers — stuck &gt;7 days in progress</h3>${leader}</div>
  `;
}

function render() {
  if (!state) return;
  closeCardMenu();   // #333 — a rebuild invalidates any open card menu
  if (_view === 'board') {
    const board = $('#board');
    board.innerHTML = '';
    // #117 — render in stacks: one .column-stack wrapper per root, containing
    // the root + all stackUnder descendants in walk order. Single-column
    // "stacks" still get a wrapper so the layout is uniform.
    getStackRoots().forEach(root => {
      const wrap = document.createElement('div');
      wrap.className = 'column-stack';
      wrap.dataset.stackRoot = root.id;
      walkStack(root.id).forEach(col => {
        let cards = state.cards.filter(c => c.column === col.id);
        // #249 — pin the "current work" card (most-recent in In Progress) to
        // the TOP of the column so every session opens showing what you're
        // working on. Stable sort preserves the order of the rest.
        if (col.id === 'inprogress') {
          const aid = activeWorkId();
          if (aid) cards = cards.slice().sort((a, b) =>
            a.id === aid ? -1 : b.id === aid ? 1 : 0);
        }
        wrap.appendChild(renderColumn(col, cards));
      });
      board.appendChild(wrap);
    });
    const addCol = document.createElement('button');
    addCol.className = 'col-add-btn';
    addCol.textContent = '+ Add column';
    addCol.onclick = () => {
      const name = prompt('Column name?');
      if (!name) return;
      pushUndo();
      state.columns.push({ id: uid('col'), name, kind: 'custom' });
      scheduleSave(); render();
    };
    board.appendChild(addCol);
  } else if (_view === 'calendar') {
    renderCalendar();
  }

  // Modal renders on top of either view
  if (_openCardId) {
    const card = state.cards.find(c => c.id === _openCardId);
    if (card) renderModal(card);
    else { _openCardId = null; closeModal(); }
  }

  // #249 — reapply the In-Progress pulse from state after the DOM is rebuilt
  // (board.innerHTML was wiped above). This is what makes it survive refresh.
  refreshActiveWork();

  // #313 — animate any never-before-seen card into place. Self-gates to the
  // board view and to cards not yet in the seen-set, so this is a no-op on a
  // routine re-render and only fires for genuinely new cards (first load, late
  // open, reconnect-via-poll, inline install before connect).
  playEntrance();
}

// ===== #313 first-load entrance animation =====
// Cards animate in (fade + rise + settle) the first time THIS browser sees them
// on a given board. A per-board "seen" set in localStorage keeps routine
// refreshes calm: only never-before-seen cards animate, exactly once. This is
// the SSE-timing-independent backstop to .popping-in — it covers boards that
// were filled while the tab was disconnected, which the live card-added event
// (and the #312 connection-gate) structurally cannot.
function _seenKey() {
  const bid = (state && (state.id || state.title)) || location.pathname || 'board';
  return 'wb:seen-cards::' + bid;
}
function _loadSeen() {
  try { return new Set(JSON.parse(localStorage.getItem(_seenKey()) || '[]')); }
  catch (_) { return new Set(); }
}
function _saveSeen(set) {
  try { localStorage.setItem(_seenKey(), JSON.stringify([...set])); } catch (_) {}
}
function markCardSeen(id) {
  if (!id) return;
  const s = _loadSeen(); s.add(id); _saveSeen(s);
}
function playEntrance() {
  if (_view !== 'board') return;
  const els = Array.from(document.querySelectorAll('.card[data-card-id]'));
  if (!els.length) return;
  const seen = _loadSeen();
  // #337 — on a tab-refocus re-sync, don't cascade: mark everything seen and
  // bail, so the board just appears current instead of re-flying to catch up.
  if (_animSuppressed()) {
    els.forEach(el => seen.add(el.dataset.cardId));
    _saveSeen(seen);
    return;
  }
  const unseen = els.filter(el => !seen.has(el.dataset.cardId));
  if (unseen.length) {
    // Stagger so cards cascade in; cap total at ~1.2s so a big board (or the
    // one-time animate-all on first run after this ships) stays snappy.
    const stagger = Math.min(60, 1200 / unseen.length);
    unseen.forEach((el, i) => {
      el.classList.add('entering');
      el.style.animationDelay = Math.round(i * stagger) + 'ms';
      el.addEventListener('animationend', () => {
        el.classList.remove('entering');
        el.style.animationDelay = '';
      }, { once: true });
    });
  }
  els.forEach(el => seen.add(el.dataset.cardId));
  _saveSeen(seen);
}

// ===== Tag colour + taxonomy lookup =====
// Single source of truth for "what colour is this tag" used by card chips,
// modal chips, and the legend popover. Taxonomy comes from board.json's
// tagTaxonomy (main + sub with explicit colours per industry profile);
// custom tags fall back to a deterministic 8-colour neutral palette so the
// same tag name always renders the same colour, even without a taxonomy
// entry. Hash is FNV-1a-ish over the tag name.
const _CUSTOM_TAG_PALETTE = [
  '#7E8B8E', '#A8826C', '#6B8E7A', '#A0859C',
  '#8E7E6B', '#6F8FB5', '#A88B6B', '#7A8580',
];
function _tagHash(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = (h + (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24)) >>> 0;
  }
  return h;
}
function _taxonomyIndex() {
  // Map: name (lower) → { kind: 'main'|'sub', color }
  const idx = new Map();
  const tx = (state && state.tagTaxonomy) || {};
  (tx.main || []).forEach(t => idx.set(String(t.name).toLowerCase(), { kind: 'main', color: t.color }));
  (tx.sub  || []).forEach(t => idx.set(String(t.name).toLowerCase(), { kind: 'sub',  color: t.color }));
  return idx;
}
function tagColor(name) {
  const idx = _taxonomyIndex();
  const hit = idx.get(String(name).toLowerCase());
  if (hit && hit.color) return hit.color;
  return _CUSTOM_TAG_PALETTE[_tagHash(name) % _CUSTOM_TAG_PALETTE.length];
}
function tagKind(name) {
  const idx = _taxonomyIndex();
  const hit = idx.get(String(name).toLowerCase());
  return hit ? hit.kind : 'custom';
}

// ===== Filter legend — Columns + Main/Sub/Custom tag sections =====
let _tagFilter = new Set();     // set of tag-name strings (multi-select)
let _columnFilter = new Set();  // set of column-id strings (multi-select)
let _tagLegendOpen = false;
const _TAG_CAP_MAIN = 10;
const _TAG_CAP_SUB  = 15;

// Column-chip colour: stable per column kind, with deterministic fallback for
// custom columns. Same palette family as tag colours.
const _COL_KIND_COLOR = {
  intake:  '#BFA661',   // gold — Ideas (incoming)
  todo:    '#8B8680',   // slate — Backlog
  active:  '#D97757',   // coral — In Progress
  blocked: '#A03030',   // deep red — Blocked
  done:    '#3D8F65',   // emerald — Done
};
function columnColor(col) {
  if (!col) return '#8b8680';
  if (col.kind && _COL_KIND_COLOR[col.kind]) return _COL_KIND_COLOR[col.kind];
  // custom column → deterministic from id (reuse tag hash palette)
  return _CUSTOM_TAG_PALETTE[_tagHash(col.id || col.name || '') % _CUSTOM_TAG_PALETTE.length];
}

function refreshTagLegend() {
  const body = document.getElementById('tag-legend-body');
  const countEl = document.getElementById('tags-count');
  const clearBtn = document.getElementById('tag-clear');
  const profileEl = document.getElementById('tag-profile-label');
  if (!body || !state) return;

  // Tally tag usage across all cards (case-preserving — pick first form seen)
  const tally = new Map();
  const display = new Map();
  (state.cards || []).forEach(c => {
    (c.tags || []).forEach(t => {
      const raw = String(t).trim();
      if (!raw) return;
      const k = raw.toLowerCase();
      tally.set(k, (tally.get(k) || 0) + 1);
      if (!display.has(k)) display.set(k, raw);
    });
  });

  const tx = state.tagTaxonomy || {};
  const profileName = tx.profile || 'custom';
  if (profileEl) profileEl.textContent = profileName;
  if (countEl) countEl.textContent = tally.size;

  // Bucket: main / sub / custom (anything not in taxonomy)
  const mainList = (tx.main || []).map(t => t.name.toLowerCase());
  const subList  = (tx.sub  || []).map(t => t.name.toLowerCase());
  const taxonomySet = new Set([...mainList, ...subList]);

  body.innerHTML = '';

  // ---- Columns section (auto-derived from state.columns) ----
  // Lets users filter the board by column from the same legend surface as
  // tags. Filter ANDs with the tag filter so Ideas → staging works.
  const colSection = document.createElement('div');
  colSection.className = 'tag-legend-section';
  const colHead = document.createElement('div');
  colHead.className = 'tag-legend-section-head';
  const colLbl = document.createElement('span'); colLbl.textContent = 'Columns';
  colHead.appendChild(colLbl);
  const colHint = document.createElement('span');
  colHint.className = 'hint'; colHint.textContent = 'filter by status';
  colHead.appendChild(colHint);
  colSection.appendChild(colHead);

  const colList = document.createElement('div');
  colList.className = 'tag-legend-list';
  (state.columns || []).forEach(col => {
    const n = (state.cards || []).filter(c => c.column === col.id).length;
    const chip = document.createElement('button');
    chip.className = 'tag-legend-chip';
    chip.style.setProperty('--tag-c', columnColor(col));
    if (n === 0) chip.classList.add('unused');
    if (_columnFilter.has(col.id)) chip.classList.add('active');
    const txt = document.createElement('span');
    // Strip leading emoji for cleaner labels but keep it as a prefix
    txt.textContent = col.name || col.id;
    const cnt = document.createElement('span'); cnt.className = 'count'; cnt.textContent = n;
    chip.appendChild(txt);
    chip.appendChild(cnt);
    if (n > 0) {
      chip.onclick = () => {
        if (_columnFilter.has(col.id)) _columnFilter.delete(col.id);
        else _columnFilter.add(col.id);
        refreshTagLegend();
        render();
      };
    }
    colList.appendChild(chip);
  });
  colSection.appendChild(colList);
  body.appendChild(colSection);

  // Helper to render one section
  function renderSection(label, hint, tagNames, cap, kind) {
    const section = document.createElement('div');
    section.className = 'tag-legend-section';

    const head = document.createElement('div');
    head.className = 'tag-legend-section-head';
    const lbl = document.createElement('span'); lbl.textContent = label;
    head.appendChild(lbl);
    if (hint) {
      const h = document.createElement('span'); h.className = 'hint'; h.textContent = hint;
      head.appendChild(h);
    }
    if (cap) {
      const usedCount = kind === 'custom' ? tagNames.length : tagNames.length;
      const cm = document.createElement('span');
      cm.className = 'cap';
      cm.textContent = `${usedCount}/${cap}`;
      if (usedCount >= cap) cm.classList.add('over');
      else if (usedCount >= cap - 2) cm.classList.add('near');
      head.appendChild(cm);
    }
    section.appendChild(head);

    const list = document.createElement('div');
    list.className = 'tag-legend-list';

    if (!tagNames.length) {
      const empty = document.createElement('div');
      empty.className = 'tag-legend-empty';
      empty.textContent = kind === 'custom'
        ? 'No custom tags — agents stick to the profile so far. ✓'
        : 'None defined for this profile.';
      list.appendChild(empty);
    } else {
      tagNames.forEach(name => {
        const used = tally.get(name) || 0;
        const chip = document.createElement('button');
        chip.className = 'tag-legend-chip';
        chip.style.setProperty('--tag-c', tagColor(name));
        if (used === 0) chip.classList.add('unused');
        const dispName = display.get(name) || name;
        // Active state — accept either the display name OR the lowercased key
        // in the filter set, since onclick stores dispName.
        if (_tagFilter.has(dispName) || _tagFilter.has(name)) chip.classList.add('active');
        const txt = document.createElement('span'); txt.textContent = dispName;
        const cnt = document.createElement('span'); cnt.className = 'count'; cnt.textContent = used;
        chip.appendChild(txt);
        chip.appendChild(cnt);
        if (used > 0) {
          chip.onclick = () => {
            if (_tagFilter.has(dispName)) _tagFilter.delete(dispName);
            else _tagFilter.add(dispName);
            refreshTagLegend();
            render();
          };
        }
        list.appendChild(chip);
      });
    }
    section.appendChild(list);
    return section;
  }

  // Sort each bucket: used tags first (by count desc), then unused alpha
  function sortForDisplay(names) {
    return [...names].sort((a, b) => {
      const ua = tally.get(a) || 0;
      const ub = tally.get(b) || 0;
      if (ua !== ub) return ub - ua;
      return a.localeCompare(b);
    });
  }

  // Custom = tags used on cards that are NOT in the taxonomy
  const customNames = [...tally.keys()].filter(t => !taxonomySet.has(t));
  customNames.sort((a, b) => (tally.get(b) || 0) - (tally.get(a) || 0) || a.localeCompare(b));

  body.appendChild(renderSection(
    'Main',
    'core categories',
    sortForDisplay(mainList),
    _TAG_CAP_MAIN,
    'main',
  ));
  body.appendChild(renderSection(
    'Sub',
    'modifiers · status',
    sortForDisplay(subList),
    _TAG_CAP_SUB,
    'sub',
  ));
  body.appendChild(renderSection(
    'Custom',
    'off-profile · review periodically',
    customNames,
    null,
    'custom',
  ));

  if (clearBtn) clearBtn.style.display = (_tagFilter.size || _columnFilter.size) ? '' : 'none';
}

function toggleTagLegend(open) {
  const popover = document.getElementById('tag-legend');
  const btn = document.getElementById('tags-btn');
  if (!popover || !btn) return;
  _tagLegendOpen = (open === undefined) ? !_tagLegendOpen : open;
  popover.style.display = _tagLegendOpen ? '' : 'none';
  btn.classList.toggle('active', _tagLegendOpen);
  if (_tagLegendOpen) refreshTagLegend();
}

// ===== Calendar v2 — calmer layout: topbar + month-at-a-glance + filter chips =====
// Filter applies to chips shown on the grid. null = show all.
let _calFilter = new Set(); // multi-select: any of 'done' | 'open' | 'critical' | 'mid' | 'low'

// #242 — preserve user's calendar scroll across re-renders + view switches.
// render() rebuilds the calendar grid every paint (e.g. when opening a card
// modal); without this, the user lands back at top each time they Esc out.
let _calScrollY = 0;
function _captureCalScroll() {
  const w = document.querySelector('#calendar .cal-weeks');
  if (w) _calScrollY = w.scrollTop;
}
function _restoreCalScroll() {
  const w = document.querySelector('#calendar .cal-weeks');
  if (w && _calScrollY) w.scrollTop = _calScrollY;
}

function renderCalendar() {
  const cal = $('#calendar');
  // Save scroll from the about-to-be-clobbered DOM before innerHTML wipe.
  _captureCalScroll();
  cal.innerHTML = '';

  // Anchor month: default = current month
  if (!_calCursor) {
    const t = new Date();
    _calCursor = new Date(t.getFullYear(), t.getMonth(), 1);
  }
  const monthStart = new Date(_calCursor);
  const monthName  = monthStart.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
  const todayStr   = localYmd(new Date());

  // ----- Topbar: month name + nav + month-at-a-glance stats -----
  const topbar = document.createElement('div');
  topbar.className = 'cal-topbar';

  const title = document.createElement('h2');
  title.textContent = monthName;
  topbar.appendChild(title);

  const nav = document.createElement('div');
  nav.className = 'cal-nav';
  const mkNav = (label, cls, onclick) => {
    const b = document.createElement('button');
    b.textContent = label;
    if (cls) b.className = cls;
    b.onclick = onclick;
    return b;
  };
  nav.appendChild(mkNav('‹', '', () => {
    _calCursor = new Date(monthStart.getFullYear(), monthStart.getMonth() - 1, 1);
    _calScrollY = 0;        // intentional jump — start the new month at top
    renderCalendar();
  }));
  nav.appendChild(mkNav('Today', 'cal-today-btn', () => {
    const t = new Date();
    _calCursor = new Date(t.getFullYear(), t.getMonth(), 1);
    _calScrollY = 0;
    renderCalendar();
  }));
  nav.appendChild(mkNav('›', '', () => {
    _calCursor = new Date(monthStart.getFullYear(), monthStart.getMonth() + 1, 1);
    _calScrollY = 0;
    renderCalendar();
  }));
  topbar.appendChild(nav);

  // Month-at-a-glance summary (right side)
  const monthMonth = monthStart.getMonth();
  const monthYear  = monthStart.getFullYear();
  const inMonth = (d) => { const x = new Date(d); return x.getMonth() === monthMonth && x.getFullYear() === monthYear; };
  let shippedCount = 0, createdCount = 0, openCount = 0;
  (state.cards || []).forEach(c => {
    if (c.column === 'ideas') return;
    if (c.doneAt && inMonth(c.doneAt)) shippedCount++;
    if (c.createdAt && inMonth(c.createdAt)) createdCount++;
    if (c.column !== 'done' && c.createdAt && inMonth(c.createdAt)) openCount++;
  });
  // Clickable summary — each stat maps to a calendar filter so users can
  // jump straight to "show me what shipped" or "what's still open".
  const summary = document.createElement('div');
  summary.className = 'cal-summary';
  // #239 — order: created (passive context) → shipped (toggle) → still open
