<script>
'use strict';

// ===== State =====
// v3: board.json is read/written via HTTP fetch to the local board-steward server
// (same origin). No File System Access API, no IndexedDB. Works in any browser.
const BOARD_URL = '/board.json';
let state = null;
let lastRev = 0;
let saveTimer = null;
let suppressPollUntil = 0;
// #337 — brief window (set on tab refocus) during which entrance/pop animations
// are suppressed: the board snaps to current truth instead of replaying the
// SSE backlog a throttled background tab queued up as a re-fly burst.
let _animSuppressUntil = 0;
function _animSuppressed() { return Date.now() < _animSuppressUntil; }
let pollTimer = null;
let pendingDirty = false;
let _openCardId = null;        // currently-open modal card
// v2: track per-card {updatedAt|column} between polls so we can flash changed cards.
let _prevSnapshot = new Map(); // id → "updatedAt|column" from previous render
let _flashIds = new Set();     // ids to flash on the upcoming render
let _colDragRects = null;      // id → DOMRect at dragstart (for FLIP)
// #119 — live iPhone-style card reflow during drag.
// dragstart records source; column-body dragover computes insertion slot
// (top half of a card = insert before, bottom half = insert after) and
// DOM-moves the dragged element with FLIP animation for displaced siblings.
// drop commits to state.cards; dragend without drop re-renders to revert.
let _cardDrag = null;          // { cardId, srcCol, srcEl, hoverCol, hoverBeforeCardId }
let _cardDragRects = null;     // cardId → DOMRect at last reflow (for FLIP)
let _localMoveLog = new Map(); // #518 — cardId→ts of moves logged directly, so the SSE echo doesn't double-log
// #119 — column live-reflow during drag (iPhone home-screen feel).
// Snapshot of state.columns taken at dragstart so cancel (dragend w/o drop)
// can revert all the live-preview reorders. _colDragSrcId carries the source
// id because dragover events can't read dataTransfer.getData (security).
let _colDragSrcId = null;
let _colDragCommitted = false;
// #545 — the ONE pending drop target, computed purely from the pointer on each
// dragover (no reshuffle). { mode:'reorder', beforeRootId } | { mode:'stack', parentId }.
// Drives both the indicator and the commit, so highlight always == drop.
let _colDrop = null;

// #119 — visible drag HUD. Prints every drag/mouse event as a green-on-black
// overlay so events are visible regardless of console filters. Header bar
// is a drag handle (mousedown to move); position persists to localStorage.
// #71 — clamp a RESTORED HUD position to the CURRENT viewport. A position saved
// on a wider window / second monitor (or before the window shrank) would
// otherwise paint the HUD off-screen — the "HUD doesn't appear, no console
// error" bug. Mirrors the clamp the drag handlers already apply on move.
function clampHudPos(left, top, w) {
  w = w || 60;
  return {
    left: Math.max(0, Math.min(window.innerWidth  - w,  left)),
    top:  Math.max(0, Math.min(window.innerHeight - 24, top)),
  };
}
const _HUD_POS_KEY = 'workboard.hudPos';
function _dbgHud() {
  let hud = document.getElementById('drag-hud');
  if (hud) return hud;
  hud = document.createElement('div');
  hud.id = 'drag-hud';
  hud.style.cssText = 'position:fixed;width:360px;max-height:280px;overflow:auto;background:rgba(0,0,0,0.88);color:#0f0;font:11px/1.35 monospace;padding:0;z-index:99999;border-radius:6px;border:1px solid #0f0;box-shadow:0 2px 12px rgba(0,0,0,0.4);user-select:none;';
  // Restore saved position; default to top:64 right:12.
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(_HUD_POS_KEY) || 'null'); } catch (e) {}
  if (saved && Number.isFinite(saved.left) && Number.isFinite(saved.top)) {
    const p = clampHudPos(saved.left, saved.top);   // #71 keep on-screen
    hud.style.left = p.left + 'px';
    hud.style.top = p.top + 'px';
  } else {
    hud.style.top = '64px';
    hud.style.right = '12px';
  }
  const head = document.createElement('div');
  head.id = 'drag-hud-head';
  head.style.cssText = 'color:#ff0;border-bottom:1px solid #0f0;padding:4px 10px;margin:0;cursor:grab;background:rgba(255,255,0,0.08);';
  head.textContent = '#119 DRAG HUD — drag header to move';
  hud.appendChild(head);
  const body = document.createElement('div');
  body.id = 'drag-hud-body';
  body.style.cssText = 'padding:6px 10px 8px;';
  hud.appendChild(body);
  document.body.appendChild(hud);
  // Drag-to-move on the yellow header.
  let dragState = null;
  head.addEventListener('mousedown', e => {
    e.preventDefault();
    const r = hud.getBoundingClientRect();
    dragState = { dx: e.clientX - r.left, dy: e.clientY - r.top };
    head.style.cursor = 'grabbing';
    // Switching from right-anchored to left-anchored so move math is one-axis.
    hud.style.left = r.left + 'px';
    hud.style.top = r.top + 'px';
    hud.style.right = '';
  });
  document.addEventListener('mousemove', e => {
    if (!dragState) return;
    const nx = Math.max(0, Math.min(window.innerWidth - 60, e.clientX - dragState.dx));
    const ny = Math.max(0, Math.min(window.innerHeight - 24, e.clientY - dragState.dy));
    hud.style.left = nx + 'px';
    hud.style.top = ny + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragState) return;
    dragState = null;
    head.style.cursor = 'grab';
    try {
      localStorage.setItem(_HUD_POS_KEY, JSON.stringify({
        left: parseFloat(hud.style.left) || 0,
        top: parseFloat(hud.style.top) || 0,
      }));
    } catch (e) {}
  });
  return hud;
}
function dbg(msg) {
  try {
    _dbgHud();
    const body = document.getElementById('drag-hud-body');
    if (body) {
      const line = document.createElement('div');
      line.textContent = new Date().toTimeString().slice(0,8) + '  ' + msg;
      body.insertBefore(line, body.firstChild);
      while (body.childNodes.length > 14) body.removeChild(body.lastChild);
    }
  } catch (e) {}
  console.log('[#119]', msg);
}

// #177 — Logs HUD. User-facing visibility panel (separate from the
// drag/debug HUD). Shows current commit + live clock + connection
// status, with a tail of SSE lifecycle events. Bottom-right by default
// (drag HUD lives top-right). Draggable, position + visibility persisted.
const _LOGS_HUD_POS_KEY  = 'workboard.logsHudPos';
const _LOGS_HUD_SIZE_KEY = 'workboard.logsHudSize';
const _LOGS_HUD_MIN_KEY  = 'workboard.logsHudMin';
// #493 — persist the Logs HUD tail across refreshes. Without this the lines live
// only in the DOM and vanish on reload. Rolling buffer: last _LOGS_BUF_MAX
// entries, anything older than the TTL pruned on load. The buffer is held IN
// MEMORY (_logsBuf) and the localStorage write is debounced, so a burst of log
// lines is O(1) per line, not a full parse+stringify+disk-write each time.
const _LOGS_BUF_KEY    = 'workboard.logsBuf';
const _LOGS_BUF_MAX    = 200;
const _LOGS_BUF_TTL_MS = 7 * 24 * 60 * 60 * 1000;   // 7 days
let _logsBuf = null;             // lazy-loaded in-memory cache (source of truth)
let _logsBufSaveTimer = null;
function _logsBufEnsure() {
  if (_logsBuf) return _logsBuf;
  let raw = [];
  try { raw = JSON.parse(localStorage.getItem(_LOGS_BUF_KEY) || '[]'); } catch (e) {}
  if (!Array.isArray(raw)) raw = [];
  const cutoff = Date.now() - _LOGS_BUF_TTL_MS;
  _logsBuf = raw.filter(e => e && Number.isFinite(e.ts) && e.ts >= cutoff).slice(-_LOGS_BUF_MAX);
  return _logsBuf;
}
function _logsBufSaveSoon() {
  if (_logsBufSaveTimer) return;
  _logsBufSaveTimer = setTimeout(() => {
    _logsBufSaveTimer = null;
    try { localStorage.setItem(_LOGS_BUF_KEY, JSON.stringify(_logsBuf.slice(-_LOGS_BUF_MAX))); } catch (e) {}
  }, 500);
}
let _logsClockTimer = null;
let _logsCommitMeta = { sha: '', msg: '' };

function _logsHud() {
  let hud = document.getElementById('logs-hud');
  if (hud) return hud;
  hud = document.createElement('div');
  hud.id = 'logs-hud';
  hud.style.cssText = 'position:fixed;width:340px;height:240px;min-width:220px;min-height:30px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column;background:rgba(20,20,28,0.94);color:#cfd6df;font:11px/1.35 monospace;z-index:99998;border-radius:6px;border:1px solid rgba(207,214,223,0.25);box-shadow:0 6px 22px rgba(0,0,0,0.45);user-select:none;overflow:hidden;resize:both;';
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(_LOGS_HUD_POS_KEY) || 'null'); } catch (e) {}
  if (saved && Number.isFinite(saved.left) && Number.isFinite(saved.top)) {
    const p = clampHudPos(saved.left, saved.top);   // #71 keep on-screen
    hud.style.left = p.left + 'px';
    hud.style.top  = p.top + 'px';
  } else {
    hud.style.right  = '12px';
    hud.style.bottom = '12px';
  }
  // Restore last manual size (set by the resize handle in bottom-right).
  let savedSize = null;
  try { savedSize = JSON.parse(localStorage.getItem(_LOGS_HUD_SIZE_KEY) || 'null'); } catch (e) {}
  if (savedSize && Number.isFinite(savedSize.w) && Number.isFinite(savedSize.h)) {
    hud.style.width  = savedSize.w + 'px';
    hud.style.height = savedSize.h + 'px';
  }
  // Persist any future resize via the native bottom-right handle. Skip
  // while minimized — otherwise collapsing the body fires the observer
  // and overwrites localStorage with the tiny minimized height, so the
  // next expand restores the collapsed size instead of the prior one.
  try {
    new ResizeObserver(() => {
      if (hud.dataset.minimized === '1') return;
      try {
        localStorage.setItem(_LOGS_HUD_SIZE_KEY, JSON.stringify({
          w: hud.offsetWidth, h: hud.offsetHeight,
        }));
      } catch (e) {}
    }).observe(hud);
  } catch (e) {}
  const head = document.createElement('div');
  head.id = 'logs-hud-head';
  head.style.cssText = 'color:#FFD479;border-bottom:1px solid rgba(207,214,223,0.18);padding:5px 10px;cursor:grab;background:rgba(255,212,121,0.06);display:flex;align-items:center;gap:8px;';
  head.innerHTML = `
    <span style="color:#FFD479;font-weight:600;">📜 LOGS</span>
    <span id="logs-commit" style="color:#9adb9a;font-weight:600;" title="">—</span>
    <span style="flex:1;"></span>
    <span id="logs-clock" style="color:#cfd6df;font-variant-numeric:tabular-nums;">--:--:--</span>
    <span id="logs-conn"  style="color:#888;" title="Connection status">●</span>
    <button id="logs-min-btn" style="background:transparent;border:0;color:#aaa;cursor:pointer;font-size:13px;padding:0 4px;line-height:1;" title="Minimize">▾</button>
  `;
  hud.appendChild(head);
  const body = document.createElement('div');
  body.id = 'logs-hud-body';
  body.style.cssText = 'padding:6px 10px 8px;overflow-y:auto;flex:1;min-height:60px;';
  hud.appendChild(body);
  document.body.appendChild(hud);
  replayLogs();             // #493 — restore the persisted tail across refreshes
  _anchorHudTopLeft(hud);   // #492 — left/top anchored from the start so the resize handle grows normally

  // Draggable header (mirrors drag-hud pattern).
  let drag = null;
  head.addEventListener('mousedown', e => {
    if (e.target.id === 'logs-min-btn') return;
    e.preventDefault();
    const r = hud.getBoundingClientRect();
    drag = { dx: e.clientX - r.left, dy: e.clientY - r.top };
    head.style.cursor = 'grabbing';
    hud.style.left = r.left + 'px';
    hud.style.top  = r.top  + 'px';
    hud.style.right = ''; hud.style.bottom = '';
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const nx = Math.max(0, Math.min(window.innerWidth  - 60, e.clientX - drag.dx));
    const ny = Math.max(0, Math.min(window.innerHeight - 24, e.clientY - drag.dy));
    hud.style.left = nx + 'px';
    hud.style.top  = ny + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!drag) return;
    drag = null;
    head.style.cursor = 'grab';
    try {
      localStorage.setItem(_LOGS_HUD_POS_KEY, JSON.stringify({
        left: parseFloat(hud.style.left) || 0,
        top:  parseFloat(hud.style.top)  || 0,
      }));
    } catch (e) {}
  });
  // Minimize button → collapses to header-only; click again to expand.
  head.querySelector('#logs-min-btn').addEventListener('click', () => {
    setLogsMinimized(hud.dataset.minimized !== '1');
  });
  // Restore minimized state on first render.
  let wasMin = false;
  try { wasMin = localStorage.getItem(_LOGS_HUD_MIN_KEY) === '1'; } catch (e) {}
  if (wasMin) {
    // Defer one tick so the DOM is settled before we hide body etc.
    requestAnimationFrame(() => setLogsMinimized(true));
  }
  return hud;
}

// Always-on Logs HUD has two states: expanded (full body) and minimized
// (header bar only). Saved size is restored on expand; minimize disables
// the resize handle so dragging from header doesn't accidentally resize.
// #492 — anchor a floating HUD by left/top from its current rect (clearing
// right/bottom). The native bottom-right resize handle grows down-right and
// assumes a top-left anchor; bottom/right anchoring (from #487 or the default)
// inverts the resize. Same box, different anchor — no visual move.
function _anchorHudTopLeft(el) {
  if (!el) return;
  const r = el.getBoundingClientRect();
  el.style.left = r.left + 'px'; el.style.top = r.top + 'px';
  el.style.right = ''; el.style.bottom = '';
}

function setLogsMinimized(min) {
  const hud  = _logsHud();
  const body = document.getElementById('logs-hud-body');
  const btn  = document.getElementById('logs-min-btn');
  if (!hud || !body || !btn) return;
  // #487 — anchor by the BOTTOM edge so minimize/expand keeps the lower bound
  // fixed and moves only the top edge (collapse upward), instead of growing
  // downward off-screen when the HUD is top-anchored (after a drag / saved pos).
  // Pin `bottom` from the current rect and drop `top` before the height change.
  const _r = hud.getBoundingClientRect();
  hud.style.bottom = Math.max(0, window.innerHeight - _r.bottom) + 'px';
  hud.style.top = '';

// Render one buffered log entry into the HUD body (newest on top). Pure DOM —

function _renderLogLine(entry) {

  // Drawn from a session-divider SSE pulse so a fresh session is visually
  // separated from the previous one's activity.

    'col':    '#FFD479',
    'sys':    '#a09ab8',

  // Muted grey, lower-weight: "the system did this", not a card you touched.

    if (id === '__gap__') { x += gapW + _colGap; continue; }
    wouldLeft[id] = x;
    x += widthOf(id) + _colGap;
  }
  document.querySelectorAll('#board .column-stack').forEach(w => {
    const orig = _colRow.find(r => r.id === w.dataset.stackRoot);
    const target = wouldLeft[w.dataset.stackRoot];
    if (!orig || target == null) { w.style.transform = ''; return; }   // dragged root stays put (invisible)
    const dx = Math.round(target - orig.left);
    w.style.transform = dx ? `translateX(${dx}px)` : '';
  });
}
function _clearColShift() {
  document.querySelectorAll('#board .column-stack').forEach(w => { w.style.transform = ''; });
}
// #545 — commit the pending _colDrop on drop/dragend. ONE render + FLIP. Returns
// true if anything changed. No-op (returns false) when the order is unchanged.
function applyColDrop() {
  if (!state || !_colDrop || !_colDragSrcId) return false;
  const srcId = _colDragSrcId;
  if (_colDrop.mode === 'stack') {
    if (_colDrop.parentId && _colDrop.parentId !== srcId) { stackColumnUnder(srcId, _colDrop.parentId); return true; }
    return false;
  }
  // reorder: dragged column becomes a ROOT, spliced before the target root.
  const cols = state.columns.map(c => ({ ...c }));
  const si = cols.findIndex(c => c.id === srcId);
  if (si < 0) return false;
  const before = JSON.stringify(state.columns.map(c => [c.id, c.stackUnder]));
  cols[si].stackUnder = null;
  const [moved] = cols.splice(si, 1);
  let insertAt = cols.length;
  if (_colDrop.beforeRootId) {
    const ti = cols.findIndex(c => c.id === _colDrop.beforeRootId);
    if (ti >= 0) insertAt = ti;
  }
  cols.splice(insertAt, 0, moved);
  if (JSON.stringify(cols.map(c => [c.id, c.stackUnder])) === before) return false;  // no change
  pushUndo();
  const old = captureColumnRects();
  state.columns = cols;
  scheduleSave();
  render();
  requestAnimationFrame(() => flipPlayColumns(old));

}
// Normalise stackUnder fields on incoming state: every column gets the field
// (default null); dangling refs reset to null. Idempotent.
function migrateStackUnder(s) {
  if (!s || !Array.isArray(s.columns)) return;
  const ids = new Set(s.columns.map(c => c.id));
  s.columns.forEach(c => {
    if (!('stackUnder' in c)) c.stackUnder = null;
    if (c.stackUnder && !ids.has(c.stackUnder)) c.stackUnder = null;
    if (c.stackUnder === c.id) c.stackUnder = null;   // self-parent guard
  });
