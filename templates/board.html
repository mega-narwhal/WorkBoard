  // (toggle). Passive `created` doesn't visually present as clickable so the
  // eye knows the two toggles are the only interactive stats.
  const SUMMARY_STATS = [
    { key: 'created', cls: 'created', num: createdCount, label: 'created', passive: true  },
    { key: 'done',    cls: 'shipped', num: shippedCount, label: 'shipped', passive: false },
    { key: 'open',    cls: 'open',    num: openCount,    label: 'still open', passive: false },
  ];
  SUMMARY_STATS.forEach(s => {
    const el = document.createElement(s.passive ? 'span' : 'button');
    el.className = 'stat ' + s.cls + (s.passive ? ' passive' : '');
    if (!s.passive && _calFilter.has(s.key)) el.classList.add('active');
    el.innerHTML = `<span class="stat-num">${s.num}</span> ${s.label}`;
    if (s.passive) {
      el.setAttribute('data-tip', `${s.num} cards created in this month`);
    } else {
      el.title = s.key === 'done' ? 'Toggle: shipped cards' : 'Toggle: still-open cards';
      el.onclick = () => {
        if (_calFilter.has(s.key)) { _calFilter.delete(s.key); }
        else { _calFilter.add(s.key); }
        renderCalendar();
      };
    }
    summary.appendChild(el);
  });
  topbar.appendChild(summary);
  cal.appendChild(topbar);

  // ----- Filter chips: All / Done / Open / Critical / Mid / Low -----
  const filters = document.createElement('div');
  filters.className = 'cal-filters';
  const FILTERS = [
    { key: null,         label: 'All',      swatch: false },
    { key: 'done',       label: 'Done',     swatch: true },
    { key: 'open',       label: 'Open',     swatch: true },
    { key: 'critical',   label: 'Critical', swatch: true },
    { key: 'mid',        label: 'Mid',      swatch: true },
    { key: 'low',        label: 'Low',      swatch: true },
  ];
  FILTERS.forEach(f => {
    const chip = document.createElement('button');
    chip.className = 'cal-filter-chip';
    if (f.key) chip.dataset.f = f.key;
    if (f.key === null) {
      if (_calFilter.size === 0) chip.classList.add('active');
    } else if (_calFilter.has(f.key)) {
      chip.classList.add('active');
    }
    chip.innerHTML = (f.swatch ? '<span class="swatch"></span>' : '') + f.label;
    chip.onclick = () => {
      if (f.key === null) { _calFilter.clear(); }
      else if (_calFilter.has(f.key)) { _calFilter.delete(f.key); }
      else { _calFilter.add(f.key); }
      renderCalendar();
    };
    filters.appendChild(chip);
  });
  cal.appendChild(filters);

  // ----- Grid -----
  const grid = document.createElement('div');
  grid.className = 'cal-grid';

  const dowRow = document.createElement('div');
  dowRow.className = 'cal-dow';
  ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach((d, i) => {
    const c = document.createElement('div');
    c.className = 'dow' + (i === 0 || i === 6 ? ' weekend' : '');
    c.textContent = d;
    dowRow.appendChild(c);
  });
  grid.appendChild(dowRow);

  const gridStart = new Date(monthStart);
  gridStart.setDate(gridStart.getDate() - gridStart.getDay());

  const weeksEl = document.createElement('div');
  weeksEl.className = 'cal-weeks';

  // Adaptive: only show as many weeks as needed (5 instead of always 6
  // when the month fits cleanly — kills one row of "muted" overflow).
  const lastOfMonth = new Date(monthYear, monthMonth + 1, 0);
  const totalCells  = lastOfMonth.getDate() + monthStart.getDay();
  const weekCount   = Math.ceil(totalCells / 7);

  for (let w = 0; w < weekCount; w++) {
    const weekEl = document.createElement('div');
    weekEl.className = 'cal-week';

    for (let i = 0; i < 7; i++) {
      const d = new Date(gridStart);
      d.setDate(gridStart.getDate() + w * 7 + i);
      const dayEl = document.createElement('div');
      dayEl.className = 'cal-day';
      if (d.getMonth() !== monthMonth) dayEl.classList.add('muted');
      const ds = localYmd(d);
      if (ds === todayStr) dayEl.classList.add('today');

      const num = document.createElement('div');
      num.className = 'cal-daynum';
      num.textContent = d.getDate();
      dayEl.appendChild(num);

      // Pull cards landing on this day. Apply filter.
      const dayCards = state.cards.filter(card => {
        if (!card.createdAt) return false;
        if (card.column === 'ideas') return false;
        const refTs = card.doneAt || card.createdAt;
        if (localYmd(refTs) !== ds) return false;
        // No filters → show all. Otherwise card passes if it matches ANY
        // active filter (union/OR), so user can combine e.g. Done + Critical.
        // 'created' = wildcard (every card was created) — passes everything.
        if (_calFilter.size === 0) return true;
        if (_calFilter.has('created')) return true;
        for (const f of _calFilter) {
          if (f === 'done' && card.column === 'done') return true;
          if (f === 'open' && card.column !== 'done') return true;
          if ((f === 'critical' || f === 'mid' || f === 'low')
              && card.column !== 'done' && card.priority === f) return true;
        }
        return false;
      }).sort((a, b) => {
        if (a.column === 'done' && b.column !== 'done') return -1;
        if (b.column === 'done' && a.column !== 'done') return 1;
        return (a.num || 0) - (b.num || 0);
      });

      if (dayCards.length) {
        const eventList = document.createElement('div');
        eventList.className = 'cal-events';
        // #110v2: render every card; the .cal-events box scrolls internally.
        dayCards.forEach(card => eventList.appendChild(makeCalendarChip(card)));

        // #238 + #240 — sticky "+N more" pill at the bottom of the scroll.
        // N = chips whose bottom is below the visible region; ticks down as
        // you scroll, becomes invisible at 0. Uses visibility:hidden (NOT
        // display:none) so the slot stays reserved — toggling display caused
        // a feedback loop: hide → scrollHeight drops → scrollTop clamps →
        // re-fires scroll → re-shows → flicker.
        if (dayCards.length > 4) {
          const more = document.createElement('div');
          more.className = 'cal-day-more';
          more.textContent = '+ ' + (dayCards.length - 4) + ' more';
          eventList.appendChild(more);
          let rafId = 0;
          const recompute = () => {
            rafId = 0;
            const listBottom = eventList.scrollTop + eventList.clientHeight;
            let hidden = 0;
            // #241 — 4px dead zone (was 1px). Sub-pixel positions can have
            // a chip flipping hidden/visible right at the edge → looked like
            // flicker. 4px is below chip-height so we never miss a real one.
            for (const chip of eventList.querySelectorAll('.cal-event-chip')) {
              const bot = chip.offsetTop + chip.offsetHeight;
              if (bot > listBottom + 4) hidden++;
            }
            if (hidden === 0) {
              more.style.visibility = 'hidden';
            } else {
              more.style.visibility = '';
              more.textContent = '+ ' + hidden + ' more';
            }
          };
          // rAF-throttle scroll: at most one recompute per frame, no jitter.
          eventList.addEventListener('scroll', () => {
            if (!rafId) rafId = requestAnimationFrame(recompute);
          }, { passive: true });
          requestAnimationFrame(recompute);
        }

        dayEl.appendChild(eventList);

        // #235 — expand icon (visible on cell hover) opens a detail modal
        // showing this day plus the day before and after, in full-width
        // readable form. Stops mousedown propagation so it doesn't start
        // a column-drag if the user holds.
        const expand = document.createElement('div');
        expand.className = 'cal-day-expand';
        expand.textContent = '⤢';
        expand.onmousedown = (e) => e.stopPropagation();
        expand.onclick = (e) => { e.stopPropagation(); openCalDayModal(ds); };
        dayEl.appendChild(expand);
      }

      weekEl.appendChild(dayEl);
    }

    weeksEl.appendChild(weekEl);
  }

  grid.appendChild(weeksEl);
  cal.appendChild(grid);
  // #242 — restore scroll after the new .cal-weeks is in the DOM.
  _restoreCalScroll();
}

// One chip per card on its event-day. Done = green, otherwise priority color.
function makeCalendarChip(card) {
  const chip = document.createElement('div');
  chip.className = 'cal-event-chip';
  if (card.column === 'done') chip.classList.add('done');
  else if (card.priority) chip.classList.add('prio-' + card.priority);

  const dot = document.createElement('span');
  dot.className = 'event-dot';
  chip.appendChild(dot);

  const txt = document.createElement('span');
  txt.className = 'event-text';
  const numSpan = document.createElement('span');
  numSpan.className = 'ev-num';
  numSpan.textContent = '#' + card.num;
  txt.appendChild(numSpan);
  txt.appendChild(document.createTextNode((card.code ? card.code + ' ' : '') + (card.title || '')));
  chip.appendChild(txt);

  // JS tooltip (per project convention — no native title=)
  const refTs = card.doneAt || card.createdAt;
  const verb  = card.column === 'done' ? '✓ done' :
                card.column === 'inprogress' ? 'in progress · created' :
                card.column === 'blocked' ? 'blocked · created' :
                'created';
  chip.setAttribute('data-tip',
    `#${card.num} ${card.code || ''}\n${card.title}\n\n${verb} ${fmtTime(refTs)} (${relativeTime(refTs)})`
  );
  // #243 — right-side placement so the tip doesn't cover the row below.
  chip.setAttribute('data-tip-placement', 'right');
  // Open the modal in-place — don't switch to Board view, so closing the
  // modal (Esc / × / overlay) leaves the user on Calendar.
  chip.onclick = () => { openModal(card.id); };
  return chip;
}

// #235 — Day-detail modal: full-width readable view of a multi-day window
// (center ± 7 days). Solves the "cells are too squished to read" pain.
// Scroll IS the navigation; no prev/next buttons.
let _calDayModal = null;
let _calDayModalCenter = null;

function _cardsForDay(ds) {
  // Mirrors the filter logic in renderCalendar but keeps it self-contained
  // so the modal still applies the user's active _calFilter set.
  return state.cards.filter(card => {
    if (!card.createdAt) return false;
    if (card.column === 'ideas') return false;
    const refTs = card.doneAt || card.createdAt;
    if (localYmd(refTs) !== ds) return false;
    if (_calFilter.size === 0) return true;
    if (_calFilter.has('created')) return true;
    for (const f of _calFilter) {
      if (f === 'done' && card.column === 'done') return true;
      if (f === 'open' && card.column !== 'done') return true;
      if ((f === 'critical' || f === 'mid' || f === 'low')
          && card.column !== 'done' && card.priority === f) return true;
    }
    return false;
  }).sort((a, b) => {
    if (a.column === 'done' && b.column !== 'done') return -1;
    if (b.column === 'done' && a.column !== 'done') return 1;
    return (a.num || 0) - (b.num || 0);
  });
}

function _shiftYmd(ds, deltaDays) {
  const dt = new Date(ds + 'T00:00:00');
  if (isNaN(dt.getTime())) return ds;
  dt.setDate(dt.getDate() + deltaDays);
  return localYmd(dt);
}

function _humanDay(ds) {
  const dt = new Date(ds + 'T00:00:00');
  if (isNaN(dt.getTime())) return ds;
  return dt.toLocaleDateString(undefined, {weekday: 'long', month: 'short', day: 'numeric', year: 'numeric'});
}

function _makeCalDayModalCard(card) {
  const row = document.createElement('div');
  row.className = 'cal-day-modal-card';
  if (card.column === 'done') row.classList.add('done');
  else if (card.priority) row.classList.add('prio-' + card.priority);

  const r1 = document.createElement('div');
  r1.className = 'cm-row1';
  const num = document.createElement('span');
  num.className = 'cm-num';
  num.textContent = '#' + card.num;
  r1.appendChild(num);
  if (card.code) {
    const code = document.createElement('span');
    code.className = 'cm-code';
    code.textContent = card.code;
    r1.appendChild(code);
  }
  const title = document.createElement('span');
  title.className = 'cm-title';
  title.textContent = card.title || '';
  r1.appendChild(title);
  row.appendChild(r1);

  const detail = (card.writeup || card.notes || card.origin || '').trim();
  if (detail) {
    const r2 = document.createElement('div');
    r2.className = 'cm-row2';
    r2.textContent = detail;
    row.appendChild(r2);
  }

  // #236 — don't close the day modal; layer the card modal on top of it
  // so Esc unwinds back to the day modal (Esc again closes day modal).
  row.onclick = () => { openModal(card.id); };
  return row;
}

// #235v2: render a 15-day window (center ± 7); scroll IS the navigation.
// No prev/next buttons — just scroll up for past, down for future. The
// focused day auto-scrolls into view on open via .is-focus's
// scrollIntoView, so context lands instantly without searching.
const CAL_MODAL_WINDOW = 7;  // days on each side of the focused day

function _buildCalDayModalBody() {
  const body = document.createElement('div');
  body.className = 'cal-day-modal-body';
  const center = _calDayModalCenter;
  for (let delta = -CAL_MODAL_WINDOW; delta <= CAL_MODAL_WINDOW; delta++) {
    const ds = _shiftYmd(center, delta);
    const sec = document.createElement('div');
    sec.className = 'cal-day-modal-section';
    if (delta === 0) sec.classList.add('is-focus');
    sec.dataset.ds = ds;

    const head = document.createElement('div');
    head.className = 'sec-head';
    const label = document.createElement('span');
    const cards = _cardsForDay(ds);
    label.textContent = _humanDay(ds) + ' · ' + cards.length + ' card' + (cards.length === 1 ? '' : 's');
    head.appendChild(label);
    if (delta === 0) {
      const flag = document.createElement('span');
      flag.className = 'center-flag';
      flag.textContent = 'FOCUSED';
      head.appendChild(flag);
    }
    sec.appendChild(head);

    if (cards.length) {
      cards.forEach(c => sec.appendChild(_makeCalDayModalCard(c)));
    } else {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = 'No cards on this day.';
      sec.appendChild(empty);
    }
    body.appendChild(sec);
  }
  return body;
}

function openCalDayModal(ds) {
  closeCalDayModal();
  _calDayModalCenter = ds;
  const overlay = document.createElement('div');
  overlay.className = 'cal-day-modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeCalDayModal(); };

  const modal = document.createElement('div');
  modal.className = 'cal-day-modal';

  const head = document.createElement('div');
  head.className = 'cal-day-modal-head';
  const h = document.createElement('h2');
  h.textContent = _humanDay(ds);
  head.appendChild(h);
  const hint = document.createElement('span');
  hint.className = 'hint';
  hint.textContent = 'scroll up = past · scroll down = future';
  head.appendChild(hint);
  const close = document.createElement('button');
  close.className = 'cal-day-modal-close';
  close.textContent = '×';
  close.onclick = closeCalDayModal;
  head.appendChild(close);
  modal.appendChild(head);

  const body = _buildCalDayModalBody();
  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  _calDayModal = modal;
  // #242 — capture-phase so we see _openCardId before init's bubble handler.
  document.addEventListener('keydown', _onCalDayModalKey, true);

  // Land on the focused day — scroll the focus section into view at the
  // top of the visible region. Slight offset so the section header isn't
  // glued to the very top edge. requestAnimationFrame so layout has settled.
  requestAnimationFrame(() => {
    const focus = body.querySelector('.cal-day-modal-section.is-focus');
    if (focus) body.scrollTop = Math.max(0, focus.offsetTop - body.offsetTop - 4);
  });
}

function closeCalDayModal() {
  if (_calDayModal && _calDayModal.parentNode && _calDayModal.parentNode.parentNode) {
    _calDayModal.parentNode.parentNode.removeChild(_calDayModal.parentNode);
  }
  _calDayModal = null;
  _calDayModalCenter = null;
  // #242 — capture-phase listener must be removed with the same `true` arg
  document.removeEventListener('keydown', _onCalDayModalKey, true);
}

function _onCalDayModalKey(e) {
  if (!_calDayModal) return;
  if (e.key !== 'Escape') return;
  // #242 — must run in CAPTURE phase so we see _openCardId BEFORE the
  // bubble-phase init handler (which closes the card modal and nulls
  // _openCardId). If a card modal is open, bail — let bubble close it.
  // Day modal stays. Next Esc with no card modal closes the day modal.
  if (_openCardId) return;
  e.preventDefault();
  closeCalDayModal();
}

function renderColumn(col, cards) {
  const el = document.createElement('div');
  el.className = 'column';
  el.dataset.col = col.id;

  // Card drag-drop (cards moving INTO this column) — distinguish from
  // column-reorder drag by checking the dataTransfer type on dragover.
  // #119: dragover computes the insertion slot from cursor Y vs sibling
  // card midlines, then live-previews via reflowCardDragPreview (DOM-move
  // + FLIP for displaced siblings). drop commits to state.
  el.addEventListener('dragover', e => {
    // Skip if a column is being dragged (column-reorder owns the handler below)
    if (document.body.classList.contains('col-dragging-active')) return;
    e.preventDefault();
    if (!_cardDrag) { dbg('dragover ' + col.id + ' (no _cardDrag!)'); return; }
    // Find which sibling card the cursor is hovering above. Skip the dragged
    // card itself + non-card elements (day-headers, filtered-notes).
    const body = el.querySelector('.column-body');
    if (!body) { dbg('dragover ' + col.id + ' (no .column-body)'); return; }
    const siblings = Array.from(body.querySelectorAll('.card[data-card-id]'))
      .filter(c => c !== _cardDrag.srcEl);
    let beforeId = null;  // null = append to end
    for (const c of siblings) {
      const r = c.getBoundingClientRect();
      if (e.clientY < r.top + r.height / 2) {
        beforeId = c.dataset.cardId;
        break;
      }
    }
    if (_cardDrag.hoverCol !== col.id || _cardDrag.hoverBeforeCardId !== beforeId) {
      dbg('slot → ' + col.id + ' before=' + (beforeId || 'END') + ' sibs=' + siblings.length);
      _cardDrag.hoverCol = col.id;
      _cardDrag.hoverBeforeCardId = beforeId;
      reflowCardDragPreview();
    }
  });
  el.addEventListener('dragleave', () => el.classList.remove('dragover'));
  el.addEventListener('drop', e => {
    if (document.body.classList.contains('col-dragging-active')) return;
    e.preventDefault();
    el.classList.remove('dragover');
    // #119 path: commit the previewed position. Falls back to the legacy
    // text/card-id read for safety (e.g. browser missed dragstart).
    if (_cardDrag) {
      _cardDrag.hoverCol = col.id;  // ensure final col matches drop target
      commitCardDrag();
      return;
    }
    let cardId = e.dataTransfer.getData('text/card-id');
    if (!cardId) {
      const plain = e.dataTransfer.getData('text/plain') || '';
      if (plain.startsWith('card:')) cardId = plain.slice(5);
    }
    if (!cardId) return;
    const card = state.cards.find(c => c.id === cardId);
    if (!card || card.column === col.id) return;
    pushUndo();
    card.column = col.id;
    card.updatedAt = now();
    if (col.id === 'done' && !card.doneAt) card.doneAt = card.updatedAt;
    if (col.id !== 'done') card.doneAt = null;
    scheduleSave(); render();
  });

  const hdr = document.createElement('div');
  hdr.className = 'column-header';

  // Grip handle — the drag affordance. Whole-column draggable would
  // conflict with card drag inside; gating draggability to the grip
  // (mousedown enables draggable, mouseup/dragend disables) keeps cards
  // independently draggable.
  const grip = document.createElement('span');
  grip.className = 'grip';
  grip.textContent = '⋮⋮';
  grip.title = 'Drag to reorder · drop on 🗑 to delete';
  grip.addEventListener('mousedown', () => { el.draggable = true; });
  grip.addEventListener('mouseup',   () => { el.draggable = false; });
  hdr.appendChild(grip);

  const nameEl = document.createElement('span');
  nameEl.className = 'name';
  nameEl.contentEditable = 'true';
  nameEl.textContent = col.name;
  armUndoOnFocus(nameEl);
  nameEl.addEventListener('blur', () => {
    const v = nameEl.textContent.trim();
    if (v && v !== col.name) { col.name = v; scheduleSave(); }
    else nameEl.textContent = col.name;
  });
  nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); } });
  hdr.appendChild(nameEl);

  const count = document.createElement('span');
  count.className = 'count';
  count.textContent = cards.length;
  hdr.appendChild(count);

  // Always-on × for CUSTOM columns (was: empty-only). Confirm if it has
  // cards — they'd otherwise be orphaned in state but invisible on board.
  if (col.kind === 'custom') {
    const del = document.createElement('button');
    del.className = 'icon-btn del-btn';
    del.textContent = '×';
    del.title = 'Delete column';
    del.onclick = async () => {
      const sub = cards.length
        ? `Delete "${col.name}" — ${cards.length} card(s) → Backlog`
        : `Delete column "${col.name}"`;
      if (!(await miniConfirm('Confirm?', { sub }))) return;
      deleteColumn(col.id);
    };
    hdr.appendChild(del);
  }

  // Column-reorder drag (FLIP technique — record start rects, mutate state,
  // re-render, then animate from old→new positions for an iPhone-rearrange
  // smoothness instead of a teleport.)
  el.addEventListener('dragstart', e => {
    // dragstart bubbles — if a descendant (a card) started the drag, leave
    // the event alone or we'd preventDefault() and kill the card drag.
    if (e.target !== el) return;
    if (!el.draggable) { e.preventDefault(); return; } // only when grip-armed
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/col-id', col.id);
    el.classList.add('col-dragging');
    document.body.classList.add('col-dragging-active');
    _colDragRects = captureColumnRects();
    // #119 column — record source + snapshot for live-preview reorders.
    _colDragSrcId = col.id;
    _colDragSnapshot = JSON.parse(JSON.stringify(state.columns));
    _colDragCommitted = false;
    _colLastPreviewTargetId = null;
    // #119 correction — hide the source column's footprint so it doesn't
    // sit "in the background" while being dragged. setTimeout(0) so the
    // browser captures the drag image synchronously before opacity flips.
    // Use opacity (not visibility:hidden) so the slot still receives drop
    // events — otherwise releasing the cursor over the source's new slot
    // fires no drop, and dragend reverts the swap.
    setTimeout(() => {
      const cur = document.querySelector('.column[data-col="' + cssEsc(col.id) + '"]');
      if (cur) cur.style.opacity = '0';
    }, 0);
    dbg('col dragstart ' + col.id);
  });
  el.addEventListener('dragend', () => {
    el.draggable = false;
    el.classList.remove('col-dragging');
    document.body.classList.remove('col-dragging-active');
    document.querySelectorAll('.column').forEach(c => {
      c.classList.remove('col-drop-target');
      c.classList.remove('col-drop-stack-target');
    });
    _colDragRects = null;
    // #119 correction — clear _colDragSrcId BEFORE any revert-render so the
    // re-render in renderColumn doesn't re-hide A. Capture locals first
    // because some branches below need the snapshot / last-preview target.
    const wasCommitted = _colDragCommitted;
    const snap = _colDragSnapshot;
    const lastPreviewId = _colLastPreviewTargetId;
    _colDragSrcId = null;
    _colDragSnapshot = null;
    _colDragCommitted = false;
    _colLastPreviewTargetId = null;
    if (wasCommitted) {
      dbg('col dragend (committed via drop)');
      el.style.opacity = '';
      document.querySelectorAll('.column').forEach(c => { c.style.opacity = ''; });
    } else if (lastPreviewId && snap) {
      // Fast drag — drop never fired (user released over a gap, or in the
      // span between dragover events). The preview already moved the column
      // to a valid slot; treat that as the user's intent and commit.
      dbg('col dragend — commit at last preview ' + lastPreviewId);
      _undoStack.push(JSON.stringify({
        title: state.title || '',
        columns: snap,
        cards: state.cards || [],
      }));
      if (_undoStack.length > _UNDO_CAP) _undoStack.shift();
      _redoStack.length = 0;
      scheduleSave();
      el.style.opacity = '';
      document.querySelectorAll('.column').forEach(c => { c.style.opacity = ''; });
    } else if (snap) {
      // Pure cancel — drag never crossed into another column. Revert.
      dbg('col dragend — revert to snapshot');
      const old = captureColumnRects();
      state.columns = snap;
      render();
      requestAnimationFrame(() => flipPlayColumns(old));
    }
  });
  // Reorder on drop onto another column's edge. #117: if drop lands in the
  // BOTTOM 40% of the target column, stack the source UNDER the target
  // instead of doing a flat reorder. TOP 60% (or any side overlap) keeps
  // the existing flat-row behavior.
  function _inStackZone(e) {
    const r = el.getBoundingClientRect();
    return r.height > 0 && (e.clientY - r.top) > r.height * 0.6;
  }
  el.addEventListener('dragover', e => {
    const draggingColId = (e.dataTransfer.types || []).includes('text/col-id');
    if (!draggingColId) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    // #131 — if a preview is in flight AND cursor is over the source's
    // ORIGINAL slot (i.e. user is dragging back to where they started),
    // revert state.columns to the dragstart snapshot. The slot is now
    // occupied by whichever column shifted into it during preview, so this
    // dragover fires on THAT column — we identify "back to origin" by
    // checking cursor X against the source's original bbox.
    if (_colDragSrcId && _colDragSnapshot && _colLastPreviewTargetId && _colDragRects) {
      const srcOrigRect = _colDragRects.get(_colDragSrcId);
      // #132 — inset by 30px on each side so the revert zone doesn't share a
      // boundary with the adjacent slot's preview-target zone. Without this,
      // cursor jitter at the slot boundary oscillates between preview (just
      // outside source bbox) and revert (just inside).
      const REVERT_INSET = 30;
      if (srcOrigRect && e.clientX >= srcOrigRect.left + REVERT_INSET && e.clientX <= srcOrigRect.right - REVERT_INSET) {
        el.classList.remove('col-drop-stack-target');
        const oldR = captureColumnRects();
        state.columns = JSON.parse(JSON.stringify(_colDragSnapshot));
        _colLastPreviewTargetId = null;
        render();
        requestAnimationFrame(() => flipPlayColumns(oldR));
        dbg('col preview reverted — back to origin');
        return;
      }
    }
    if (_inStackZone(e)) {
      // Stack zone: keep flat order (no live reorder) and show the stack hint.
      el.classList.add('col-drop-stack-target');
      // #129 — if a reorder preview was already in flight (cursor crossed
      // through some column's top 60% on the way down), revert it now so the
      // stack target stops sliding away from the cursor. Neighbors FLIP back
      // to their original slots; source stays opacity:0 in its original slot.
      if (_colDragSnapshot && _colLastPreviewTargetId) {
        const old = captureColumnRects();
        state.columns = JSON.parse(JSON.stringify(_colDragSnapshot));
        _colLastPreviewTargetId = null;
        render();
        requestAnimationFrame(() => flipPlayColumns(old));
      }
    } else {
      el.classList.remove('col-drop-stack-target');
      // #119 — top/side zone: live-preview reorder so target glides aside
      // BEFORE drop. Skip if cursor hasn't crossed onto a different column.
      if (_colDragSrcId && _colDragSrcId !== col.id) {
        dbg('col preview → ' + col.id);
        previewReorderColumn(_colDragSrcId, col.id);
      }
    }
  });
  el.addEventListener('drop', e => {
    const srcId = e.dataTransfer.getData('text/col-id') || _colDragSrcId;
    el.classList.remove('col-drop-stack-target');
    if (!srcId) return;
    e.preventDefault();
    if (_inStackZone(e)) {
      // Stack: revert any live-preview reorder first (so stackUnder applies
      // to the user's INTENT, not the previewed-row position), then stack.
      if (_colDragSnapshot) {
        state.columns = _colDragSnapshot;
        _colDragSnapshot = null;
      }
      stackColumnUnder(srcId, col.id);
    } else {
      // Already at the previewed position — just persist. push one undo entry
      // representing the WHOLE drag, then save.
      if (_colDragSnapshot) {
        _undoStack.push(JSON.stringify({
          title: state.title || '',
          columns: _colDragSnapshot,
          cards: state.cards || [],
        }));
        if (_undoStack.length > _UNDO_CAP) _undoStack.shift();
        _redoStack.length = 0;
        _colDragSnapshot = null;
      }
      scheduleSave();
    }
    _colDragCommitted = true;
    dbg('col drop on ' + col.id);
  });

  el.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'column-body';

  // Filter-aware count: how many of this column's cards will actually render
  // given _tagFilter / _columnFilter? Show a "+ N hidden by filter" note so
  // it's obvious where the cards went.
  if (_tagFilter.size || _columnFilter.size) {
    const visible = cards.filter(c => {
      if (_tagFilter.size && !(c.tags || []).some(t => _tagFilter.has(t))) return false;
      if (_columnFilter.size && !_columnFilter.has(c.column)) return false;
      return true;
    }).length;
    const hidden = cards.length - visible;
    if (hidden > 0) {
      const note = document.createElement('div');
      note.className = 'col-filtered-note';
      note.textContent = `${hidden} hidden by filter`;
      body.appendChild(note);
    }
  }

  if (col.id === 'done') {
    // Group by doneAt LOCAL date (not UTC) so a SGT-evening done event
    // doesn't get binned under the previous UTC day.
    const groups = {};
    cards.forEach(c => {
      const src = c.doneAt || c.updatedAt || c.createdAt;
      const day = src ? localYmd(src) : 'unknown';
      (groups[day] = groups[day] || []).push(c);
    });
    Object.keys(groups).sort().reverse().forEach(day => {
      const hdr = document.createElement('div');
      hdr.className = 'day-header';
      const lbl = document.createElement('span');
      lbl.textContent = formatDayHeader(day);
      hdr.appendChild(lbl);
      const ct = document.createElement('span');
      ct.className = 'day-count';
      ct.textContent = groups[day].length;
      hdr.appendChild(ct);
      body.appendChild(hdr);
      // #89 BOARD-DONE-LIFO — within each day group, order latest-resolved
      // first so the most recently shipped card sits at the top of its day.
      const sorted = groups[day].slice().sort((a, b) => {
        const ta = a.doneAt || a.updatedAt || a.createdAt || '';
        const tb = b.doneAt || b.updatedAt || b.createdAt || '';
        return tb.localeCompare(ta); // desc — ISO strings compare lexicographically
      });
      sorted.forEach(card => body.appendChild(renderCardCompact(card)));
    });
  } else {
    // #119 — drag-order wins. Previously sorted by priority bucket on every
    // render, which clobbered manual drop positions. Priority still shows
    // visually via the .prio-* left border; ordering is now whatever the
    // user has dragged into place (i.e., state.cards array order).
    cards.forEach(card => body.appendChild(renderCardCompact(card)));
  }
  el.appendChild(body);

  const addBtn = document.createElement('button');
  addBtn.className = 'add-card-btn';
  addBtn.textContent = col.id === 'ideas' ? '+ Add idea' : '+ Add card';
  addBtn.onclick = () => {
    const n = (state.nextNum || 1);
    state.nextNum = n + 1;
    const card = {
      num: n,
      id: uid('c'),
      code: '',
      priority: null,
      title: 'New ' + (col.id === 'ideas' ? 'idea' : 'card'),
      column: col.id,
      tags: [],
      notes: '',
      writeup: '',
      createdAt: now(),
      updatedAt: now(),
      doneAt: col.id === 'done' ? now() : null,
      subtasks: []
    };
    state.cards.push(card);
    scheduleSave();
    openModal(card.id);
    // #186 — for newly-added cards: focus + select-all the title so the
    // user can type over "New card" immediately. First blur (caused by
    // Enter — see title keydown handler — or by clicking outside the
    // title) commits the title and closes the modal. One-shot so it
    // doesn't fire on later edits.
    requestAnimationFrame(() => {
      const titleEl = document.querySelector('#modal-overlay .modal-title');
      if (!titleEl) return;
      titleEl.focus();
      try {
        const range = document.createRange();
        range.selectNodeContents(titleEl);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      } catch (_) {}
      titleEl.addEventListener('blur', () => closeModal(), { once: true });
    });
  };
  el.appendChild(addBtn);

  // #119 correction — keep the dragged column invisible through re-renders.
  // _colDragSrcId is set during a column drag; cleared on dragend.
  // opacity:0 (not visibility:hidden) so drop events still fire on the slot.
  if (_colDragSrcId === col.id) el.style.opacity = '0';

  return el;
}

// ===== #318 BOARD-LOAD HUD — live inline/haiku extraction progress =====
// A draggable terminal panel that fills as each chunk of staged session
// history is processed. Driven by the `extract_progress` SSE event (emitted by
// `card.py progress` in inline mode, and by hourly_emit's banner in haiku mode).
// Sibling of the #119 drag HUD; position persists to localStorage.
(function(){
  const POS_KEY = 'workboard.loadHudPos';
  function el(){
    let h = document.getElementById('load-hud'); if (h) return h;
    h = document.createElement('div'); h.id = 'load-hud';
    h.innerHTML =
      '<div id="load-hud-head"><span class="lh-dot"></span>'+
      '<span>HISTORY REPLAY ░ <span id="lh-mode">inline extraction</span></span></div>'+
      '<div id="load-hud-body">'+
        '<div class="lh-status"><b>▶ EXTRACTING<span class="lh-cur">▋</span></b>'+
          '<span class="lh-count"><span id="lh-done">0</span>/<span id="lh-total">0</span></span></div>'+
        '<div class="lh-window" id="lh-window">awaiting staged digest…</div>'+
        '<div class="lh-track"><div class="lh-fill" id="lh-fill"></div>'+
          '<div class="lh-pct" id="lh-pct">0%</div></div>'+
        '<div class="lh-tail" id="lh-tail">&nbsp;</div>'+
      '</div>';
    let s = null; try { s = JSON.parse(localStorage.getItem(POS_KEY) || 'null'); } catch (e) {}
    if (s && isFinite(s.left) && isFinite(s.top)) { h.style.left = s.left+'px'; h.style.top = s.top+'px'; }
    else { h.style.top = '110px'; h.style.right = '12px'; }
    document.body.appendChild(h);
    const head = h.querySelector('#load-hud-head'); let d = null;
    head.addEventListener('mousedown', e => { e.preventDefault(); const r = h.getBoundingClientRect();
      d = { dx: e.clientX-r.left, dy: e.clientY-r.top }; head.style.cursor = 'grabbing';
      h.style.left = r.left+'px'; h.style.top = r.top+'px'; h.style.right = ''; });
    document.addEventListener('mousemove', e => { if (!d) return;
      h.style.left = Math.max(0, Math.min(innerWidth-60, e.clientX-d.dx))+'px';
      h.style.top  = Math.max(0, Math.min(innerHeight-24, e.clientY-d.dy))+'px'; });
    document.addEventListener('mouseup', () => { if (!d) return; d = null; head.style.cursor = 'grab';
      try { localStorage.setItem(POS_KEY, JSON.stringify({ left: parseFloat(h.style.left)||0, top: parseFloat(h.style.top)||0 })); } catch (e) {} });
    return h;
  }
  let _hideTimer = null;
  // #327 — the HUD header text per fill phase. '' / 'inline' keep the original
  // wording (the main-Claude inline path); the haiku tiers pass an explicit
  // phase so the header no longer wrongly says "inline" during a haiku fill.
  function _lhHeader(phase){
    switch (phase) {
      case 'replay':  return 'replaying last 24h';
      case 'speedup': return 'speeding up ▸▸ backfill';
      case 'solo':    return 'replaying history';
      default:        return 'inline extraction';
    }
  }
  const HUD = {
    show(){ const h = el(); h.style.display = ''; if (_hideTimer) { clearTimeout(_hideTimer); _hideTimer = null; } return HUD; },
    hide(){ const h = el(); h.style.display = 'none'; return HUD; },
    update(done, total, label, phase){
      const h = el(); h.classList.remove('lh-done'); h.style.display = '';
      const pct = total ? Math.round(done/total*100) : 0;
      h.querySelector('#lh-done').textContent = String(done).padStart(String(total||0).length, '0');
      h.querySelector('#lh-total').textContent = total;
      h.querySelector('#lh-fill').style.transform = 'scaleX('+(pct/100)+')';
      h.querySelector('#lh-pct').textContent = pct+'%';
      const mode = h.querySelector('#lh-mode'); if (mode) mode.textContent = _lhHeader(phase);
      const sb = h.querySelector('.lh-status b');
      if (sb) sb.innerHTML = (phase === 'speedup' ? '▶ SPEEDING UP' : '▶ EXTRACTING') + '<span class="lh-cur">▋</span>';
      if (label) { h.querySelector('#lh-window').textContent = label; h.querySelector('#lh-tail').textContent = '✓ '+label; }
      return HUD;
    },
    // #327 — tier-1 ('replay') ended but tier-2 is still coming. Don't flash
    // "✓ COMPLETE" + auto-hide (that pre-flood flash is the "feels buggy"); show
    // the "day-1 replayed in Xs · speeding up" handoff and stay visible.
    handoff(label){
      const h = el(); h.classList.remove('lh-done'); h.style.display = '';
      h.querySelector('#lh-fill').style.transform = 'scaleX(1)';
      h.querySelector('#lh-pct').textContent = '100%';
      const mode = h.querySelector('#lh-mode'); if (mode) mode.textContent = _lhHeader('speedup');
      const sb = h.querySelector('.lh-status b'); if (sb) sb.innerHTML = '▶ SPEEDING UP<span class="lh-cur">▋</span>';
      h.querySelector('#lh-window').textContent = label || 'speeding up ▸▸';
      if (_hideTimer) { clearTimeout(_hideTimer); _hideTimer = null; }
      return HUD;
    },
    done(label){
      const h = el(); h.classList.add('lh-done'); h.style.display = '';
      h.querySelector('#lh-fill').style.transform = 'scaleX(1)';
      h.querySelector('#lh-pct').textContent = '100%';
      h.querySelector('.lh-status b').innerHTML = '✓ COMPLETE';
      h.querySelector('#lh-window').textContent = label || 'extraction + sweep done';
      // auto-fade the completed HUD so it doesn't linger over the filled board
      if (_hideTimer) clearTimeout(_hideTimer);
      _hideTimer = setTimeout(() => { try { el().style.display = 'none'; } catch (e) {} }, 6000);
      return HUD;
    }
  };
  window.BoardLoadHUD = HUD;
})();

// ===== SSE: live event stream from serve.py /events =====
// Server diffs every POST /board.json against the prior cached state and
// broadcasts per-card / per-column events. We update state in place and
// apply incremental DOM ops with animations — no full re-render.
//
// Polling (startPoll) stays as a safety net for missed events / SSE drops.

let _es = null;
let _sseConnected = false;

function cssEsc(s) {
  // CSS.escape exists everywhere modern; fallback for paranoia.
  if (window.CSS && CSS.escape) return CSS.escape(s);
  return (s || '').replace(/[^a-zA-Z0-9_-]/g, c => '\\' + c);
}

function findCardEl(id)    { return document.querySelector(`.card[data-card-id="${cssEsc(id)}"]`); }
function findColumnEl(id)  { return document.querySelector(`.column[data-col="${cssEsc(id)}"]`); }
function refreshColumnCount(colId) {
  const ct = document.querySelector(`.column[data-col="${cssEsc(colId)}"] .count`);
  if (ct && state) ct.textContent = state.cards.filter(c => c.column === colId).length;
}

// #249 v5 — the In-Progress pulse is DERIVED from board state, not a
// live-only DOM flag. The ONE most-recently-touched card currently in In
// Progress pulses; every other card stays quiet. Because it's recomputed
// from state.cards (not set once by a transition event), it SURVIVES page
// refresh AND any full/partial re-render — the two ways the old v4 logic
// silently lost the pulse. No connection or timer: it's a CSS class toggled
// from state, recomputed after every render() and SSE mutation.
// #254 — the active-work card = the one most recently MOVED INTO In Progress
// (a live transition), persisted as state.activeWorkId in board.json so the
// pulse + top-pin survive refresh. Cards merely PARKED in In Progress (e.g.
// #83, which was never transitioned in this scheme) are NOT active and stay
// quiet — this is the old live-transition definition, just made persistent.
// Guard: if the stored id isn't in In Progress anymore, nothing is active.
function activeWorkId() {
  if (!state || !state.activeWorkId) return null;
  const c = state.cards.find(x => x.id === state.activeWorkId);
  return (c && c.column === 'inprogress') ? c.id : null;
}

function refreshActiveWork() {
  if (!state || _view !== 'board') return;
  const activeId = activeWorkId();
  document.querySelectorAll('.card.active-work').forEach(c => {
    if (c.dataset.cardId !== activeId) c.classList.remove('active-work');
  });
  if (activeId) {
    const el = findCardEl(activeId);
    if (el) el.classList.add('active-work');
  }
}

// #258 — append a movement event {from, to, at} to a card's history so every
// column shift is timestamped (training-data label timeline, mirrors card.py
// _record_move). No-op when the column doesn't actually change.
function recordMove(card, fromCol, toCol) {
  if (fromCol === toCol) return;
  (card.history = card.history || []).push({ from: fromCol, to: toCol, at: now() });
}

// Live transition handler — set/clear the persisted active-work id on a real
// move in/out of In Progress, then repaint. Does NOT save: whichever writer
// triggered the move (card.py, or the UI drop/modal handlers) persists
// state.activeWorkId. This keeps the client's in-memory state correct for
// SSE-driven moves where the board-level field wouldn't otherwise propagate.
function applyActiveWorkTransition(cardId, fromCol, toCol) {
  if (!state) return;
  if (toCol === 'inprogress' && fromCol !== 'inprogress') {
    state.activeWorkId = cardId;
  } else if (fromCol === 'inprogress' && toCol !== 'inprogress'
             && state.activeWorkId === cardId) {
    state.activeWorkId = null;
  }
  refreshActiveWork();
}

// #102 BOARD-AUTO-LINK: server broadcasts card-flash via /flash?card=N&file=PATH
// when the PreToolUse hook sees Claude editing a file in this card's linkedFiles.
// Adds .linked-flash for 1.8s + drops a one-line toast naming the file.
function handleCardFlash({ id, num, title, file }) {
  if (!state) return;
  const el = findCardEl(id);
  if (el) {
    el.classList.remove('linked-flash');
    void el.offsetWidth;            // re-trigger CSS animation
    el.classList.add('linked-flash');
    el.addEventListener('animationend', () => el.classList.remove('linked-flash'), { once: true });
  }
  const f = file ? (file.split('/').pop() || file) : '';
  toast(`⚡ #${num} — touched ${f || 'linked file'}`, 2400);
  if (typeof logEvent === 'function') {
    logEvent('flash', `#${num} ⚡ ${f || ''}`, { id, num, file });
  }
}

function handleCardAdded({ card }) {
  if (!state) return;
  const existing = state.cards.find(c => c.id === card.id);
  if (existing) Object.assign(existing, card);
  else { state.cards.push(card); state.nextNum = Math.max(state.nextNum || 0, (card.num || 0) + 1); }
  // Auto-card (#100): pop the rich Undo toast even if board view isn't active —
  // user might be on Calendar. Toast is fixed-position.
  if (card.meta && card.meta.autoCreated) showAutoCardToast(card);
  if (_view !== 'board') return;
  if (findCardEl(card.id)) return;          // race with poll — already in DOM

  const col = findColumnEl(card.column);
  if (!col) { render(); return; }            // column unknown — fall back to full
  const body = col.querySelector('.column-body');
  if (!body) { render(); return; }

  const el = renderCardCompact(card);
  // #337 — suppress the pop during a tab-refocus flush (queued SSE backlog);
  // the card just appears in place instead of joining a re-fly burst.
  const animate = !_animSuppressed();
  if (animate) el.classList.add('popping-in');
  // Done column groups by day-header; easiest: append to body, full render
  // will regroup on next poll. For Ideas/Backlog/InProgress/Blocked: append.
  body.appendChild(el);
  if (animate) el.addEventListener('animationend', () => el.classList.remove('popping-in'), { once: true });
  markCardSeen(card.id);   // #313 — got .popping-in live; don't re-animate via .entering on a later reconnect/refresh
  refreshColumnCount(card.column);
  // If a brand-new card is born directly into In Progress, treat it as
  // a transition from "nothing" → inprogress.
  applyActiveWorkTransition(card.id, null, card.column);
  logEvent('add', `#${card.num} "${card.title}" → ${card.column}`, card);
}

// Replays the user-drag visual sequence for a CLI/SSE-driven cross-column
// card move. Mirrors dragstart → dragover-reflow → drop:
//   PICKUP (200ms): source column dims (.card-src-col 0.55), original card
//     gets .dragging (opacity 0.45 + rotate 1.5deg), a ghost clone appears
//     at the source rect with lift + tilt + shadow.
//   RESERVE: ghost is in flight; the real new card is appended (hidden) at
//     the destination so siblings FLIP-reflow to open the slot.
//   TRAVEL (720ms): ghost flies from source rect to dest rect, scale 1.04 →
//     1.0, rotate 1.5deg → 0, shadow heavy → light. Same easing as user
//     drag (cubic-bezier(0.34, 1.45, 0.64, 1)).
//   DROP: ghost removed, real card revealed, source column un-dims.
function simulateUserDragMove(card, fromColumn, toColumn, oldEl) {
  const srcRect  = oldEl.getBoundingClientRect();
  const srcColEl = findColumnEl(fromColumn);
  const dstColEl = findColumnEl(toColumn);
  if (!dstColEl) { render(); return; }
  const dstBody = dstColEl.querySelector('.column-body');
  if (!dstBody) { render(); return; }

  // PICKUP — mirrors dragstart.
  if (srcColEl) srcColEl.classList.add('card-src-col');
  oldEl.classList.add('dragging');

  const ghost = renderCardCompact(card);
  ghost.style.position      = 'fixed';
  ghost.style.left          = srcRect.left + 'px';
  ghost.style.top           = srcRect.top  + 'px';
  ghost.style.width         = srcRect.width  + 'px';
  ghost.style.height        = srcRect.height + 'px';
  ghost.style.margin        = '0';
  ghost.style.zIndex        = '2000';
  ghost.style.pointerEvents = 'none';
  ghost.style.boxShadow     = '0 14px 32px rgba(0,0,0,0.24)';
  ghost.style.transform     = 'scale(1.04) rotate(1.5deg)';
  ghost.style.transition    = 'transform 180ms cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 180ms ease';
  document.body.appendChild(ghost);

  // 80ms pickup pause (was 200) — tuned for chained `card.py fly` flow.
  // Total visible motion = 80 (pickup) + 240 (travel) = 320ms; pair with
  // card.py fly --pause-ms 400 default for a snappy chain.
  setTimeout(() => {
    const before = captureCardRects();
    oldEl.remove();
    const newEl = renderCardCompact(card);
    newEl.style.visibility = 'hidden';   // revealed when ghost lands
    // Land on TOP. For Done, the first child is the TODAY day-header — we
    // skip it so the card lands UNDER today's header (still the visual top
    // of the column). For other cols, no headers exist so this is just
    // "first card" = top.
    const firstCard = dstBody.querySelector('.card');
    dstBody.insertBefore(newEl, firstCard || null);
    // Scroll dest col to the top so the landing slot is on-screen — Done
    // (and other long cols) are overflow-y:auto and usually scrolled, which
    // would put the top slot above the visible area and make the card look
    // like it "vanished into Done".
    dstBody.scrollTop = 0;

    // FLIP siblings only — destination cards slide aside to open the slot,
    // source cards slide up to close the gap. Duration matches ghost-flight
    // below so neighbors settle the same instant the card lands (else card
    // materializes among still-shifting siblings — the "Done is not smooth"
    // symptom).
    const beforeSiblings = new Map(before);
    beforeSiblings.delete(card.id);
    flipPlayCards(beforeSiblings, { duration: 240 });

    const dstRect = newEl.getBoundingClientRect();
    const dx = dstRect.left - srcRect.left;
    const dy = dstRect.top  - srcRect.top;

    const anim = ghost.animate(
      [
        { transform: 'scale(1.04) rotate(1.5deg) translate(0, 0)',
          boxShadow: '0 14px 32px rgba(0,0,0,0.24)' },
        { transform: `scale(1.0) rotate(0deg) translate(${dx}px, ${dy}px)`,
          boxShadow: '0 2px 6px rgba(0,0,0,0.08)' },
      ],
      { duration: 240, easing: 'cubic-bezier(0.34, 1.45, 0.64, 1)', fill: 'both' }
    );
    const land = () => {
      newEl.style.visibility = '';
      try { ghost.remove(); } catch (_) {}
      if (srcColEl) srcColEl.classList.remove('card-src-col');
      try { anim.cancel(); } catch (_) {}
      // Pulse follows live transitions. Card moved INTO In Progress → pulse;
      // OUT OF In Progress → pulse stops. Old stuck cards stay quiet.
      applyActiveWorkTransition(card.id, fromColumn, toColumn);
    };
    anim.addEventListener('finish', land, { once: true });
    anim.addEventListener('cancel', land, { once: true });
  }, 80);
}

function handleCardUpdated({ card, fromColumn, toColumn }) {
  if (!state) return;
  const idx = state.cards.findIndex(c => c.id === card.id);
  if (idx >= 0) Object.assign(state.cards[idx], card);
  else { state.cards.push(card); }
  if (_view !== 'board') return;

  const oldEl = findCardEl(card.id);
  if (!oldEl) { handleCardAdded({ card }); return; }

  if (fromColumn && toColumn && fromColumn !== toColumn) {
    // Replay the user-drag visual exactly: source dims, card lifts, ghost
    // glides across, destination siblings reflow, ghost lands.
    simulateUserDragMove(card, fromColumn, toColumn, oldEl);
    refreshColumnCount(fromColumn);
    refreshColumnCount(toColumn);
    logEvent('move', `#${card.num} ${fromColumn} → ${toColumn}`, card);
  } else {
    // In-place edit (title/priority/tags/subtask) — swap DOM, pulse + flash.
    const newEl = renderCardCompact(card);
    newEl.classList.add('flashing', 'pulsing');
    oldEl.replaceWith(newEl);
    setTimeout(() => newEl.classList.remove('flashing','pulsing'), 1300);
    logEvent('move', `#${card.num} edited`, card);
  }
  // #249 — the in-place branch builds a fresh el without active-work; an edit
  // to the active card (subtask check, priority) would otherwise drop its
  // pulse. Recompute from state so the right card keeps pulsing.
  refreshActiveWork();
}

function handleCardRemoved({ id }) {
  if (!state) return;
  const removed = state.cards.find(c => c.id === id);
  state.cards = state.cards.filter(c => c.id !== id);
  if (removed) logEvent('remove', `#${removed.num} "${removed.title}"`);
  const el = findCardEl(id);
  if (!el) return;
  const colId = el.dataset.col;
  el.classList.add('removing');
  el.addEventListener('animationend', () => {
    el.remove();
    refreshColumnCount(colId);
  }, { once: true });
  // #249 — if the removed/moved card was the pulsing one, hand the pulse to
  // the next most-recent In Progress card (or none).
  refreshActiveWork();
}

// Shared delete path used by the modal Delete button, right-click on a
// card, and the trash drop-zone. Animates the card out via .removing.
// #164 — reopen a Done card as a bug. Moves it back to In Progress and
// stamps a 'bugged' tag so the regression is visible in card history.
// The card immediately picks up the In Progress pulse via the existing
// applyActiveWorkTransition path.
// #177 — reopen a Done card as an improvement. Prompts for the subtask
// text, moves the card back to In Progress, appends a new open subtask.
// No bug tag (deliberate enhancement, not a regression).
async function improveCard(id) {
  if (!state) return;
  const card = state.cards.find(c => c.id === id);
  if (!card || card.column !== 'done') return;
  const text = prompt('What improvement? (will be added as a new subtask)', '');
  if (!text || !text.trim()) return;
  pushUndo();
  const from = card.column;
  card.column = 'inprogress';
  card.doneAt = null;
  card.subtasks = card.subtasks || [];
  const sid = 's-' + Date.now().toString(36) + '-' + Math.floor(Math.random()*1000);
  card.subtasks.push({
    id: sid, text: text.trim(), done: false,
    createdAt: now(), children: [],
  });
  card.lastTouchedSubtask = sid;
  card.updatedAt = now();
  closeModal();
  scheduleSave();
  render();
  applyActiveWorkTransition(card.id, from, 'inprogress');
  toast('✨ Reopened as improvement — ' + undoHint() + ' to undo', 3200);
}

function reopenAsBug(id) {
  if (!state) return;
  const card = state.cards.find(c => c.id === id);
  if (!card || card.column !== 'done') return;
  pushUndo();
  const from = card.column;
  card.column = 'inprogress';
  card.doneAt = null;
  card.tags = card.tags || [];
  if (!card.tags.includes('bug')) card.tags.push('bug');
  card.updatedAt = now();
  closeModal();
  scheduleSave();
  render();
  // Manually trigger the pulse since render() doesn't (transition-based).
  applyActiveWorkTransition(card.id, from, 'inprogress');
  toast('🐞 Reopened as bug — ' + undoHint() + ' to undo', 3200);
}

// ===== Card action menu (#333) — kebab ⋯ / right-click: Move to + Delete ====
// A no-drag path to relocate a card (complements #332 edge auto-scroll) plus
// a discoverable home for Delete. Rendered at document.body level so it
// escapes the columns' overflow:hidden clipping; closes on pick, click-away,
// or Escape.
let _cardMenuEl = null;
function _cardMenuAway(e) { if (_cardMenuEl && !_cardMenuEl.contains(e.target)) closeCardMenu(); }
function _cardMenuKey(e) { if (e.key === 'Escape') closeCardMenu(); }
function closeCardMenu() {
  if (!_cardMenuEl) return;
  _cardMenuEl.remove();
  _cardMenuEl = null;
  document.removeEventListener('mousedown', _cardMenuAway, true);
  document.removeEventListener('keydown', _cardMenuKey, true);
}
function openCardMenu(card, x, y) {
  if (!state || !card) return;
  closeCardMenu();
  const menu = document.createElement('div');
  menu.className = 'card-menu';
  // "Move to" — every column except the one the card is already in.
  const others = state.columns.filter(c => c.id !== card.column);
  if (others.length) {
    const hdr = document.createElement('div');
    hdr.className = 'card-menu-hdr';
    hdr.textContent = 'Move to';
    menu.appendChild(hdr);
    others.forEach(col => {
      const item = document.createElement('button');
      item.className = 'card-menu-item';
      item.textContent = col.name;
      item.onclick = () => { closeCardMenu(); moveCardToColumn(card, col.id); };
      menu.appendChild(item);
    });
    const sep = document.createElement('div');
    sep.className = 'card-menu-sep';
    menu.appendChild(sep);
  }
  const del = document.createElement('button');
  del.className = 'card-menu-item card-menu-del';
  del.textContent = 'Delete';
  del.onclick = async () => {
    closeCardMenu();
    if (await miniConfirm('Delete card?', { sub: `"${card.title}"` })) deleteCard(card.id);
  };
  menu.appendChild(del);
  document.body.appendChild(menu);
  // Position, clamped to the viewport (kebab sits at the far-right edge, so
  // the menu would otherwise overflow — pull it back on-screen).
  const r = menu.getBoundingClientRect();
  const px = Math.min(x, window.innerWidth - r.width - 8);
  const py = Math.min(y, window.innerHeight - r.height - 8);
  menu.style.left = Math.max(8, px) + 'px';
  menu.style.top = Math.max(8, py) + 'px';
  _cardMenuEl = menu;
  // Defer the away-listener a tick so the opening click doesn't self-close it.
  setTimeout(() => {
    if (!_cardMenuEl) return;
    document.addEventListener('mousedown', _cardMenuAway, true);
    document.addEventListener('keydown', _cardMenuKey, true);
  }, 0);
}

function deleteCard(id) {
  if (!state) return;
  pushUndo();
  state.cards = state.cards.filter(c => c.id !== id);
  const el = findCardEl(id);
  if (el) {
    const colId = el.dataset.col;
    el.classList.add('removing');
    el.addEventListener('animationend', () => {
      el.remove();
      refreshColumnCount(colId);
    }, { once: true });
  }
  if (_openCardId === id) closeModal();
  scheduleSave();
}

function handleColumnAdded({ column, index }) {
  if (!state) return;
  if (!state.columns.find(c => c.id === column.id)) {
    state.columns.splice(typeof index === 'number' ? index : state.columns.length, 0, column);
  }
  if (_view !== 'board') return;
  if (findColumnEl(column.id)) return;

  const boardEl = $('#board');
  const addBtn = boardEl.querySelector('.col-add-btn');
  const newCol = renderColumn(column, []);
  newCol.classList.add('sliding-in');
  if (addBtn) boardEl.insertBefore(newCol, addBtn);
  else boardEl.appendChild(newCol);
  newCol.addEventListener('animationend', () => newCol.classList.remove('sliding-in'), { once: true });
  logEvent('col', `+ column "${column.name || column.id}"`);
}

function handleColumnRemoved({ id }) {
  if (!state) return;
  const removed = state.columns.find(c => c.id === id);
  state.columns = state.columns.filter(c => c.id !== id);
  if (removed) logEvent('col', `− column "${removed.name || removed.id}"`);
  const el = findColumnEl(id);
  if (!el) return;
  el.style.transition = 'opacity 200ms ease, max-width 300ms ease';
  el.style.opacity = '0';
  el.style.maxWidth = '0';
  setTimeout(() => el.remove(), 320);
}

function handleColumnRenamed({ id, name }) {
  const col = state && state.columns.find(c => c.id === id);
  if (col) col.name = name;
  const nameEl = document.querySelector(`.column[data-col="${cssEsc(id)}"] .name`);
  if (nameEl && nameEl.textContent !== name) nameEl.textContent = name;
}

function handleRevBumped({ rev, savedBy, savedAt }) {
  if (!state) return;
  state.rev = rev;
  state.savedBy = savedBy;
  state.savedAt = savedAt;
  lastRev = rev;
  // Cancel imminent poll since we have fresh data
  suppressPollUntil = Date.now() + 2000;
  setStatus('live');
}

function startSSE() {
  if (!window.EventSource) return;             // very old browser — polling will cover it
  try { _es && _es.close(); } catch (_) {}
  _es = new EventSource('/events');
  _es.addEventListener('open', () => {
    _sseConnected = true;
    setStatus('live');
  });
  _es.addEventListener('card-added',     e => handleCardAdded(JSON.parse(e.data)));
  _es.addEventListener('card-updated',   e => handleCardUpdated(JSON.parse(e.data)));
  _es.addEventListener('card-removed',   e => handleCardRemoved(JSON.parse(e.data)));
  _es.addEventListener('card-flash',     e => handleCardFlash(JSON.parse(e.data)));
  _es.addEventListener('column-added',   e => handleColumnAdded(JSON.parse(e.data)));
  _es.addEventListener('column-removed', e => handleColumnRemoved(JSON.parse(e.data)));
  _es.addEventListener('column-renamed', e => handleColumnRenamed(JSON.parse(e.data)));
  _es.addEventListener('rev-bumped',     e => handleRevBumped(JSON.parse(e.data)));
  _es.addEventListener('extract_progress', e => {        // #318 BOARD-LOAD HUD
    try {
      const d = JSON.parse(e.data);
      if (!window.BoardLoadHUD) return;
      if (d.total > 0 && d.done >= d.total) {
        // #327 — 'replay' (tier-1) finishing isn't the end: hand off to the
        // "speeding up" tier-2 instead of completing the HUD.
        if (d.phase === 'replay') BoardLoadHUD.handoff(d.label);
        else BoardLoadHUD.done(d.label);
      } else BoardLoadHUD.update(d.done || 0, d.total || 0, d.label || '', d.phase || '');
    } catch (_) {}
  });
  _es.onerror = () => {
    // Browser auto-reconnects; just downgrade status badge.
    if (_sseConnected) setStatus('reconnecting…', 'unsynced');
    _sseConnected = false;
  };
}

// ===== Init =====
async function init() {
  // Close modal: ESC or click on overlay backdrop
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (_openCardId) closeModal();
      else if (_tagLegendOpen) toggleTagLegend(false);
      return;
    }
    // Ctrl/Cmd+Z = undo · Ctrl/Cmd+Shift+Z or Ctrl/Cmd+Y = redo.
    // Intercepts globally (including inside textareas/contentEditables) so
    // structural changes (column move, delete, etc.) can be undone from
    // anywhere on the board.
    const meta = e.metaKey || e.ctrlKey;
    if (!meta) return;
    const k = e.key.toLowerCase();
    if (k === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    else if ((k === 'z' && e.shiftKey) || k === 'y') { e.preventDefault(); redo(); }
  });
  $('#modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // #127 — Figma-style background drag-to-pan. Grab the board background
  // (anywhere not on a column/card/button) and drag — the board pans with
  // the cursor (content follows the mouse: drag right → reveals left side).
  // Only fires when mousedown target IS #board itself; clicks on columns
  // or cards bubble first to their own handlers (no interference).
  (() => {
    const board = $('#board');
    let panning = false, startX = 0, startY = 0;
    let startScrollLeft = 0, startScrollTop = 0;
    board.addEventListener('mousedown', e => {
      if (e.target !== board) return;       // ignore clicks on children
      if (e.button !== 0) return;           // left button only
      panning = true;
      startX = e.clientX; startY = e.clientY;
      startScrollLeft = board.scrollLeft;
      startScrollTop  = board.scrollTop;
      board.style.cursor = 'grabbing';
      board.style.userSelect = 'none';
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!panning) return;
      // 2D pan — content follows cursor in any direction (Figma-style).
      board.scrollLeft = startScrollLeft - (e.clientX - startX);
      board.scrollTop  = startScrollTop  - (e.clientY - startY);
    });
    const stop = () => {
      if (!panning) return;
      panning = false;
      board.style.cursor = '';
      board.style.userSelect = '';
    };
    document.addEventListener('mouseup', stop);
    document.addEventListener('mouseleave', stop);
    // Hint on hover over empty board area — only when not currently dragging
    // a card/column (those own the cursor style).
    board.addEventListener('mouseenter', () => {
      if (!document.body.classList.contains('col-dragging-active') &&
          !document.body.classList.contains('card-dragging-active')) {
        board.style.cursor = 'grab';
      }
    });
    board.addEventListener('mouseleave', () => {
      if (!panning) board.style.cursor = '';
    });
  })();

  // Tag legend: header pill toggles, click-outside closes, clear-filter resets
  $('#tags-btn').addEventListener('click', e => {
    e.stopPropagation();
    toggleTagLegend();
  });
  $('#tag-clear').addEventListener('click', e => {
    e.stopPropagation();
    _tagFilter.clear();
    _columnFilter.clear();
    refreshTagLegend();
    render();
  });
  // Outside-click closes popover. Use mousedown (fires BEFORE click) so the
  // closest() check runs while the clicked chip is still attached to DOM.
  // If we waited for click, refreshTagLegend() would have already wiped the
  // popover body, detaching the chip — closest() returns null — and the
  // handler would incorrectly close the popover. (User can't filter
  // multiple things without reopening.)
  document.addEventListener('mousedown', e => {
    if (!_tagLegendOpen) return;
    if (e.target.closest('#tag-legend') || e.target.closest('#tags-btn')) return;
    toggleTagLegend(false);
  });

  initTooltipDelegation();

  document.querySelectorAll('#view-toggle button').forEach(b => {
    b.onclick = () => setView(b.dataset.view);
  });

  // Trash drop-zone — visible while either a column or a card is being
  // dragged. Accepts both drops; type is disambiguated by which MIME the
  // dataTransfer carries (text/col-id vs text/plain "card:<id>").
  const trash = $('#col-trash');
  trash.addEventListener('dragover', e => {
    const types = e.dataTransfer.types || [];
    const isCol  = types.includes('text/col-id');
    const isCard = types.includes('text/card-id') || types.includes('text/plain') || !!_cardDrag;
    if (!isCol && !isCard) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    trash.classList.add('over');
  });
  trash.addEventListener('dragleave', () => trash.classList.remove('over'));
  trash.addEventListener('drop', async e => {
    trash.classList.remove('over');
    e.preventDefault();

    // ── Card drop ────────────────────────────────────────────────────
    let cardId = e.dataTransfer.getData('text/card-id');
    if (!cardId) {
      const plain = e.dataTransfer.getData('text/plain') || '';
      if (plain.startsWith('card:')) cardId = plain.slice(5);
    }
    if (!cardId && _cardDrag) cardId = _cardDrag.cardId;
    if (cardId) {
      // Cancel any in-flight drag preview so the source element returns
      // to its column before the deletion animation runs.
      if (_cardDrag) cancelCardDrag();
      const card = state.cards.find(c => c.id === cardId);
      if (!card) return;
      if (!(await miniConfirm('Delete card?', { sub: `"${card.title}"` }))) return;
      deleteCard(cardId);
      return;
    }

    // ── Column drop (existing behaviour) ────────────────────────────
    const colId = e.dataTransfer.getData('text/col-id');
    if (!colId) return;
    const col = state.columns.find(c => c.id === colId);
    if (!col) return;
    if (col.kind !== 'custom') {
      toast(`"${col.name}" is a default column — can't delete`);
      return;
    }
    const cardCount = state.cards.filter(c => c.column === colId).length;
    const sub = cardCount
      ? `Delete "${col.name}" — ${cardCount} card(s) → Backlog`
      : `Delete column "${col.name}"`;
    if (!(await miniConfirm('Confirm?', { sub }))) return;
    deleteColumn(colId);
  });

  setInterval(tickTimes, 15000);

  // Show where we're fetching from (helps user debug if server isn't up).
  const setupUrl = $('#setup-url');
  if (setupUrl) setupUrl.textContent = location.origin + BOARD_URL;

  try {
    await loadFromFile();
    enterApp();
    startSSE();
    startPoll();
  } catch (e) {
    $('#setup-err').textContent =
      'Could not reach board server: ' + (e.message || e) +
      '. Run `board-steward serve` (or `python ~/.claude/skills/board-steward/scripts/serve.py`) from the project directory.';
  }
}

init();

// ═════════════════════════════════════════════════════════════════════
// LIFECYCLE SELF-TEST — DO NOT BREAK
// Console contract check for the canonical Claude-task lifecycle. Fires
// the underlying CSS+JS primitives against expected shapes/durations.
// If a new feature accidentally redefines a keyframe, renames a function,
// or strips a class, this lights up red.
//
//   Open DevTools console and type:   runLifecycle()
//
// Returns {ok, checks:[{name, pass, got?}]}. Toast on screen + grouped
// console log. Fast — does not actually move cards (use card.py sim for
// the visual end-to-end test).
// ═════════════════════════════════════════════════════════════════════
window.runLifecycle = function runLifecycle() {
  const checks = [];
  const ck = (name, pass, got) => checks.push({ name, pass: !!pass, got });

  // --- CSS contract ---------------------------------------------------
  const t = document.createElement('div');
  t.className = 'card popping-in';
  t.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
  document.body.appendChild(t);
  const cs1 = getComputedStyle(t);
  ck('popping-in animation duration ≈ 640ms',
     cs1.animationDuration === '0.64s', cs1.animationDuration);
  t.remove();

  const t2 = document.createElement('div');
  t2.className = 'column card-src-col';
  t2.style.cssText = 'position:fixed;top:-9999px;';
  document.body.appendChild(t2);
  const cs2 = getComputedStyle(t2);
  ck('card-src-col opacity ≤ 0.7',
     parseFloat(cs2.opacity) <= 0.7, cs2.opacity);
  t2.remove();

  // --- JS primitives --------------------------------------------------
  ck('simulateUserDragMove is a fn', typeof simulateUserDragMove === 'function');
  ck('flipPlayCards is a fn',        typeof flipPlayCards        === 'function');
  ck('captureCardRects is a fn',     typeof captureCardRects     === 'function');
  ck('reflowCardDragPreview is a fn',typeof reflowCardDragPreview === 'function');
  ck('commitCardDrag is a fn',       typeof commitCardDrag       === 'function');
  ck('handleCardAdded is a fn',      typeof handleCardAdded      === 'function');
  ck('handleCardUpdated is a fn',    typeof handleCardUpdated    === 'function');
  ck('flipPlayCards accepts opts arg', flipPlayCards.length >= 2);

  let rectsOk = false;
  try { rectsOk = captureCardRects() instanceof Map; } catch (_) {}
  ck('captureCardRects() → Map', rectsOk);

  // --- Report ---------------------------------------------------------
  const failures = checks.filter(c => !c.pass);
  const ok = failures.length === 0;
  const label = ok ? 'OK' : 'FAIL';
  console.group(`%clifecycle self-test: ${label}`,
                `color:${ok ? '#0a7a0a' : '#c00'};font-weight:bold;`);
  checks.forEach(c => {
    const sym = c.pass ? '✓' : '✗';
    const msg = c.got !== undefined ? `${c.name} → ${c.got}` : c.name;
    console.log(`%c${sym} ${msg}`, `color:${c.pass ? '#0a7a0a' : '#c00'}`);
  });
  console.groupEnd();

  if (typeof toast === 'function') {
    toast(ok
      ? '✓ Lifecycle self-test passed'
      : `✗ ${failures.length} lifecycle check(s) failed — see console`);
  }
  return { ok, checks };
};
</script>
