<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Work Board</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    /* Boho 2% palette — light, warm, hue-tinted columns; cards float white. */
    --bg:               #F8FBFC; /* frosted glass — page bg */
    --bg-header:        #FAF6F1; /* warm cream — header bar */
    --col-bg:           #F4F2EE; /* neutral default column tint (custom columns) */
    --col-header:       #5B4D43; /* warm dark for column titles */
    --card-bg:          #FFFFFF;
    --card-border:      #E6E2DC; /* warm taupe hairline */
    --ink:              #2C2620; /* warm near-black */
    --muted:            #7A6F66; /* warm muted */
    --accent:           #D97757; /* warm coral */
    --green:            #5A9F7A; /* softer success */
    --red:              #C8472A; /* warm alert red */
    --amber:            #D49A3D; /* warm amber, less neon */
    --purple:           #8E78A8; /* softer purple — ideas badge */
    --neutral:          #ECE6DD; /* warm grey for tags / progress / counts */
    /* Boho per-column tints (2% off-white in each hue family) */
    --col-ideas:        #FDFAFB; /* cotton candy */
    --col-backlog:      #FDFAF5; /* soft camel */
    --col-inprogress:   #FDFCF6; /* vanilla ice cream */
    --col-blocked:      #FAF8FC; /* blueberry cream */
    --col-done:         #F9FCF9; /* morning mist */
    --shadow:       0 1px 0 rgba(44,38,32,.08), 0 1px 2px rgba(44,38,32,.05);
    --shadow-hover: 0 4px 12px rgba(44,38,32,.10), 0 1px 3px rgba(44,38,32,.06);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    overflow: hidden;
    font-size: 14px;
    line-height: 1.4;
  }
  header {
    height: 48px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-header);
    color: var(--ink);
    border-bottom: 1px solid var(--card-border);
    flex-shrink: 0;
    position: relative; /* anchor for absolutely-centered title */
  }
  /* Dead-center the title inside the header — independent of the
     left/right item widths, so it stays centered even as status text
     grows or the view-toggle changes width. */
  /* Title wrapper holds the H1 + status dot together, dead-centered as a unit. */
  header .title-wrap {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    display: flex; align-items: center; gap: 8px;
    max-width: 60%;
    z-index: 1;
  }
  header h1 {
    font-size: 19px; margin: 0; font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer; padding: 3px 10px; border-radius: 5px;
    transition: background .12s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  header h1:hover { background: rgba(217,119,87,.10); }
  header h1[contenteditable="true"] {
    cursor: text; background: rgba(217,119,87,.10);
    outline: 1px solid var(--accent); outline-offset: 2px;
  }
  header .sp { flex: 1; }
  header button {
    background: rgba(217,119,87,.08); color: var(--ink);
    border: 1px solid var(--card-border);
    padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  header button:hover { background: rgba(217,119,87,.16); border-color: var(--accent); }
  header .status {
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  header .status .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 0 0 rgba(90,159,122,.5);
    animation: live-pulse 2.4s ease-out infinite;
  }
  header .status.unsynced .dot { background: var(--amber); animation: none; }
  header .status.error    .dot { background: var(--red);   animation: none; }
  /* v2: brief green flash on any card whose updatedAt/column changed since last poll. */
  @keyframes card-flash {
    0%   { box-shadow: 0 0 0 2px rgba(90,159,122,.6), 0 4px 14px rgba(90,159,122,.30); background: #EDF7F1; }
    100% { box-shadow: var(--shadow); background: var(--card-bg); }
  }
  .card.flashing { animation: card-flash 1200ms ease-out; }
  /* ═══════════════════════════════════════════════════════════════════
   * LIFECYCLE ANIMATIONS — DO NOT BREAK
   * These rules + the JS counterparts (simulateUserDragMove,
   * flipPlayCards, captureCardRects) define the canonical Claude-task
   * lifecycle: create → move-to-ip → move-to-done.
   * Verify the contract any time with:    runLifecycle()   in the console
   * Or run end-to-end with:                card.py sim     in the project
   * ═══════════════════════════════════════════════════════════════════ */
  /* v4: card pop-in — used when serve.py broadcasts a card-added SSE event.
     Overshoot easing gives the "pop" feel. */
  @keyframes card-pop-in {
    0%   { opacity: 0; transform: translateY(-12px) scale(0.92); box-shadow: 0 8px 24px rgba(217,119,87,.32); }
    60%  { opacity: 1; transform: translateY(0)    scale(1.04); }
    100% { opacity: 1; transform: translateY(0)    scale(1);    box-shadow: var(--shadow); }
  }
  .card.popping-in { animation: card-pop-in 640ms cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  /* v4: card pulse on update (subtask checked, priority changed, etc) */
  @keyframes card-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.02); }
  }
  .card.pulsing { animation: card-pulse 200ms ease-out; }
  /* v4: card removal — reverse pop, collapses height for smooth re-flow */
  @keyframes card-shrink-out {
    0%   { opacity: 1; transform: scale(1) translateY(0); max-height: 200px; }
    100% { opacity: 0; transform: scale(0.88) translateY(-8px); max-height: 0;
           padding-top: 0; padding-bottom: 0; margin-bottom: 0; border-width: 0; }
  }
  .card.removing { animation: card-shrink-out 240ms ease-in both; pointer-events: none; overflow: hidden; }
  /* v4: column slide-in from the right when a new column is added.
     Slower + non-overshoot so it feels "established" vs cards which "pop". */
  @keyframes column-slide-in {
    0%   { opacity: 0; transform: translateX(48px); max-width: 0; padding-left: 0; padding-right: 0; }
    100% { opacity: 1; transform: translateX(0);    max-width: 320px; padding-left: 8px; padding-right: 8px; }
  }
  .column.sliding-in { animation: column-slide-in 400ms cubic-bezier(0.16, 1, 0.3, 1) both; overflow: hidden; }
  /* v4: accessibility — honor reduced-motion preference */
  @media (prefers-reduced-motion: reduce) {
    .card.popping-in, .card.removing, .card.pulsing, .column.sliding-in,
    .card.flashing,
    .card.active-work { animation: none !important; }
  }
  /* v2: live "↻ updated 12s ago" indicator in the header. Tick every 1s. */
  header .last-update {
    font-size: 11px; color: var(--muted);
    margin-left: 8px; font-variant-numeric: tabular-nums;
  }
  /* Header pill (Tags button) — sits beside the view toggle */
  header .header-pill {
    font-size: 12px; padding: 5px 11px; border-radius: 999px;
    background: var(--card-bg); color: var(--ink);
    border: 1px solid var(--card-border);
    cursor: pointer; font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all .12s;
  }
  header .header-pill:hover { background: rgba(217,119,87,.10); border-color: var(--accent); }
  header .header-pill.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  header .header-pill #tags-count {
    font-variant-numeric: tabular-nums;
    font-size: 11px; color: var(--muted); font-weight: 600;
  }
  header .header-pill.active #tags-count { color: rgba(255,255,255,.65); }

  /* Tag legend popover — anchored under the Tags button */
  .tag-legend {
    position: absolute; top: 52px; right: 14px;
    z-index: 200;
    width: min(360px, calc(100vw - 28px));
    max-height: min(70vh, 480px); overflow-y: auto;
    background: var(--card-bg); color: var(--ink);
    border: 1px solid var(--card-border); border-radius: 10px;
    box-shadow: 0 12px 32px rgba(44,38,32,.18), 0 2px 6px rgba(44,38,32,.06);
    padding: 12px 14px;
    animation: tag-legend-pop 180ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes tag-legend-pop {
    from { opacity: 0; transform: translateY(-6px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .tag-legend-head {
    display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--card-border);
  }
  .tag-legend-head strong { font-size: 13px; }
  .tag-legend-head .small { font-size: 10px; }
  .tag-legend-head .muted { color: var(--muted); }
  .tag-clear {
    margin-left: auto;
    font-size: 10px; padding: 3px 8px;
    background: rgba(222,53,11,.08); color: var(--red);
    border: 1px solid rgba(222,53,11,.20); border-radius: 999px;
    cursor: pointer; font-weight: 600;
  }
  .tag-clear:hover { background: rgba(222,53,11,.18); }
  /* 3-section legend: Main / Sub / Custom — with cap meters */
  .tag-legend-section { margin-bottom: 12px; }
  .tag-legend-section:last-child { margin-bottom: 0; }
  .tag-legend-section-head {
    display: flex; align-items: baseline; gap: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 6px;
  }
  .tag-legend-section-head .cap {
    margin-left: auto;
    font-size: 10px; font-weight: 600; color: var(--muted);
    font-variant-numeric: tabular-nums;
    text-transform: none; letter-spacing: 0;
  }
  .tag-legend-section-head .cap.near { color: var(--amber); }
  .tag-legend-section-head .cap.over { color: var(--red); }
  .tag-legend-section-head .hint {
    font-size: 10px; font-weight: 500; color: var(--muted);
    text-transform: none; letter-spacing: 0; font-style: italic;
  }
  .tag-legend-list {
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .tag-legend-list .tag-legend-chip {
    --tag-c: #8b8680;
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; padding: 3px 9px 3px 8px; border-radius: 999px;
    background: color-mix(in srgb, var(--tag-c) 12%, var(--card-bg));
    color: color-mix(in srgb, var(--tag-c) 80%, #1d1916);
    border: 1px solid color-mix(in srgb, var(--tag-c) 30%, transparent);
    cursor: pointer; transition: all .12s;
  }
  .tag-legend-list .tag-legend-chip::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: var(--tag-c);
    flex-shrink: 0;
  }
  .tag-legend-list .tag-legend-chip:hover {
    background: color-mix(in srgb, var(--tag-c) 22%, var(--card-bg));
    border-color: color-mix(in srgb, var(--tag-c) 60%, transparent);
  }
  .tag-legend-list .tag-legend-chip.active {
    background: var(--tag-c); color: #fff;
    border-color: var(--tag-c);
    padding-right: 6px;
  }
  .tag-legend-list .tag-legend-chip.active::before { background: rgba(255,255,255,.85); }
  /* Visible ✕ on active chips — discoverable "click to remove" affordance. */
  .tag-legend-list .tag-legend-chip.active::after {
    content: '✕';
    margin-left: 4px;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,.85);
    width: 14px; height: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(0,0,0,.18);
    transition: background .12s, color .12s;
  }
  .tag-legend-list .tag-legend-chip.active:hover::after {
    background: rgba(0,0,0,.32);
    color: #fff;
  }
  .tag-legend-list .tag-legend-chip .count {
    font-variant-numeric: tabular-nums;
    font-size: 10px;
    background: color-mix(in srgb, var(--tag-c) 8%, var(--bg));
    color: color-mix(in srgb, var(--tag-c) 70%, var(--ink));
    padding: 1px 6px; border-radius: 999px;
    min-width: 16px; text-align: center;
  }
  .tag-legend-list .tag-legend-chip.unused {
    opacity: .42; cursor: default;
    background: var(--card-bg);
  }
  .tag-legend-list .tag-legend-chip.unused:hover { background: var(--card-bg); }
  .tag-legend-list .tag-legend-chip.active .count {
    color: var(--tag-c); background: #fff;
  }
  .tag-legend-empty {
    font-size: 11px; color: var(--muted); font-style: italic;
    padding: 4px 2px;
  }
  /* When a filter is active, hide non-matching cards entirely so columns
     visibly compact — much more obvious than dimming. */
  .card.dim-by-filter { display: none !important; }
  /* Hint pill at top of each column showing "+ N hidden" when filter active */
  .col-filtered-note {
    font-size: 10px; padding: 4px 8px; margin: 0 8px 6px;
    border-radius: 4px;
    background: rgba(217,119,87,.10); color: var(--accent);
    border: 1px dashed rgba(217,119,87,.30);
    text-align: center; font-weight: 500;
  }
  header .last-update.stale { color: var(--amber); font-weight: 600; }
  @keyframes live-pulse {
    0%   { box-shadow: 0 0 0 0   rgba(90,159,122,.50); }
    70%  { box-shadow: 0 0 0 8px rgba(90,159,122,0);   }
    100% { box-shadow: 0 0 0 0   rgba(90,159,122,0);   }
  }

  #board {
    display: flex;
    gap: 8px;
    padding: 12px;
    overflow-x: auto;
    height: calc(100% - 48px);
    align-items: flex-start;
  }
  /* #117 — vertical stack wrapper. One wrapper per stack root; the root
     and all its stackUnder descendants live inside, stacked top→bottom. */
  .column-stack {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-self: flex-start;
    flex-shrink: 0;
    max-height: 100%;
  }
  /* Bottom-40% drop-hint: when dragging a column over the lower half of a
     target column, show a dashed bottom edge that says "drop to stack". */
  .column.col-drop-stack-target {
    box-shadow: inset 0 -4px 0 0 var(--accent), inset 0 0 0 2px var(--accent);
    background: #F1E9DF;
  }
  .column {
    background: var(--col-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    width: 300px;
    flex-shrink: 0;
    max-height: 100%;
    display: flex;
    flex-direction: column;
    padding: 8px;
  }
  /* Boho per-column hue tints (hue family at ~2% off-white). */
  .column[data-col="ideas"]      { background: var(--col-ideas); }
  .column[data-col="backlog"]    { background: var(--col-backlog); }
  .column[data-col="inprogress"] { background: var(--col-inprogress); }
  .column[data-col="blocked"]    { background: var(--col-blocked); }
  .column[data-col="done"]       { background: var(--col-done); }
  .column.dragover { background: #F1E9DF; box-shadow: inset 0 0 0 2px var(--accent); }
  /* #119 — while a card is mid-drag, dim its SOURCE column so it's obvious
     the card is "leaving" and the user's attention is drawn to the cursor. */
  .column.card-src-col { opacity: 0.55; transition: opacity 240ms ease; }

  /* Column drag-to-reorder + drag-to-trash (iPhone-rearrange feel).
     `col-dragging` = the column being dragged (ghosted out of place).
     `col-dragging-active` on body = a column is mid-drag (other columns
     wobble subtly to signal "you can drop me here"). */
  .column { transition: transform 320ms cubic-bezier(0.34, 1.4, 0.64, 1), opacity 200ms; }
  .column.col-dragging { opacity: 0.4; }
  body.col-dragging-active .column { cursor: grabbing; }
  body.col-dragging-active .column:not(.col-dragging) {
    animation: col-wiggle 0.6s ease-in-out infinite;
  }
  @keyframes col-wiggle {
    0%, 100% { transform: rotate(0deg); }
    25%      { transform: rotate(-0.45deg); }
    75%      { transform: rotate(0.45deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .column { transition: none; }
    body.col-dragging-active .column:not(.col-dragging) { animation: none; }
  }
  .column-header .grip {
    cursor: grab; color: var(--muted); font-size: 14px; line-height: 1;
    user-select: none; padding: 2px 4px; opacity: 0.5;
    transition: opacity .15s, color .15s;
  }
  .column-header:hover .grip { opacity: 1; color: var(--ink); }
  .column-header .grip:active { cursor: grabbing; }

  /* Trash drop-zone (appears only while dragging a column). Boho-themed:
     soft warm cream background, coral icon, gentle shadow, breathing glow. */
  #col-trash {
    position: fixed; bottom: 28px; right: 28px; z-index: 250;
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(145deg, #FDFAF5 0%, #F9F2E8 100%);
    color: var(--accent);
    display: none; align-items: center; justify-content: center;
    font-size: 30px; line-height: 1;
    box-shadow: 0 8px 24px rgba(217,119,87,0.18),
                0 2px 6px rgba(0,0,0,0.04),
                inset 0 1px 0 rgba(255,255,255,0.7);
    border: 1px solid rgba(217,119,87,0.18);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    transform: scale(0.6) translateY(20px); opacity: 0;
    transition: transform 320ms cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 220ms, background 200ms, box-shadow 200ms,
                color 150ms, border-color 200ms;
    pointer-events: none; cursor: pointer;
  }
  body.col-dragging-active #col-trash,
  body.card-dragging-active #col-trash {
    display: flex;
    transform: scale(1) translateY(0); opacity: 1; pointer-events: auto;
    animation: trash-breathe 2.4s ease-in-out infinite;
  }
  @keyframes trash-breathe {
    0%, 100% { box-shadow: 0 8px 24px rgba(217,119,87,0.18),
                           0 2px 6px rgba(0,0,0,0.04),
                           inset 0 1px 0 rgba(255,255,255,0.7); }
    50%      { box-shadow: 0 10px 32px rgba(217,119,87,0.32),
                           0 2px 6px rgba(0,0,0,0.04),
                           inset 0 1px 0 rgba(255,255,255,0.7); }
  }
  #col-trash.over {
    background: linear-gradient(145deg, #E08866 0%, #C96A4E 100%);
    color: #fff;
    transform: scale(1.18) translateY(-2px) rotate(-6deg);
    border-color: rgba(255,255,255,0.4);
    box-shadow: 0 14px 36px rgba(217,119,87,0.45),
                0 4px 10px rgba(0,0,0,0.08),
                inset 0 1px 0 rgba(255,255,255,0.35);
    animation: none;
  }
  @media (prefers-reduced-motion: reduce) {
    body.col-dragging-active #col-trash { animation: none; }
    #col-trash { transition: opacity 150ms; }
  }

  /* Mini-confirm dialog — boho card, blurred overlay. */
  #mini-confirm-overlay {
    position: fixed; inset: 0; z-index: 400;
    background: rgba(45,40,38,0.32);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
    animation: mc-fadein 160ms ease-out;
  }
  #mini-confirm-overlay.show { display: flex; }
  @keyframes mc-fadein { from { opacity: 0; } to { opacity: 1; } }
  .mini-confirm-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 20px 22px 16px;
    min-width: 260px; max-width: 380px;
    box-shadow: 0 24px 60px rgba(45,40,38,0.18),
                0 4px 14px rgba(0,0,0,0.05);
    animation: mc-popin 220ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes mc-popin {
    from { opacity: 0; transform: scale(0.86) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .mini-confirm-card .mc-msg {
    font-size: 15px; font-weight: 600; color: var(--ink);
    margin-bottom: 14px; text-align: center;
  }
  .mini-confirm-card .mc-sub {
    font-size: 12px; color: var(--muted);
    margin-top: -8px; margin-bottom: 14px; text-align: center;
  }
  .mini-confirm-card .mc-actions {
    display: flex; gap: 8px; justify-content: center;
  }
  .mini-confirm-card .mc-btn {
    border: 1px solid var(--card-border); background: var(--card-bg);
    color: var(--ink); padding: 7px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background .12s, border-color .12s, color .12s, transform .08s;
  }
  .mini-confirm-card .mc-btn:hover { background: rgba(9,30,66,.05); }
  .mini-confirm-card .mc-btn:active { transform: scale(0.97); }
  .mini-confirm-card .mc-btn.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .mini-confirm-card .mc-btn.primary:hover {
    background: #C96A4E; border-color: #C96A4E;
  }
  .mini-confirm-card .mc-btn.danger {
    background: #D97757; color: #fff; border-color: #D97757;
  }
  .mini-confirm-card .mc-btn.danger:hover {
    background: #C96A4E; border-color: #C96A4E;
  }
  .column-header {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 6px 8px;
    font-size: 14px; font-weight: 600; color: var(--col-header);
  }
  .column-header .name { flex: 1; outline: none; cursor: text; padding: 2px 4px; border-radius: 3px; }
  .column-header .name:focus { background: #fff; }
  .column-header .count {
    background: var(--neutral); color: var(--col-header);
    font-size: 11px; padding: 2px 6px; border-radius: 10px; font-weight: 600;
  }
  .column-body { overflow-y: auto; flex: 1; min-height: 30px; padding: 2px; }
  .add-card-btn {
    width: 100%; text-align: left; padding: 6px 8px; margin-top: 6px;
    background: transparent; border: 0; color: var(--muted); cursor: pointer;
    border-radius: 4px; font-size: 13px;
  }
  .add-card-btn:hover { background: rgba(9,30,66,.08); color: var(--ink); }

  /* ============= COMPACT CARD (home view) ============= */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 12px 10px 12px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    cursor: pointer;
    position: relative;
    transition: box-shadow .18s ease, transform .18s ease, border-color .18s ease;
  }
  .card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-1px);
    border-color: #c1c7d0;
  }
  .card:active { transform: translateY(0); }
  .card.dragging { opacity: .45; transform: rotate(1.5deg); }
  /* #119 — visible affordance that cards are draggable. */
  .card { cursor: grab; }
  .card:active { cursor: grabbing; }
  /* #164 v3 — coral halo on the ONE active-work card (= most-recently
     touched card currently in In Progress). Set/cleared by refreshActiveWork().
     When the card moves out, the class is dropped and the pulse vanishes;
     the next most-recent card in In Progress (if any) takes over. */
  .card.active-work {
    animation: card-inprogress-pulse 2400ms ease-in-out infinite;
  }
  @keyframes card-inprogress-pulse {
    0%, 100% { box-shadow: var(--shadow); }
    50%      { box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.32),
                           0 4px 18px rgba(217, 119, 87, 0.35); }
  }
  /* Don't pulse mid-drag — drag/in-flight classes own the visual. */
  .card.active-work.dragging,
  .card.active-work.in-flight { animation: none; }
  /* Boho: columns carry the hue tint; cards stay pure white for contrast. */

  /* Priority left-border */
  .card.prio-critical { border-left: 4px solid var(--red); padding-left: 9px; }
  .card.prio-mid      { border-left: 4px solid var(--amber); padding-left: 9px; }
  .card.prio-low      { border-left: 4px solid #b3b9c4; padding-left: 9px; }

  /* Compact card head: one tight row */
  .card-head {
    display: flex; align-items: center; gap: 5px; margin-bottom: 4px;
    font-size: 11px;
  }
  .prio-chip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; border-radius: 50%;
    font-size: 9px; font-weight: 700; color: #fff;
    cursor: pointer; user-select: none; flex-shrink: 0;
    background: #c1c7d0; border: 0; line-height: 1;
  }
  .prio-chip.critical { background: var(--red); }
  .prio-chip.mid      { background: var(--amber); }
  .prio-chip.low      { background: #6b778c; }
  .prio-chip:hover { transform: scale(1.15); }
  .prio-chip.unset::before { content: "·"; font-size: 14px; }
  .prio-chip.critical::before { content: "C"; }
  .prio-chip.mid::before { content: "M"; }
  .prio-chip.low::before { content: "L"; }

  .num-ref {
    font-size: 11px; color: var(--muted); font-weight: 700;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0; padding: 0 2px;
    cursor: pointer; user-select: none;
    border-radius: 3px;
  }
  .num-ref::before { content: "#"; opacity: .55; }
  .num-ref:hover { background: rgba(9,30,66,.08); }

  .badge {
    font-size: 9px; font-weight: 700; letter-spacing: .04em;
    padding: 1px 5px; border-radius: 3px;
    background: var(--accent); color: #fff;
    white-space: nowrap; flex-shrink: 0; line-height: 1.5;
  }
  .card[data-col="done"] .badge { background: var(--green); }
  .card[data-col="blocked"] .badge { background: var(--amber); }
  .card[data-col="ideas"] .badge { background: var(--purple); }

  .card-title {
    font-size: 13px; font-weight: 500; line-height: 1.35;
    word-wrap: break-word; color: var(--ink);
  }
  .card[data-col="done"] .card-title { text-decoration: line-through; opacity: .8; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  /* Tag chip — color comes from JS via --tag-c (per-tag from taxonomy or
     deterministic hash). Light tinted bg + dotted swatch keeps the surface
     calm; uniform shape across the board. */
  .card-tags .tag {
    font-size: 9px; padding: 1px 6px 1px 5px;
    border-radius: 8px; line-height: 1.4;
    background: color-mix(in srgb, var(--tag-c, #8b8680) 14%, transparent);
    color: color-mix(in srgb, var(--tag-c, #8b8680) 75%, #1d1916);
    border: 1px solid color-mix(in srgb, var(--tag-c, #8b8680) 32%, transparent);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .card-tags .tag::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: var(--tag-c, #8b8680);
    flex-shrink: 0;
  }

  .card-progress {
    display: flex; align-items: center; gap: 5px;
    margin-top: 5px; font-size: 10px; color: var(--muted);
  }
  .card-progress .bar { flex: 1; height: 3px; background: #dfe1e6; border-radius: 2px; overflow: hidden; }
  .card-progress .bar > div { height: 100%; background: var(--accent); }
  .card[data-col="done"] .card-progress .bar > div { background: var(--green); }

  .expand-hint {
    position: absolute; top: 6px; right: 6px;
    font-size: 9px; font-weight: 700; letter-spacing: .06em;
    color: var(--accent); opacity: 0;
    background: rgba(0,121,191,.10);
    padding: 2px 7px; border-radius: 10px;
    transition: opacity .15s ease, transform .15s ease;
    pointer-events: none;
    text-transform: uppercase;
    transform: translateY(-2px);
  }
  .card:hover .expand-hint { opacity: 1; transform: translateY(0); }

  /* ============= MODAL (expanded card detail) ============= */
  @keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modal-in {
    from { opacity: 0; transform: translateY(8px) scale(.985); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(9,30,66,.55);
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    display: none; align-items: flex-start; justify-content: center;
    z-index: 200; padding: 48px 20px 60px; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; animation: overlay-in .14s ease-out; }
  .modal {
    background: #fff; border-radius: 10px; padding: 28px 32px 22px;
    width: min(760px, 100%); box-shadow: 0 24px 48px rgba(0,0,0,.32), 0 2px 8px rgba(0,0,0,.12);
    position: relative; margin: auto;
    animation: modal-in .18s cubic-bezier(.2,.9,.3,1);
  }
  .modal-close {
    position: absolute; top: 10px; right: 10px;
    background: transparent; border: 0; font-size: 22px; cursor: pointer;
    color: var(--muted); padding: 4px 10px; border-radius: 4px;
    line-height: 1;
  }
  .modal-close:hover { background: rgba(9,30,66,.10); color: var(--ink); }

  .modal-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    padding-right: 36px; /* keep clear of close button */
  }
  .modal-head .badge { font-size: 10px; padding: 2px 6px; }
  .modal-head .badge[contenteditable="true"]:focus { background: #fff; color: var(--ink); border: 1px solid var(--accent); padding: 1px 5px; outline: none; }
  .modal-title {
    font-size: 22px; font-weight: 600; outline: none;
    padding: 6px 8px; border-radius: 6px; margin: 8px -8px 16px;
    word-wrap: break-word; line-height: 1.28;
    transition: background .12s;
  }
  .modal-title:hover { background: #f9fafb; }
  .modal-title:focus { background: #f4f5f7; box-shadow: inset 0 0 0 2px rgba(0,121,191,.25); }
  .modal-meta {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px;
    margin: 0 0 6px; font-size: 12px; color: var(--muted);
  }
  .modal-meta label { font-weight: 600; }
  .modal-meta select {
    font-size: 12px; padding: 4px 8px; border: 1px solid var(--card-border);
    background: #fff; border-radius: 4px; color: var(--ink);
    transition: border-color .12s;
  }
  .modal-meta select:hover { border-color: #b3b9c4; }
  .modal-meta select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,121,191,.2); }
  .modal-section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin-top: 20px; margin-bottom: 8px; font-weight: 700;
    padding-bottom: 6px; border-bottom: 1px solid #ebecf0;
    display: flex; align-items: center; gap: 4px;
  }

  /* Info icon — visual only; tooltip is JS-managed (body-level, escapes overflow:hidden) */
  .tip-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px;
    border-radius: 50%; background: rgba(9,30,66,.10); color: var(--muted);
    font-size: 10px; font-weight: 700; cursor: help;
    font-style: italic; line-height: 1;
    text-transform: none; letter-spacing: 0;
    transition: background .12s, color .12s, transform .12s;
    font-family: Georgia, serif;
    flex-shrink: 0;
  }
  .tip-icon:hover { background: var(--accent); color: #fff; transform: scale(1.15); }

  /* Body-level JS tooltip (escapes column overflow) */
  .qm-tooltip {
    position: fixed; z-index: 9999;
    background: var(--ink); color: #fff;
    padding: 10px 14px; border-radius: 6px;
    font-size: 11px; font-weight: 400; line-height: 1.5;
    max-width: 360px; white-space: pre-wrap;
    box-shadow: 0 6px 24px rgba(0,0,0,.32);
    pointer-events: none; opacity: 0;
    transition: opacity .12s ease;
    left: -9999px; top: 0;
  }
  .qm-tooltip.show { opacity: 1; }

  /* Relative time — inline in head row, right-aligned to save height */
  .card-time {
    margin-left: auto;
    font-size: 10px; color: var(--muted);
    font-variant-numeric: tabular-nums;
    cursor: help; flex-shrink: 0; white-space: nowrap;
    padding-left: 4px;
  }

  /* Linked-card chips inside the modal */
  .links-edit { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .link-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px 3px 8px; border-radius: 10px;
    background: rgba(0,121,191,.10); color: var(--accent);
    font-size: 11px; font-weight: 600;
    cursor: pointer; user-select: none;
    border: 1px solid rgba(0,121,191,.20);
    transition: background .12s;
  }
  .link-chip:hover { background: rgba(0,121,191,.20); }
  .link-chip .link-title { color: var(--muted); font-weight: 400; }
  .link-chip.link-done { background: rgba(54,179,126,.10); color: var(--green); border-color: rgba(54,179,126,.25); }
  .link-chip.link-done .link-title { text-decoration: line-through; }
  .link-chip.link-prio-critical { box-shadow: inset 3px 0 0 0 var(--red); padding-left: 9px; }
  .link-chip.link-prio-mid      { box-shadow: inset 3px 0 0 0 var(--amber); padding-left: 9px; }
  .link-chip.link-prio-low      { box-shadow: inset 3px 0 0 0 #b3b9c4; padding-left: 9px; }
  .link-chip .link-remove {
    margin-left: 2px; opacity: 0; transition: opacity .12s;
    font-size: 13px; line-height: 1; padding: 0 2px; cursor: pointer;
    color: var(--muted);
  }
  .link-chip:hover .link-remove { opacity: 1; }
  .link-chip .link-remove:hover { color: var(--red); }
  .link-chip.orphan { background: #f0f0f3; color: var(--muted); border-color: var(--card-border); font-weight: 400; }

  /* Day-header rows in the Done column (group by doneAt date) */
  .day-header {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .08em; color: var(--col-header);
    padding: 8px 6px 4px; margin-top: 4px;
    border-top: 1px solid rgba(94,108,132,.18);
    display: flex; align-items: center; justify-content: space-between;
  }
  .day-header:first-child { border-top: 0; margin-top: 0; padding-top: 2px; }
  .day-header .day-count {
    background: #dfe1e6; color: var(--col-header);
    font-size: 9px; padding: 1px 6px; border-radius: 8px;
    font-weight: 600; letter-spacing: 0;
  }

  /* ============= VIEW TOGGLE + CALENDAR ============= */
  .view-toggle {
    display: inline-flex; background: rgba(217,119,87,.06);
    border: 1px solid var(--card-border);
    border-radius: 6px; padding: 2px; margin-right: 8px;
  }
  .view-toggle button {
    background: transparent; border: 0; padding: 4px 12px;
    color: var(--muted); font-size: 12px; font-weight: 600;
    cursor: pointer; border-radius: 4px;
    transition: background .12s, color .12s;
  }
  .view-toggle button.active {
    background: var(--card-bg); color: var(--ink);
    box-shadow: 0 1px 2px rgba(44,38,32,.08);
  }

  /* ===== Calendar v2 — calmer, more breathing room, summary + filter ===== */
  #calendar {
    display: none;
    height: calc(100% - 48px);
    padding: 20px 28px 24px;
    background: var(--bg);
    color: var(--ink);
    flex-direction: column;
    overflow: hidden;
    gap: 14px;
  }
  /* Top strip: month nav + month-at-a-glance counters */
  .cal-topbar {
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .cal-topbar h2 {
    margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -.01em;
    min-width: 220px;
  }
  .cal-nav { display: flex; gap: 4px; }
  .cal-nav button {
    background: transparent; color: var(--muted);
    border: 1px solid transparent;
    width: 30px; height: 30px; border-radius: 6px;
    cursor: pointer; font-size: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all .12s;
  }
  .cal-nav button:hover { background: var(--card-bg); border-color: var(--card-border); color: var(--ink); }
  .cal-nav .cal-today-btn {
    width: auto; padding: 0 12px; font-size: 12px; font-weight: 500;
    color: var(--ink); border: 1px solid var(--card-border); background: var(--card-bg);
  }
  .cal-summary {
    display: flex; gap: 6px; margin-left: auto;
    font-size: 12px; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .cal-summary .stat {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px; border-radius: 999px;
    background: transparent;
    border: 1px solid transparent;
    cursor: pointer; transition: all .12s;
  }
  .cal-summary .stat:hover {
    background: var(--card-bg);
    border-color: var(--card-border);
  }
  .cal-summary .stat.active {
    background: var(--card-bg);
    border-color: var(--ink);
    color: var(--ink);
  }
  .cal-summary .stat-num { font-size: 14px; font-weight: 700; color: var(--ink); }
  .cal-summary .stat.shipped .stat-num { color: var(--green); }
  .cal-summary .stat.created .stat-num { color: var(--accent); }
  .cal-summary .stat.open .stat-num    { color: var(--amber); }

  /* Filter chip row: empty by default, click to filter */
  .cal-filters {
    display: flex; gap: 6px; align-items: center;
    flex-shrink: 0; flex-wrap: wrap;
  }
  .cal-filter-chip {
    font-size: 11px; padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--card-border); background: var(--card-bg);
    cursor: pointer; color: var(--muted); font-weight: 500;
    transition: all .12s;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .cal-filter-chip:hover { color: var(--ink); border-color: var(--muted); }
  .cal-filter-chip.active {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  .cal-filter-chip .swatch {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 2px;
  }
  .cal-filter-chip[data-f="done"] .swatch     { background: var(--green); }
  .cal-filter-chip[data-f="open"] .swatch     { background: var(--amber); }
  .cal-filter-chip[data-f="critical"] .swatch { background: var(--red); }
  .cal-filter-chip[data-f="mid"] .swatch      { background: var(--amber); }
  .cal-filter-chip[data-f="low"] .swatch      { background: #b3b9c4; }

  /* Grid itself — flat, lighter borders, more vertical room */
  .cal-grid {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    flex: 1;
    display: grid; grid-template-rows: auto 1fr;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(44,38,32,.04);
  }
  .cal-dow {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--card-border);
  }
  .cal-dow .dow {
    padding: 10px 12px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
    text-align: left;
  }
  /* Weekend tint to add subtle structure */
  .cal-dow .dow.weekend { color: #b3b9c4; }
  .cal-weeks {
    display: grid; grid-auto-rows: 1fr;
    overflow-y: auto;
  }
  .cal-week {
    display: grid; grid-template-columns: repeat(7, 1fr);
    position: relative;
    border-bottom: 1px solid var(--card-border);
    min-height: 96px;
  }
  .cal-week:last-child { border-bottom: 0; }
  .cal-day {
    border-right: 1px solid var(--card-border);
    padding: 8px 8px 6px;
    position: relative; min-width: 0;
    transition: background .15s;
    cursor: default;
  }
  .cal-day:hover { background: rgba(217,119,87,.04); }
  .cal-day.muted { background: rgba(0,0,0,.015); }
  .cal-day.muted:hover { background: rgba(0,0,0,.025); }
  .cal-day:last-child { border-right: 0; }
  .cal-day.today { background: rgba(217,119,87,.06); }
  .cal-day.today:hover { background: rgba(217,119,87,.10); }
  .cal-day.today .cal-daynum {
    background: var(--accent); color: #fff;
    border-radius: 50%; width: 24px; height: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .cal-daynum {
    font-size: 12px; color: var(--ink); font-weight: 600;
    margin-bottom: 4px;
    display: inline-flex; align-items: center;
    width: 24px; height: 24px;
  }
  .cal-day.muted .cal-daynum { color: #cfd2d6; font-weight: 400; }

  /* Compact dots when there are >3 cards — reduces "stuffed" feel */
  .cal-events {
    display: flex; flex-direction: column; gap: 3px;
    margin-top: 2px;
  }
  .cal-event-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 7px 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    background: rgba(0,121,191,.06);
    color: var(--ink);
    border-left: 3px solid var(--accent);
    overflow: hidden;
    transition: all .12s;
    line-height: 1.3;
  }
  .cal-event-chip:hover {
    background: rgba(0,121,191,.14);
    transform: translateX(1px);
  }
  .cal-event-chip.done {
    background: rgba(90,159,122,.10);
    border-left-color: var(--green);
  }
  .cal-event-chip.done .event-text { opacity: .82; text-decoration: none; }
  .cal-event-chip.prio-critical { border-left-color: var(--red);   background: rgba(222,53,11,.06); }
  .cal-event-chip.prio-mid      { border-left-color: var(--amber); background: rgba(255,153,31,.07); }
  .cal-event-chip.prio-low      { border-left-color: #b3b9c4;      background: rgba(101,108,124,.06); }
  /* Dimmed when tag filter active and chip doesn't match */
  .cal-event-chip.dim { opacity: .22; }
  .event-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }
  .cal-event-chip.done .event-dot { background: var(--green); }
  .cal-event-chip.prio-critical .event-dot { background: var(--red); }
  .cal-event-chip.prio-mid      .event-dot { background: var(--amber); }
  .cal-event-chip.prio-low      .event-dot { background: #6b778c; }
  .event-text {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-weight: 500;
  }
  .event-text .ev-num {
    color: var(--muted); font-weight: 700; margin-right: 4px;
    font-variant-numeric: tabular-nums;
  }
  .cal-event-chip.done .ev-num { color: var(--green); }
  .cal-more {
    font-size: 9px; color: var(--muted);
    padding: 1px 6px; font-weight: 600;
  }

  textarea.origin-modal {
    width: 100%; resize: vertical; min-height: 64px;
    border: 1px solid var(--card-border);
    background: rgba(135,119,217,.06);
    color: var(--ink);
    border-radius: 4px; padding: 8px 10px; font-family: inherit; font-size: 13px;
    outline: none; line-height: 1.5;
  }
  textarea.origin-modal:focus { border-color: var(--purple); background: #fff; }
  textarea.origin-modal::placeholder { color: var(--muted); font-style: italic; }

  /* Tags editor in modal */
  .tags-edit { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tags-edit .tag {
    font-size: 11px; padding: 3px 8px; cursor: pointer; user-select: none;
  }
  .tags-edit .tag:hover { opacity: .75; }
  .tag-input {
    font-size: 11px; padding: 3px 8px; border: 1px dashed var(--card-border);
    background: transparent; border-radius: 10px; outline: none; width: 110px;
    color: var(--ink);
  }
  .tag-input:focus { border-style: solid; border-color: var(--accent); }

  /* Subtask tree in modal */
  .subtasks { margin: 4px 0; }
  .subtask { display: block; padding: 0; font-size: 13px; }
  .subtask > .row { display: flex; align-items: flex-start; gap: 5px; padding: 1px 0; }
  .subtask .toggle {
    width: 14px; flex-shrink: 0; cursor: pointer; color: var(--muted);
    background: transparent; border: 0; padding: 0; line-height: 1; font-size: 10px; text-align: center;
  }
  .subtask.has-children > .row > .toggle::before { content: "▾"; }
  .subtask.has-children.collapsed > .row > .toggle::before { content: "▸"; }
  .subtask:not(.has-children) > .row > .toggle::before { content: ""; }
  .subtask input[type="checkbox"] { margin: 3px 0 0; flex-shrink: 0; cursor: pointer; }
  .subtask .num {
    font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums;
    flex-shrink: 0; padding-top: 2px; min-width: 22px;
  }
  .subtask .text {
    flex: 1; outline: none; padding: 1px 3px; border-radius: 3px;
    word-wrap: break-word; min-width: 0;
  }
  .subtask .text:focus { background: #f4f5f7; }
  .subtask.done > .row > .text { text-decoration: line-through; color: var(--muted); }
  .subtask .st-actions { display: flex; gap: 0; opacity: 0; transition: opacity .15s; flex-shrink: 0; }
  .subtask:hover > .row > .st-actions { opacity: 1; }
  .subtask .children { margin-left: 18px; }
  .subtask.collapsed > .children { display: none; }
  .add-subtask {
    background: transparent; border: 0; color: var(--muted); cursor: pointer;
    font-size: 12px; padding: 3px 0; margin-left: 18px;
  }
  .add-subtask:hover { color: var(--ink); }
  .icon-btn {
    background: transparent; border: 0; cursor: pointer; padding: 2px 4px;
    border-radius: 3px; color: var(--muted); font-size: 14px; line-height: 1;
  }
  .icon-btn:hover { background: rgba(9,30,66,.10); color: var(--ink); }
  .del-btn:hover { color: var(--red); }

  /* Textareas */
  textarea.notes-modal, textarea.writeup-modal {
    width: 100%; resize: vertical; min-height: 80px;
    border: 1px solid var(--card-border); background: #fff; color: var(--ink);
    border-radius: 4px; padding: 8px 10px; font-family: inherit; font-size: 13px;
    outline: none; line-height: 1.45;
  }
  textarea.notes-modal:focus, textarea.writeup-modal:focus { border-color: var(--accent); }
  textarea.writeup-modal { background: rgba(54,179,126,.06); }
  .writeup-missing-flag { font-size: 11px; color: var(--red); margin-top: 4px; }

  .modal-foot {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 18px; padding-top: 12px; border-top: 1px solid var(--card-border);
    font-size: 11px; color: var(--muted);
  }
  .modal-delete {
    background: transparent; border: 1px solid var(--card-border); color: var(--red);
    padding: 5px 12px; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: 600;
  }
  .modal-delete:hover { background: var(--red); color: #fff; border-color: var(--red); }

  .toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 8px 16px; border-radius: 6px;
    font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,.3);
    opacity: 0; transition: opacity .2s;
    pointer-events: none; z-index: 300;
  }
  .toast.show { opacity: 1; }

  /* Setup screen */
  .setup {
    position: absolute; inset: 48px 0 0 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink); flex-direction: column; gap: 16px; padding: 0 20px;
  }
  .setup h2 { margin: 0; font-weight: 500; }
  .setup p { max-width: 480px; text-align: center; color: var(--muted); }
  .setup button {
    background: var(--accent); color: #fff; border: 0; padding: 10px 20px;
    border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600;
  }
  .setup .err { color: var(--red); font-size: 12px; min-height: 1em; }
  .setup .small { font-size: 12px; color: var(--muted); }
  .setup code { background: var(--neutral); color: var(--ink); padding: 1px 6px; border-radius: 3px; }

  .col-add-btn {
    background: var(--card-bg); color: var(--ink);
    border: 1px dashed var(--card-border);
    padding: 8px 12px; border-radius: 8px; cursor: pointer;
    height: 36px; flex-shrink: 0; align-self: flex-start; font-size: 13px;
    white-space: nowrap;
  }
  .col-add-btn:hover { background: rgba(217,119,87,.06); border-style: solid; border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <span class="title-wrap">
    <h1 id="board-title" title="Click to go to Board · double-click to rename">Work Board</h1>
    <span class="status" id="status" title="Connection status"><span class="dot"></span></span>
  </span>
  <span class="sp"></span>
  <button id="tags-btn" class="header-pill" style="display:none" title="Show all tags used on this board">🏷 Tags <span id="tags-count">0</span></button>
  <span class="view-toggle" id="view-toggle" style="display:none">
    <button data-view="board" class="active">Board</button>
    <button data-view="calendar">Calendar</button>
  </span>
  <button id="reset-cols-btn" class="header-pill" style="display:none" title="Restore default column order: Task → Backlog → In Progress → Done → Notes, then others by recency">↺ Reset columns</button>
</header>

<!-- Tag legend popover (anchored under #tags-btn) -->
<div id="tag-legend" class="tag-legend" style="display:none">
  <div class="tag-legend-head">
    <strong>Tags</strong>
    <span class="muted small" id="tag-profile-label">software</span>
    <button id="tag-clear" class="tag-clear" style="display:none">Clear filter ✕</button>
  </div>
  <div id="tag-legend-body"></div>
</div>

<div id="board" style="display:none"></div>
<div id="calendar"></div>

<div class="modal-overlay" id="modal-overlay"></div>

<div id="setup" class="setup">
  <h2>Connecting to board server…</h2>
  <p class="small">Fetching <code>board.json</code> from <code id="setup-url"></code>. If this hangs, make sure <code>board-steward serve</code> is running.</p>
  <div class="err" id="setup-err"></div>
</div>

<div class="toast" id="toast"></div>
<div id="col-trash" title="Drop column here to delete">🗑</div>
<div id="mini-confirm-overlay">
  <div class="mini-confirm-card">
    <div class="mc-msg">Confirm?</div>
    <div class="mc-sub" id="mc-sub" style="display:none"></div>
    <div class="mc-actions">
      <button class="mc-btn" id="mc-cancel">Cancel</button>
      <button class="mc-btn danger" id="mc-ok">Delete</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ===== State =====
// v3: board.json is read/written via HTTP fetch to the local board-steward server
// (same origin). No File System Access API, no IndexedDB. Works in any browser.
const BOARD_URL = '/board.json';
let state = null;
let lastRev = 0;
let saveTimer = null;
let suppressPollUntil = 0;
let pollTimer = null;
let pendingDirty = false;
let _openCardId = null;        // currently-open modal card
// v2: track per-card {updatedAt|column} between polls so we can flash changed cards.
let _prevSnapshot = new Map(); // id → "updatedAt|column" from previous render
let _flashIds = new Set();     // ids to flash on the upcoming render
let _colDragRects = null;      // id → DOMRect at dragstart (for FLIP)
// #119 — live iPhone-style card reflow during drag.
// dragstart records source; column-body dragover computes insertion slot
// (top half of a card = insert before, bottom half = insert after) and
// DOM-moves the dragged element with FLIP animation for displaced siblings.
// drop commits to state.cards; dragend without drop re-renders to revert.
let _cardDrag = null;          // { cardId, srcCol, srcEl, hoverCol, hoverBeforeCardId }
let _cardDragRects = null;     // cardId → DOMRect at last reflow (for FLIP)
// #119 — column live-reflow during drag (iPhone home-screen feel).
// Snapshot of state.columns taken at dragstart so cancel (dragend w/o drop)
// can revert all the live-preview reorders. _colDragSrcId carries the source
// id because dragover events can't read dataTransfer.getData (security).
let _colDragSrcId = null;
let _colDragSnapshot = null;
let _colDragCommitted = false;
let _colLastPreviewTargetId = null;  // #119 — idempotence guard for dragover thrash

// #119 — visible drag HUD. Prints every drag/mouse event as a green-on-black
// overlay so events are visible regardless of console filters. Header bar
// is a drag handle (mousedown to move); position persists to localStorage.
const _HUD_POS_KEY = 'workboard.hudPos';
function _dbgHud() {
  let hud = document.getElementById('drag-hud');
  if (hud) return hud;
  hud = document.createElement('div');
  hud.id = 'drag-hud';
  hud.style.cssText = 'position:fixed;width:360px;max-height:280px;overflow:auto;background:rgba(0,0,0,0.88);color:#0f0;font:11px/1.35 monospace;padding:0;z-index:99999;border-radius:6px;border:1px solid #0f0;box-shadow:0 2px 12px rgba(0,0,0,0.4);user-select:none;';
  // Restore saved position; default to top:64 right:12.
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(_HUD_POS_KEY) || 'null'); } catch (e) {}
  if (saved && Number.isFinite(saved.left) && Number.isFinite(saved.top)) {
    hud.style.left = saved.left + 'px';
    hud.style.top = saved.top + 'px';
  } else {
    hud.style.top = '64px';
    hud.style.right = '12px';
  }
  const head = document.createElement('div');
  head.id = 'drag-hud-head';
  head.style.cssText = 'color:#ff0;border-bottom:1px solid #0f0;padding:4px 10px;margin:0;cursor:grab;background:rgba(255,255,0,0.08);';
  head.textContent = '#119 DRAG HUD — drag header to move';
  hud.appendChild(head);
  const body = document.createElement('div');
  body.id = 'drag-hud-body';
  body.style.cssText = 'padding:6px 10px 8px;';
  hud.appendChild(body);
  document.body.appendChild(hud);
  // Drag-to-move on the yellow header.
  let dragState = null;
  head.addEventListener('mousedown', e => {
    e.preventDefault();
    const r = hud.getBoundingClientRect();
    dragState = { dx: e.clientX - r.left, dy: e.clientY - r.top };
    head.style.cursor = 'grabbing';
    // Switching from right-anchored to left-anchored so move math is one-axis.
    hud.style.left = r.left + 'px';
    hud.style.top = r.top + 'px';
    hud.style.right = '';
  });
  document.addEventListener('mousemove', e => {
    if (!dragState) return;
    const nx = Math.max(0, Math.min(window.innerWidth - 60, e.clientX - dragState.dx));
    const ny = Math.max(0, Math.min(window.innerHeight - 24, e.clientY - dragState.dy));
    hud.style.left = nx + 'px';
    hud.style.top = ny + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragState) return;
    dragState = null;
    head.style.cursor = 'grab';
    try {
      localStorage.setItem(_HUD_POS_KEY, JSON.stringify({
        left: parseFloat(hud.style.left) || 0,
        top: parseFloat(hud.style.top) || 0,
      }));
    } catch (e) {}
  });
  return hud;
}
function dbg(msg) {
  try {
    _dbgHud();
    const body = document.getElementById('drag-hud-body');
    if (body) {
      const line = document.createElement('div');
      line.textContent = new Date().toTimeString().slice(0,8) + '  ' + msg;
      body.insertBefore(line, body.firstChild);
      while (body.childNodes.length > 14) body.removeChild(body.lastChild);
    }
  } catch (e) {}
  console.log('[#119]', msg);
}
document.addEventListener('DOMContentLoaded', () => {
  _dbgHud();
  dbg('HUD ready — drag a column (grip) or a card');
  document.addEventListener('dragstart', e => {
    const t = e.target;
    dbg('DOC dragstart on <' + (t && t.tagName) + '>.' + (t && t.className && t.className.toString().slice(0,30)) + ' draggable=' + (t && t.draggable));
  }, true);
  document.addEventListener('mousedown', e => {
    const t = e.target;
    const cardAnc = t.closest && t.closest('.card');
    const colAnc  = t.closest && t.closest('.column');
    dbg('mdown <' + t.tagName + '>.' + String(t.className || '').slice(0,24)
        + (cardAnc ? ' [in .card draggable=' + cardAnc.draggable + ']'
                   : colAnc ? ' [in .column NO CARD]'
                            : ' [outside]'));
  }, true);
});

// ===== Column stacking schema (#117 — schema only; no render impact yet) =====
// A column may sit BELOW another column in a vertical stack via the
// `stackUnder` field. null/missing = top-level column with its own slot in
// the horizontal flex layout. Non-null = sits directly under its parent.
//
// Render (added in #117 part 2) walks state.columns in array order, groups by
// stack root, and lays out each root → its descendants as one vertical stack
// container. Until then, all columns stay flat regardless of stackUnder value
// — these helpers are dormant.
//
// Invariants enforced on load (_absorbState): every column has stackUnder;
// dangling parent refs (parent deleted) are reset to null; cycles get broken
// at the first repeat (the offender becomes a root).
function getStackRoots() {
  return (state && state.columns || []).filter(c => !c.stackUnder);
}
function getStackChildren(parentId) {
  return (state && state.columns || []).filter(c => c.stackUnder === parentId);
}
// Walk a stack chain from a root, depth-first by state.columns array order.
// Returns [root, child, grandchild, ...]. Depth-capped at 32 as a cycle/abuse
// guard — real boards will never approach this.
function walkStack(rootId) {
  if (!state) return [];
  const byId = new Map(state.columns.map(c => [c.id, c]));
  const root = byId.get(rootId);
  if (!root) return [];
  const out = [];
  const seen = new Set();
  function visit(id, depth) {
    if (depth > 32 || seen.has(id)) return;
    seen.add(id);
    const col = byId.get(id);
    if (!col) return;
    out.push(col);
    getStackChildren(id).forEach(child => visit(child.id, depth + 1));
  }
  visit(rootId, 0);
  return out;
}
// Columns in render order: roots in state.columns order, each root immediately
// followed by its descendants. Used by the upcoming render pass.
function stackOrderedColumns() {
  const roots = getStackRoots();
  const out = [];
  roots.forEach(r => walkStack(r.id).forEach(c => out.push(c)));
  // Safety: append any column the walk missed (cycle survivor / orphan).
  if (out.length < (state.columns || []).length) {
    const seen = new Set(out.map(c => c.id));
    state.columns.forEach(c => { if (!seen.has(c.id)) out.push(c); });
  }
  return out;
}
// Normalise stackUnder fields on incoming state: every column gets the field
// (default null); dangling refs reset to null. Idempotent.
function migrateStackUnder(s) {
  if (!s || !Array.isArray(s.columns)) return;
  const ids = new Set(s.columns.map(c => c.id));
  s.columns.forEach(c => {
    if (!('stackUnder' in c)) c.stackUnder = null;
    if (c.stackUnder && !ids.has(c.stackUnder)) c.stackUnder = null;
    if (c.stackUnder === c.id) c.stackUnder = null;   // self-parent guard
  });
}

// Capture all column bounding rects (FLIP "first" step).
function captureColumnRects() {
  const map = new Map();
  document.querySelectorAll('#board .column').forEach(c => {
    map.set(c.dataset.col, c.getBoundingClientRect());
  });
  return map;
}

// FLIP "last/invert/play": after a re-render, animate each column from
// where it WAS (in oldRects) to where it IS (current rect).
function flipPlayColumns(oldRects) {
  if (!oldRects) return;
  document.querySelectorAll('#board .column').forEach(c => {
    const id = c.dataset.col;
    const oldR = oldRects.get(id);
    if (!oldR) return;
    const newR = c.getBoundingClientRect();
    const dx = oldR.left - newR.left;
    const dy = oldR.top  - newR.top;
    if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
    c.animate(
      [
        { transform: `translate(${dx}px, ${dy}px)` },
        { transform: 'translate(0, 0)' },
      ],
      // #119 — slowed 360 → 1080ms (1/3 speed) per user request for column reflow.
      { duration: 1080, easing: 'cubic-bezier(0.34, 1.4, 0.64, 1)' }
    );
  });
}

// #119 — card-level FLIP. Mirrors captureColumnRects/flipPlayColumns but
// keyed by data-card-id so cards animate between bbox positions when their
// slot changes during drag reflow.
function captureCardRects() {
  const map = new Map();
  document.querySelectorAll('.card[data-card-id]').forEach(c => {
    map.set(c.dataset.cardId, c.getBoundingClientRect());
  });
  return map;
}
function flipPlayCards(oldRects, opts) {
  if (!oldRects) return;
  const duration = (opts && opts.duration) || 1080;
  document.querySelectorAll('.card[data-card-id]').forEach(c => {
    const id = c.dataset.cardId;
    const oldR = oldRects.get(id);
    if (!oldR) return;
    const newR = c.getBoundingClientRect();
    const dx = oldR.left - newR.left;
    const dy = oldR.top  - newR.top;
    if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
    c.animate(
      [
        { transform: `translate(${dx}px, ${dy}px)` },
        { transform: 'translate(0, 0)' },
      ],
      { duration, easing: 'cubic-bezier(0.34, 1.4, 0.64, 1)' }
    );
  });
}

function reorderColumn(srcId, targetId) {
  if (!state) return;
  const cols = state.columns;
  const si = cols.findIndex(c => c.id === srcId);
  const ti = cols.findIndex(c => c.id === targetId);
  if (si < 0 || ti < 0 || si === ti) return;
  pushUndo();
  const old = _colDragRects;       // captured at dragstart
  const src = cols[si];
  // Reordering implies "back to top-level row" — if src was stacked, free it.
  if (src.stackUnder) src.stackUnder = null;
  const [moved] = cols.splice(si, 1);
  cols.splice(ti, 0, moved);
  scheduleSave();
  render();
  requestAnimationFrame(() => flipPlayColumns(old));
}

// #119 — live preview reorder during column drag. Mutates state.columns +
// renders + FLIPs without pushing undo (the whole drag is one undo unit,
// committed on drop or rolled back via the snapshot on dragend-w/o-drop).
// Clears src.stackUnder so dragging a stacked column across the row pops
// it out of its stack.
function previewReorderColumn(srcId, targetId) {
  // #119 correction — iPhone-style splice-insert reflow. Drag A onto C:
  // remove A from its slot, insert at C's slot; columns between A and C
  // shift one slot toward A's old slot to fill the gap. Path-independent:
  // computed relative to the dragstart snapshot so the result depends only
  // on the current hover target, not the intermediate hover history.
  if (!state || srcId === targetId || !_colDragSnapshot) return;
  // Idempotence: dragover fires ~every frame while cursor is over a column.
  // Bail if target hasn't changed — otherwise we re-render + FLIP every
  // frame, animations stack, and unrelated columns visibly vibrate.
  if (_colLastPreviewTargetId === targetId) return;
  const snap = _colDragSnapshot;
  const si = snap.findIndex(c => c.id === srcId);
  const ti = snap.findIndex(c => c.id === targetId);
  if (si < 0 || ti < 0 || si === ti) return;
  const old = captureColumnRects();
  const next = snap.map(c => ({ ...c }));
  const wasStacked = !!next[si].stackUnder;
  if (wasStacked) next[si].stackUnder = null;  // free from stack on horizontal drag
  const [moved] = next.splice(si, 1);
  // #130 — for root source, splice(ti) keeps iPhone semantic (target shifts
  // toward src's old slot). For stacked source, src had no row slot; the
  // removal didn't shift target visually, so we want moved to LAND at the
  // target's current slot and push the target away. Use target's post-removal
  // index in that case.
  let insertAt = ti;
  if (wasStacked) insertAt = next.findIndex(c => c.id === targetId);
  next.splice(insertAt, 0, moved);
  state.columns = next;
  _colLastPreviewTargetId = targetId;
  render();
  requestAnimationFrame(() => flipPlayColumns(old));
}

// #117 — stack `srcId` directly under `parentId`. Refuses to create a cycle
// (parent must not be a descendant of src) and refuses self-parent.
function stackColumnUnder(srcId, parentId) {
  if (!state || srcId === parentId) return;
  const cols = state.columns;
  const src = cols.find(c => c.id === srcId);
  const parent = cols.find(c => c.id === parentId);
  if (!src || !parent) return;
  // Cycle guard: walk parent's descendants; if src appears, refuse.
  const descendantOfSrc = walkStack(srcId).some(c => c.id === parentId);
  if (descendantOfSrc) { toast('Cycle blocked'); return; }
  if (src.stackUnder === parentId) return;  // no-op
  pushUndo();
  const old = _colDragRects;
  src.stackUnder = parentId;
  scheduleSave();
  render();
  requestAnimationFrame(() => flipPlayColumns(old));
}

// #119 — preview the dragged card's would-be slot in the hover column by
// physically moving the element + animating displaced siblings via FLIP.
// No state mutation; on commitCardDrag the state catches up to the DOM.
function reflowCardDragPreview() {
  if (!_cardDrag || !_cardDrag.srcEl) return;
  const targetCol = document.querySelector(
    `.column[data-col="${_cardDrag.hoverCol}"] .column-body`
  );
  if (!targetCol) return;
  // Skip if the element is already at the right slot (avoids re-FLIP spam
  // when the cursor moves within the same insertion zone).
  const cur = _cardDrag.srcEl.parentElement;
  const curNext = _cardDrag.srcEl.nextElementSibling;
  const wantNextId = _cardDrag.hoverBeforeCardId;
  const wantNextEl = wantNextId ? targetCol.querySelector(`[data-card-id="${wantNextId}"]`) : null;
  if (cur === targetCol && curNext === wantNextEl) return;
  // Finish any in-flight card FLIPs so the next captureCardRects measures
  // settled positions, not mid-animation transforms (was causing vibration
  // when dragover fired faster than animations completed).
  document.querySelectorAll('.card[data-card-id]').forEach(c => {
    c.getAnimations().forEach(a => a.finish());
  });
  const rects = captureCardRects();
  targetCol.insertBefore(_cardDrag.srcEl, wantNextEl);
  _cardDragRects = rects;
  // Short duration for live drag reflow — long durations stack up faster than
  // the user can wiggle the cursor. SSE moves still default to 1080ms.
  requestAnimationFrame(() => flipPlayCards(rects, { duration: 280 }));
}

// Commit the previewed position to state on drop. Computes insertion index
// in state.cards from hoverBeforeCardId so the priority sort (stable) keeps
// drag-order within a priority bucket.
function commitCardDrag() {
  if (!_cardDrag) return;
  const card = state.cards.find(c => c.id === _cardDrag.cardId);
  if (!card) { _cardDrag = null; return; }
  pushUndo();
  const srcIdx = state.cards.indexOf(card);
  state.cards.splice(srcIdx, 1);
  let insertIdx;
  if (_cardDrag.hoverBeforeCardId) {
    insertIdx = state.cards.findIndex(c => c.id === _cardDrag.hoverBeforeCardId);
    if (insertIdx < 0) insertIdx = state.cards.length;
  } else {
    // append-at-end of the hover column → place after the last card already
    // in that column to keep neighbors stable.
    let lastIdx = -1;
    state.cards.forEach((c, i) => { if (c.column === _cardDrag.hoverCol) lastIdx = i; });
    insertIdx = lastIdx + 1;
  }
  const targetCol = _cardDrag.hoverCol;
  card.column = targetCol;
  card.updatedAt = now();
  if (targetCol === 'done' && !card.doneAt) card.doneAt = card.updatedAt;
  if (targetCol !== 'done') card.doneAt = null;
  state.cards.splice(insertIdx, 0, card);
  // DOM is already correct (preview did the insertBefore). Don't render() —
  // it would rebuild the DOM from scratch and kill the in-flight FLIPs that
  // are still settling, making the card "snap" instead of glide. Just patch
  // the source card's data-col attr if the column changed + refresh counts.
  const srcEl = _cardDrag.srcEl;
  const srcCol = _cardDrag.srcCol;
  if (srcEl && srcEl.dataset.col !== targetCol) srcEl.dataset.col = targetCol;
  _cardDrag = null;
  scheduleSave();
  refreshColumnCount(targetCol);
  if (srcCol && srcCol !== targetCol) refreshColumnCount(srcCol);
}

function cancelCardDrag() {
  if (!_cardDrag) return;
  _cardDrag = null;
  _cardDragRects = null;
  render();   // canonical state wins → undoes any DOM-only preview moves
}

function deleteColumn(id) {
  if (!state) return;
  const col = state.columns.find(c => c.id === id);
  if (!col) return;
  pushUndo();
  // Reassign cards in this column → 'backlog' (don't orphan them in state).
  let moved = 0;
  state.cards.forEach(c => {
    if (c.column === id) { c.column = 'backlog'; c.updatedAt = now(); moved++; }
  });
  state.columns = state.columns.filter(c => c.id !== id);
  scheduleSave(); render();
  toast(moved > 0
    ? `Column "${col.name}" deleted · ${moved} card(s) → Backlog`
    : `Column "${col.name}" deleted`);
}

const $ = s => document.querySelector(s);
const now = () => new Date().toISOString();
const uid = (p='c') => p + '-' + Math.random().toString(36).slice(2,9);

function fmtTime(s) {
  if (!s) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d = new Date(s);
  if (isNaN(d)) return s;
  const yr = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${yr}-${mo}-${dy} ${hh}:${mm}`;
}

// Local-frame YYYY-MM-DD (NOT toISOString — that's UTC and breaks day comparison
// for non-UTC timezones, e.g. SGT at 11am local = previous day in UTC).
function localYmd(d) {
  if (!(d instanceof Date)) d = new Date(d);
  if (isNaN(d)) return '';
  const yr = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  return `${yr}-${mo}-${dy}`;
}

// Human-friendly relative time: "3d ago", "2h ago", "just now"
function relativeTime(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 45) return 'just now';
  if (diff < 3600)   return Math.floor(diff/60)    + 'm ago';
  if (diff < 86400)  return Math.floor(diff/3600)  + 'h ago';
  const days = Math.floor(diff/86400);
  if (days === 1) return 'yesterday';
  if (days < 30)  return days + 'd ago';
  if (days < 365) return Math.floor(days/30) + 'mo ago';
  return Math.floor(days/365) + 'y ago';
}

// ===== JS tooltip (body-level — escapes overflow:hidden ancestors) =====
let _tooltipEl = null;
function ensureTooltipEl() {
  if (_tooltipEl) return _tooltipEl;
  _tooltipEl = document.createElement('div');
  _tooltipEl.className = 'qm-tooltip';
  document.body.appendChild(_tooltipEl);
  return _tooltipEl;
}
function showTooltip(target, text) {
  if (!text) return;
  const tip = ensureTooltipEl();
  tip.textContent = text;
  tip.style.left = '-9999px';
  tip.style.top  = '0px';
  tip.classList.add('show');
  // Force layout then measure
  const r  = target.getBoundingClientRect();
  const tr = tip.getBoundingClientRect();
  const M = 8;
  // Prefer below the target; flip above if not enough room
  let top = r.bottom + M;
  if (top + tr.height > window.innerHeight - M) {
    top = Math.max(M, r.top - tr.height - M);
  }
  let left = r.left + r.width / 2 - tr.width / 2;
  left = Math.max(M, Math.min(left, window.innerWidth - tr.width - M));
  tip.style.left = left + 'px';
  tip.style.top  = top  + 'px';
}
function hideTooltip() {
  if (_tooltipEl) _tooltipEl.classList.remove('show');
}
// v2: diff state.cards vs previous snapshot. Mark ids whose updatedAt or column
// changed since the last call (or that are new) for a one-shot flash on render.
// First call (prev empty) seeds the snapshot without flashing anything.
function detectChangesAndSnapshot() {
  const flash = new Set();
  const next = new Map();
  const cards = (state && state.cards) || [];
  const seeding = _prevSnapshot.size === 0;
  for (const c of cards) {
    const k = (c.updatedAt || '') + '|' + (c.column || '');
    next.set(c.id, k);
    if (!seeding) {
      const prev = _prevSnapshot.get(c.id);
      if (prev === undefined || prev !== k) flash.add(c.id);
    }
  }
  _flashIds = flash;
  _prevSnapshot = next;
}

// v2: live header "↻ updated Xs ago" — ticks every 1s. Stale (>5min) → amber.
function tickLastUpdate() {
  const el = $('#last-update');
  if (!el) return;
  if (!state || !state.savedAt) { el.textContent = ''; return; }
  const ageSec = (Date.now() - new Date(state.savedAt).getTime()) / 1000;
  el.textContent = '↻ ' + relativeTime(state.savedAt);
  el.classList.toggle('stale', ageSec > 300);
}

// Refresh every visible card-time element from its card's createdAt — cheap.
// Doesn't touch any other DOM (preserves focus, modal state, scroll).
function tickTimes() {
  if (!state) return;
  document.querySelectorAll('.card-time').forEach(el => {
    const cardEl = el.closest('.card');
    if (!cardEl) return;
    const card = state.cards.find(c => c.id === cardEl.dataset.cardId);
    if (!card || !card.createdAt) return;
    const next = relativeTime(card.createdAt);
    if (el.textContent !== next) el.textContent = next;
  });
}

function initTooltipDelegation() {
  document.addEventListener('mouseover', e => {
    const t = e.target.closest && e.target.closest('[data-tip]');
    if (t) showTooltip(t, t.getAttribute('data-tip'));
  });
  document.addEventListener('mouseout', e => {
    const t = e.target.closest && e.target.closest('[data-tip]');
    if (t) hideTooltip();
  });
  // Hide on scroll/resize so it doesn't stick in the wrong place
  window.addEventListener('scroll', hideTooltip, true);
  window.addEventListener('resize', hideTooltip);
}

// ===== UI helpers =====
function setStatus(text, kind) {
  const el = $('#status');
  if (!el) return;
  // The text label was removed from the header (only the pulsing dot remains
  // beside the title). Keep state on the wrapper class for color cues.
  const tx = $('#status-text');
  if (tx) tx.textContent = text;
  el.title = text; // tooltip carries the human-readable state
  el.classList.remove('unsynced','error');
  if (kind === 'unsynced') el.classList.add('unsynced');
  if (kind === 'error') el.classList.add('error');
}
function toast(msg, ms=2200) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), ms);
}
// OS-aware undo hint. Mac uses ⌘; Linux/Windows use Ctrl. Detection prefers
// userAgentData (modern), falls back to navigator.platform (legacy reliable
// for Mac sniff). Computed once at script load — OS doesn't change at runtime.
const IS_MAC = (() => {
  const p = (navigator.userAgentData && navigator.userAgentData.platform) || navigator.platform || '';
  return /mac|iphone|ipad|ipod/i.test(p);
})();
function undoHint() { return IS_MAC ? '⌘+Z' : 'Ctrl+Z'; }

// Small async confirm dialog (boho-styled). Resolves true/false.
// opts: { sub?: string, okText?: string, okClass?: 'danger'|'primary' }
function miniConfirm(msg = 'Confirm?', opts = {}) {
  return new Promise(resolve => {
    const overlay = $('#mini-confirm-overlay');
    const msgEl   = overlay.querySelector('.mc-msg');
    const subEl   = $('#mc-sub');
    const okBtn   = $('#mc-ok');
    const cxBtn   = $('#mc-cancel');
    msgEl.textContent = msg;
    if (opts.sub) { subEl.textContent = opts.sub; subEl.style.display = ''; }
    else          { subEl.textContent = '';        subEl.style.display = 'none'; }
    okBtn.textContent = opts.okText || 'Delete';
    okBtn.className = 'mc-btn ' + (opts.okClass || 'danger');
    overlay.classList.add('show');

    const cleanup = () => {
      overlay.classList.remove('show');
      okBtn.onclick = cxBtn.onclick = null;
      overlay.onclick = null;
      document.removeEventListener('keydown', onKey);
    };
    const onKey = e => {
      if (e.key === 'Escape') { cleanup(); resolve(false); }
      else if (e.key === 'Enter') { cleanup(); resolve(true); }
    };
    okBtn.onclick = () => { cleanup(); resolve(true); };
    cxBtn.onclick = () => { cleanup(); resolve(false); };
    overlay.onclick = e => {
      if (e.target === overlay) { cleanup(); resolve(false); }
    };
    document.addEventListener('keydown', onKey);
    // Focus the primary action so Enter confirms by default.
    setTimeout(() => okBtn.focus(), 30);
  });
}

// ===== HTTP IO (v3: same-origin fetch to board-steward serve) =====
function _absorbState(incoming) {
  state = incoming;
  if (state.nextNum == null) {
    state.nextNum = (state.cards || []).reduce((m, c) => Math.max(m, c.num || 0), 0) + 1;
  }
  migrateStackUnder(state);
  lastRev = state.rev || 0;
  pendingDirty = false;
  if (document.getElementById('board-title')) applyBoardTitle();
  if (document.getElementById('tag-legend-list')) refreshTagLegend();
}
async function loadFromFile() {
  const r = await fetch(BOARD_URL, { cache: 'no-store' });
  if (!r.ok) throw new Error(`GET ${BOARD_URL} → ${r.status}`);
  _absorbState(await r.json());
  detectChangesAndSnapshot();   // v2: seed snapshot on first load (no flash)
  render();
  tickLastUpdate();
  setStatus('live');
}
async function save(by='user') {
  state.rev = (state.rev || 0) + 1;
  state.savedAt = new Date().toISOString();
  state.savedBy = by;
  lastRev = state.rev;
  try {
    const r = await fetch(BOARD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    });
    if (!r.ok) throw new Error(`POST → ${r.status}`);
    suppressPollUntil = Date.now() + 2000;
    pendingDirty = false;
    setStatus('live');
  } catch (e) {
    setStatus('save failed: ' + (e.message || e), 'error');
  }
}
function scheduleSave() {
  pendingDirty = true;
  setStatus('saving…', 'unsynced');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => save('user'), 400);
}

// ===== Undo / Redo =====
// Snapshot strategy: deep-clone the mutable parts of state (cards, columns,
// title) before each user-initiated mutation. Stack capped at _UNDO_CAP.
// Text inputs (notes, writeup, card title) snapshot ONCE on focus — not per
// keystroke — so undo restores the pre-edit state cleanly.
let _undoStack = [];
let _redoStack = [];
const _UNDO_CAP = 80;

function _snapState() {
  if (!state) return null;
  return JSON.stringify({
    title: state.title || '',
    columns: state.columns || [],
    cards: state.cards || [],
  });
}
function _restoreSnap(snap) {
  const o = JSON.parse(snap);
  state.title = o.title;
  state.columns = o.columns;
  state.cards = o.cards;
}
function pushUndo() {
  const s = _snapState();
  if (s === null) return;
  // De-dupe — don't push identical consecutive snapshots (e.g. focus-with-no-edit).
  if (_undoStack.length && _undoStack[_undoStack.length - 1] === s) return;
  _undoStack.push(s);
  if (_undoStack.length > _UNDO_CAP) _undoStack.shift();
  _redoStack.length = 0;
}
function undo() {
  if (!_undoStack.length) { toast('Nothing to undo'); return; }
  // Blur any focused editor so its post-edit state isn't re-committed onto
  // the restored snapshot.
  if (document.activeElement && document.activeElement.blur) {
    try { document.activeElement.blur(); } catch (_) {}
  }
  const cur = _snapState();
  const prev = _undoStack.pop();
  if (cur && cur !== prev) _redoStack.push(cur);
  _restoreSnap(prev);
  applyBoardTitle();
  scheduleSave();
  render();
  refreshTagLegend();
  toast('Undo');
}
function redo() {
  if (!_redoStack.length) { toast('Nothing to redo'); return; }
  if (document.activeElement && document.activeElement.blur) {
    try { document.activeElement.blur(); } catch (_) {}
  }
  const cur = _snapState();
  const next = _redoStack.pop();
  if (cur && cur !== next) _undoStack.push(cur);
  _restoreSnap(next);
  applyBoardTitle();
  scheduleSave();
  render();
  refreshTagLegend();
  toast('Redo');
}

// Arm a "snap on first edit" handler for a text field — captures the
// pre-edit state once on focus so Ctrl+Z restores it. Safe to attach to
// inputs, textareas, contentEditable nodes.
function armUndoOnFocus(el) {
  if (!el || el.dataset.undoArmed === '1') return;
  el.dataset.undoArmed = '1';
  el.addEventListener('focus', () => { pushUndo(); }, true);
}
function isUserEditing() {
  const a = document.activeElement;
  return a && (a.isContentEditable || a.tagName === 'TEXTAREA' || a.tagName === 'INPUT');
}
function startPoll() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (pendingDirty) return;
    if (Date.now() < suppressPollUntil) return;
    if (isUserEditing()) return;
    try {
      const r = await fetch(BOARD_URL, { cache: 'no-store' });
      if (!r.ok) return;
      const incoming = await r.json();
      if ((incoming.rev || 0) !== lastRev) {
        _absorbState(incoming);
        detectChangesAndSnapshot();   // v2: mark changed cards for flash
        render();
        tickLastUpdate();
        setStatus('live');
        toast(state.savedBy === 'claude' ? '↻ Board updated by Claude' : '↻ Board updated');
      }
    } catch (e) { /* transient — server might be restarting */ }
  }, 3000);
}

// ===== Subtask tree helpers =====
function countSubtasks(nodes) {
  let total = 0, done = 0;
  const walk = ns => ns.forEach(n => { total++; if (n.done) done++; if (n.children) walk(n.children); });
  walk(nodes || []);
  return { total, done };
}
function deleteSubtaskByPath(rootArr, path) {
  if (path.length === 1) { rootArr.splice(path[0], 1); return; }
  const idx = path[0]; // path[1] === 'children'
  deleteSubtaskByPath(rootArr[idx].children || [], path.slice(2));
}
// Stamp both card.updatedAt and card.lastTouchedSubtask whenever subtask state
// changes — so traversal can sort by "real activity" not just card-level edits.
function touchSubtask(card) {
  const ts = now();
  card.updatedAt = ts;
  card.lastTouchedSubtask = ts;
}

// ===== Card-link helpers (bidirectional) =====
function addCardLink(cardA, cardB) {
  if (cardA.id === cardB.id) return;
  if (!cardA.linkedCards) cardA.linkedCards = [];
  if (!cardB.linkedCards) cardB.linkedCards = [];
  if (!cardA.linkedCards.includes(cardB.id)) cardA.linkedCards.push(cardB.id);
  if (!cardB.linkedCards.includes(cardA.id)) cardB.linkedCards.push(cardA.id);
  cardA.updatedAt = now();
  cardB.updatedAt = now();
}
function removeCardLink(cardA, cardB) {
  if (cardA.linkedCards) cardA.linkedCards = cardA.linkedCards.filter(id => id !== cardB.id);
  if (cardB.linkedCards) cardB.linkedCards = cardB.linkedCards.filter(id => id !== cardA.id);
  cardA.updatedAt = now();
